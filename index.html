    // ── AI fetch helper ───────────────────────────────────────────
    // Tries Claude API with stored key. Falls back to a no-key prompt if missing.
    async function callAI(prompt, maxTokens=300, temperature=0.7) {
      const key = localStorage.getItem("mlb_ai_key") || "";
      const headers = {"Content-Type":"application/json"};
      if (key) {
        headers["x-api-key"] = key;
        headers["anthropic-version"] = "2023-06-01";
        headers["anthropic-dangerous-direct-browser-access"] = "true";
      }
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers,
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: maxTokens,
          temperature,
          messages: [{role:"user", content: prompt}]
        })
      });
      if (!res.ok) {
        const err = await res.text().catch(()=>"");
        throw new Error(res.status === 401 ? "Invalid API key" : res.status === 403 ? "API key missing or unauthorized" : `API error ${res.status}`);
      }
      const d = await res.json();
      return d.content?.map(b=>b.text||"").join("")||"";
    }

    // ── API Key setup banner ──────────────────────────────────────
    function AIKeyBanner() {
      const [key, setKey] = React.useState(localStorage.getItem("mlb_ai_key")||"");
      const [saved, setSaved] = React.useState(!!localStorage.getItem("mlb_ai_key"));
      const [show, setShow] = React.useState(false);
      function save() {
        localStorage.setItem("mlb_ai_key", key.trim());
        setSaved(true); setShow(false);
      }
      if (saved && !show) return (
        <div style={{fontSize:"0.6rem",color:C.dim,padding:"0.2rem 0",display:"flex",alignItems:"center",gap:"0.4rem"}}>
          <span style={{color:C.green}}>✓ AI key set</span>
          <button onClick={()=>{setShow(true);setSaved(false);}} style={{background:"none",border:"none",color:C.dim,cursor:"pointer",fontSize:"0.6rem",fontFamily:"inherit",textDecoration:"underline"}}>change</button>
        </div>
      );
      return (
        <div style={{background:"rgba(201,168,76,0.07)",border:`1px solid rgba(201,168,76,0.25)`,borderRadius:5,padding:"0.7rem 0.9rem",marginBottom:"1rem"}}>
          <div style={{fontSize:"0.72rem",color:C.gold,fontWeight:"bold",marginBottom:"0.35rem"}}>⚡ Anthropic API Key required for AI picks</div>
          <div style={{fontSize:"0.6rem",color:C.dim,marginBottom:"0.5rem"}}>Get a free key at <span style={{color:C.gold}}>console.anthropic.com</span> → API Keys. Stored locally only.</div>
          <div style={{display:"flex",gap:"0.5rem"}}>
            <input value={key} onChange={e=>setKey(e.target.value)} placeholder="sk-ant-..." style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:3,padding:"0.3rem 0.5rem",color:C.text,fontSize:"0.72rem",fontFamily:"inherit",outline:"none"}}/>
            <button onClick={save} style={{background:C.gold,border:"none",borderRadius:3,color:"#111",padding:"0.3rem 0.8rem",cursor:"pointer",fontFamily:"inherit",fontSize:"0.72rem",fontWeight:"bold"}}>Save</button>
          </div>
        </div>
      );
    }

    // ── Storage shim (localStorage fallback since window.storage is Claude-only) ──
    window.storage = window.storage || {
      get: async (key) => {
        try { const v = localStorage.getItem(key); return v ? { key, value: v } : null; } catch { return null; }
      },
      set: async (key, value) => {
        try { localStorage.setItem(key, value); return { key, value }; } catch { return null; }
      },
      delete: async (key) => {
        try { localStorage.removeItem(key); return { key, deleted: true }; } catch { return null; }
      },
      list: async (prefix) => {
        try {
          const keys = Object.keys(localStorage).filter(k => !prefix || k.startsWith(prefix));
          return { keys };
        } catch { return { keys: [] }; }
      }
    };

    // ── Seed Games ────────────────────────────────────────────────
    function buildSeedGames() {
      const MATCHUPS = [
        ["NYY","BOS"], ["LAD","SFG"], ["CHC","STL"], ["ATL","PHI"],
        ["HOU","TEX"], ["NYM","MIA"], ["MIL","CIN"], ["SEA","OAK"],
        ["BAL","TOR"], ["CLE","DET"], ["MIN","KCR"], ["SDP","COL"],
        ["WSN","PIT"], ["TBR","LAA"], ["ARI","LAD"], ["NYY","TOR"],
        ["BOS","BAL"], ["ATL","NYM"], ["CHC","MIL"], ["HOU","LAA"],
        ["SEA","TEX"], ["SFG","SDP"], ["CLE","CWS"], ["STL","CIN"],
        ["MIN","DET"], ["KCR","OAK"], ["PHI","WSN"], ["PIT","MIA"],
        ["TBR","TOR"], ["COL","ARI"],
      ];
      const TIMES = ["17:05","17:10","17:35","18:05","18:10","19:05","19:05","19:10","19:10","20:05","20:10","20:10","20:15","20:15","21:40"];
      const games = [];
      const now = new Date();

      for (let daysAhead = 0; daysAhead <= 4; daysAhead++) {
        const d = new Date(now); d.setDate(d.getDate() + daysAhead);
        const dateStr = d.toISOString().slice(0, 10);
        const offset = (daysAhead * 7) % MATCHUPS.length;
        const slice = [...MATCHUPS.slice(offset), ...MATCHUPS.slice(0, offset)].slice(0, 15);
        slice.forEach(([home, away], i) => {
          games.push({ id:`seed_f${daysAhead}_${i}`, status:"scheduled", home, away,
            hScore:null, aScore:null,
            start_time:`${dateStr}T${TIMES[i % TIMES.length]}:00Z` });
        });
      }
      return games;
    }
    const SEED_GAMES = buildSeedGames();
    function localDateKey(isoStr) {
      const d = new Date(isoStr);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function todayLocalKey()    { return localDateKey(new Date().toISOString()); }
    function tomorrowLocalKey() { const d=new Date(); d.setDate(d.getDate()+1); return localDateKey(d.toISOString()); }
    function fixAbbr(a) {
      if (!a) return null;
      const fixed = ABBR_FIX[a] || a;
      const VALID = new Set(["LAD","ATL","NYY","HOU","BAL","PHI","MIL","TOR","SDP","TEX","SEA","STL","CHC","MIN","CLE","NYM","ARI","SFG","TBR","BOS","DET","KCR","WSN","MIA","LAA","PIT","CIN","COL","CWS","OAK"]);
      return VALID.has(fixed) ? fixed : null;
    }

    function countsForStandings(g) {
      if (g._source === "seed") return false;
      const gt = g.gameType || "R";
      return gt === "R" || gt === "P";
    }

    function buildStandingsFromGames(games) {
      const rec = {};
      for (const g of games) {
        if (!countsForStandings(g)) continue;
        if (g.status !== "closed" && g.status !== "final") continue;
        if (g.hScore == null || g.aScore == null) continue;
        const h = g.home, a = g.away;
        if (!h || !a) continue;
        if (!rec[h]) rec[h] = {w:0,l:0,rf:0,ra:0};
        if (!rec[a]) rec[a] = {w:0,l:0,rf:0,ra:0};
        rec[h].rf += g.hScore; rec[h].ra += g.aScore;
        rec[a].rf += g.aScore; rec[a].ra += g.hScore;
        if (g.hScore > g.aScore) { rec[h].w++; rec[a].l++; }
        else if (g.aScore > g.hScore) { rec[a].w++; rec[h].l++; }
      }
      const standings = {};
      for (const [abbr, r] of Object.entries(rec)) {
        const {w, l} = r;
        standings[abbr] = { wins:w, losses:l, gamesPlayed:w+l, winPct: w+l>0 ? +(w/(w+l)).toFixed(3) : 0, streak:null, last10:null, gb:null };
      }
      return standings;
    }

    const MLB_ABBR_FIX = {
      "AZ":"ARI","SF":"SFG","TB":"TBR","KC":"KCR","SD":"SDP",
      "WSH":"WSN","WAS":"WSN","ATH":"OAK",
    };
    const VALID_ABBRS = new Set(["LAD","ATL","NYY","HOU","BAL","PHI","MIL","TOR","SDP","TEX",
      "SEA","STL","CHC","MIN","CLE","NYM","ARI","SFG","TBR","BOS","DET","KCR",
      "WSN","MIA","LAA","PIT","CIN","COL","CWS","OAK"]);

    const MLB_ID_TO_ABBR = {
      108:"LAA",109:"OAK",110:"BAL",111:"BOS",112:"CHC",113:"CIN",114:"CLE",
      115:"COL",116:"DET",117:"HOU",118:"KCR",119:"LAD",120:"WSN",121:"NYM",
      133:"OAK",134:"PIT",135:"SDP",136:"SEA",137:"SFG",138:"STL",139:"TBR",
      140:"TEX",141:"TOR",142:"MIN",143:"PHI",144:"ATL",145:"CWS",146:"MIA",
      147:"NYY",158:"MIL",
    };

    const TEAM_NAME_TO_ABBR = {
      "los angeles dodgers":"LAD","atlanta braves":"ATL","new york yankees":"NYY",
      "houston astros":"HOU","baltimore orioles":"BAL","philadelphia phillies":"PHI",
      "milwaukee brewers":"MIL","toronto blue jays":"TOR","san diego padres":"SDP",

    };

    function resolveTeamAbbr(teamObj) {
      if (!teamObj) return null;
      const raw = (teamObj.team?.abbreviation || teamObj.abbreviation || "").trim();
      if (raw) {
        const up = raw.toUpperCase();
        const fixed = MLB_ABBR_FIX[up] || up;
        if (VALID_ABBRS.has(fixed)) return fixed;
      }
      const id = teamObj.team?.id;
      if (id && MLB_ID_TO_ABBR[id]) return MLB_ID_TO_ABBR[id];
      const name = (teamObj.team?.name || "").toLowerCase().trim();
      if (name && TEAM_NAME_TO_ABBR[name]) return TEAM_NAME_TO_ABBR[name];
      return null;
    }

    function parseMlbGame(g) {
      const home = resolveTeamAbbr(g.teams?.home);
      const away = resolveTeamAbbr(g.teams?.away);
      if (!home || !away) return null;
      const abs = (g.status?.abstractGameState||"").toLowerCase();
      const det = (g.status?.detailedState||"").toLowerCase();
      let status = "scheduled";
      if (abs==="final"||det==="final") status="closed";
      else if (abs==="live"||det==="in progress") status="inprogress";
      const hasScore = status==="closed"||status==="inprogress";
      const gameType = g.gameType || "R";
      return {
        id: String(g.gamePk), status, home, away,
        hScore: hasScore ? (g.teams?.home?.score??null) : null,
        aScore: hasScore ? (g.teams?.away?.score??null) : null,
        start_time: g.gameDate||new Date().toISOString(),
        inning: g.linescore?.currentInning??null,
        inningHalf: g.linescore?.inningHalf??null,
        gameType,
        _source: "live",
      };
    }

    async function fetchMlbDate(dateStr) {
      const mlbUrl = `https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${dateStr}&hydrate=linescore,team(league,division)`;
      let data;
      try {
        const res = await fetch(mlbUrl);
        if (!res.ok) throw new Error(`${res.status}`);
        data = await res.json();
      } catch(e) {
        const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(mlbUrl)}`;
        const res2 = await fetch(proxy);
        if (!res2.ok) throw new Error(`proxy ${res2.status}`);
        const wrapper = await res2.json();
        data = JSON.parse(wrapper.contents);
      }
      const games = [];
      for (const day of (data.dates||[])) {
        for (const g of (day.games||[])) {
          const gt = g.gameType || "R";
          if (gt === "A") continue;
          const p = parseMlbGame(g);
          if (p) games.push(p);
        }
      }
      return games;
    }

    async function fetchLiveGames() {
      const dates = [];
      for (let i=-14; i<=3; i++) {
        const d=new Date(); d.setUTCDate(d.getUTCDate()+i);
        dates.push(d.toISOString().slice(0,10));
      }
      const results = await Promise.all(dates.map(fetchMlbDate));
      return results.flat();
    }
    async function fetchTeamStats(season) {
      const teamStats = {};
      try {
        const [hitRes, pitchRes] = await Promise.all([
          fetch(`https://statsapi.mlb.com/api/v1/teams/stats?season=${season}&group=hitting&stats=season&sportId=1`).catch(()=>null),
          fetch(`https://statsapi.mlb.com/api/v1/teams/stats?season=${season}&group=pitching&stats=season&sportId=1`).catch(()=>null),
        ]);

        if (hitRes && hitRes.ok) {
          const d = await hitRes.json();
          for (const entry of (d.stats?.[0]?.splits || [])) {
            const abbr = resolveTeamAbbr(entry);
            if (!abbr) continue;
            const s = entry.stat || {};
            if (!teamStats[abbr]) teamStats[abbr] = {};
            teamStats[abbr].ops   = parseFloat(s.ops)   || null;
            teamStats[abbr].obp   = parseFloat(s.obp)   || null;
            teamStats[abbr].slg   = parseFloat(s.slg)   || null;
            teamStats[abbr].avg   = parseFloat(s.avg)   || null;
            teamStats[abbr].runsFor = entry.stat?.runs && entry.stat?.gamesPlayed
              ? +(entry.stat.runs / entry.stat.gamesPlayed).toFixed(2) : null;
          }
        }

        if (pitchRes && pitchRes.ok) {
          const d = await pitchRes.json();
          for (const entry of (d.stats?.[0]?.splits || [])) {
            const abbr = resolveTeamAbbr(entry);
            if (!abbr) continue;
            const s = entry.stat || {};
            if (!teamStats[abbr]) teamStats[abbr] = {};
            teamStats[abbr].era    = parseFloat(s.era)           || null;
            teamStats[abbr].whip   = parseFloat(s.whip)          || null;
            teamStats[abbr].kPer9  = parseFloat(s.strikeoutsPer9Inn) || null;
            teamStats[abbr].bbPer9 = parseFloat(s.walksPer9Inn)  || null;
            teamStats[abbr].hrAllowed = s.homeRuns && s.inningsPitched
              ? +(s.homeRuns / (parseFloat(s.inningsPitched) / 9)).toFixed(2) : null;
            teamStats[abbr].runsAgainst = s.runs && entry.stat?.gamesPlayed
              ? +(s.runs / entry.stat.gamesPlayed).toFixed(2) : null;
          }
        }
      } catch(e) {
        console.warn("Team stats fetch failed:", e.message);
      }
      return teamStats;
    }

    async function fetchAllMLBData(season) {
      let games = [];
      let usedLive = false;
      try {
        const raw = await fetchLiveGames();
        games = raw.filter(g => g && g.home && g.away);
        usedLive = games.length > 0;
      } catch (e) { console.warn("Live fetch failed:", e.message); }

      if (games.length === 0) {
        games = SEED_GAMES.map(g => ({...g, _source:"seed"}));
      } else {
        const liveDates = new Set(games.map(g => localDateKey(g.start_time)));
        const seedExtras = SEED_GAMES
          .filter(g => !liveDates.has(localDateKey(g.start_time)))
          .map(g => ({...g, _source:"seed"}));
        games = [...games, ...seedExtras];
      }

      // Fetch live team hitting + pitching stats in parallel with game fetch
      const teamStats = await fetchTeamStats(season);
      const standings = buildStandingsFromGames(games);
      const statsOk = Object.keys(teamStats).length > 0;
      return { games, standings, teamStats, gamesOk: games.length > 0, standingsOk: Object.keys(standings).length > 0, statsOk, usedLive, warnings: [] };
    }

    function parseMLBData(raw) {
      return { games: raw.games||[], standings: raw.standings||{}, teamStats: raw.teamStats||{} };
    }

    // ── Elo + live blend ─────────────────────────────────────────
    function buildLiveTeams(standings, teamStats, games) {
      const VALID = new Set(["LAD","ATL","NYY","HOU","BAL","PHI","MIL","TOR","SDP","TEX","SEA","STL","CHC","MIN","CLE","NYM","ARI","SFG","TBR","BOS","DET","KCR","WSN","MIA","LAA","PIT","CIN","COL","CWS","OAK"]);
      const completed = games.filter(g => countsForStandings(g) && (g.status==="final"||g.status==="closed") && g.hScore!=null && g.aScore!=null).sort((a,b) => new Date(a.start_time)-new Date(b.start_time));
      const eloRatings = {};
      const eloHistory = {}; // {teamId: [delta,...]} tracks recent Elo changes
      for (const base of BASELINE) eloRatings[base.id] = base.powRating * 100;
      const K_BASE = 20, MOV_CAP = 5;
      for (const g of completed) {
        const h = g.home, a = g.away;
        if (!VALID.has(h)||!VALID.has(a)) continue;
        if (!eloRatings[h]) eloRatings[h] = 700;
        if (!eloRatings[a]) eloRatings[a] = 700;
        const rH = eloRatings[h], rA = eloRatings[a];
        const expH = 1/(1+Math.pow(10,(rA-rH)/400));
        const margin = Math.abs(g.hScore-g.aScore);
        const cappedMargin = Math.min(margin, MOV_CAP);
        const movMult = cappedMargin>0 ? Math.log(cappedMargin+1)/Math.log(MOV_CAP+1) : 0.15;
        const K = K_BASE * movMult;
        const hWon = g.hScore > g.aScore;
        const hDelta = K*((hWon?1:0) - expH);
        const aDelta = K*((hWon?0:1) - (1-expH));
        eloRatings[h] = rH + hDelta;
        eloRatings[a] = rA + aDelta;
        if (!eloHistory[h]) eloHistory[h] = [];
        if (!eloHistory[a]) eloHistory[a] = [];
        eloHistory[h].push(hDelta);
        eloHistory[a].push(aDelta);
      }

      // Elo volatility: winsorized std dev of last 10 deltas per team
      // Winsorization caps single-blowout spikes that would over-inflate dispersion
      const eloVolatility = {};
      for (const [tid, deltas] of Object.entries(eloHistory)) {
        const recent = deltas.slice(-10);
        if (recent.length < 3) { eloVolatility[tid] = 0; continue; }
        const rawMean = recent.reduce((s,d)=>s+d,0)/recent.length;
        const rawStd  = Math.sqrt(recent.reduce((s,d)=>s+(d-rawMean)**2,0)/recent.length);
        const cap = rawStd * 2; // winsorize at 2σ
        const wins = recent.map(d=>Math.max(rawMean-cap, Math.min(rawMean+cap, d)));
        const wMean = wins.reduce((s,d)=>s+d,0)/wins.length;
        eloVolatility[tid] = +Math.sqrt(wins.reduce((s,d)=>s+(d-wMean)**2,0)/wins.length).toFixed(2);
      }

      const teamGames = {};
      for (const g of completed) {
        const h = g.home, a = g.away;
        if (!VALID.has(h)||!VALID.has(a)) continue;
        if (!teamGames[h]) teamGames[h] = [];
        if (!teamGames[a]) teamGames[a] = [];
        teamGames[h].push({ rf:g.hScore, ra:g.aScore, won:g.hScore>g.aScore });
        teamGames[a].push({ rf:g.aScore, ra:g.hScore, won:g.aScore>g.hScore });
      }
      const gameRecords = {};
      for (const [id, tgames] of Object.entries(teamGames)) {
        const rev = [...tgames].reverse();
        let wW=0,wL=0,wRF=0,wRA=0,totalWt=0;
        rev.forEach((g,idx) => {
          const wt = idx<10?3:idx<20?2:1;
          totalWt+=wt;
          if(g.won) wW+=wt; else wL+=wt;
          wRF+=g.rf*wt; wRA+=g.ra*wt;
        });
        gameRecords[id] = { g:tgames.length, w:rev.filter(g=>g.won).length, l:rev.filter(g=>!g.won).length, wWin:wW/totalWt, wRF:wRF/totalWt, wRA:wRA/totalWt, rf:tgames.reduce((s,g)=>s+g.rf,0), ra:tgames.reduce((s,g)=>s+g.ra,0) };
      }
      return BASELINE.map(base => {
        const st = standings[base.id], ts = teamStats[base.id], gr = gameRecords[base.id];
        const gamesPlayed = st?.gamesPlayed ?? gr?.g ?? 0;
        if (gamesPlayed === 0) return { ...base, wins:0, losses:0, liveGames:0, dataSource:"baseline", pythagWinPct:base.winPct, recencyWinPct:base.winPct, pythagDiff:0, eloRating:base.powRating*100 };
        const wins = st?.wins ?? gr?.w ?? 0, losses = st?.losses ?? gr?.l ?? 0;
        const actualWinPct = st ? st.winPct : (wins/(wins+losses)||0);
        const recencyWinPct = gr ? gr.wWin : actualWinPct;
        const liveRF = gr ? gr.wRF : (ts?.runsFor ?? base.runsFor);
        const liveRA = gr ? gr.wRA : (ts?.runsAgainst ?? base.runsAgainst);
        const totalRF = gr ? gr.rf : liveRF*gamesPlayed, totalRA = gr ? gr.ra : liveRA*gamesPlayed;
        const rfExp = Math.pow(totalRF,1.83), raExp = Math.pow(totalRA,1.83);
        const pythagWinPct = rfExp/(rfExp+raExp)||actualWinPct;
        const pythagDiff = +(actualWinPct-pythagWinPct).toFixed(3);
        const liveElo = eloRatings[base.id] ?? base.powRating*100;
        const eloContrib = (liveElo-base.powRating*100)/100;
        const liveWeight = Math.min(0.40, gamesPlayed/162*1.5);
        const bw = 1-liveWeight;
        const blendedWinPct_live = actualWinPct*0.35+recencyWinPct*0.35+pythagWinPct*0.20+Math.min(0.60,Math.max(0.40,actualWinPct+eloContrib*0.02))*0.10;
        const blendedWinPct = bw*base.winPct+liveWeight*blendedWinPct_live;
        const blendedRF = bw*base.runsFor+liveWeight*liveRF;
        const blendedRA = bw*base.runsAgainst+liveWeight*liveRA;
        const liveERA=ts?.era??base.era, liveWHIP=ts?.whip??base.whip, liveOPS=ts?.ops??base.ops;
        const liveOBP=ts?.obp??base.obp, liveSLG=ts?.slg??base.slg, liveK9=ts?.kPer9??base.kPer9;
        const liveBB9=ts?.bbPer9??base.bbPer9, liveHR9=ts?.hrAllowed??base.hrAllowed;
        const offDelta=(blendedWinPct_live-base.winPct)*3, defDelta=-(liveRA-base.runsAgainst)*0.2;
        const newOff=Math.max(1,Math.min(10,base.offRating+offDelta*liveWeight*2));
        const newDef=Math.max(1,Math.min(10,base.defRating+defDelta*liveWeight*2));
        const newSP=Math.max(1,Math.min(10,base.spRating+(base.era-liveERA)*0.15*liveWeight*2));
        const newPow=Math.max(1,Math.min(10,newOff*0.38+newDef*0.38+newSP*0.19+Math.max(-1,Math.min(1,eloContrib))*0.05));
        return { ...base, winPct:blendedWinPct, runsFor:blendedRF, runsAgainst:blendedRA, margin:blendedRF-blendedRA,
          ops:bw*base.ops+liveWeight*liveOPS, obp:bw*base.obp+liveWeight*liveOBP, slg:bw*base.slg+liveWeight*liveSLG,
          era:bw*base.era+liveWeight*liveERA, whip:bw*base.whip+liveWeight*liveWHIP,
          kPer9:bw*base.kPer9+liveWeight*liveK9, bbPer9:bw*base.bbPer9+liveWeight*liveBB9, hrAllowed:bw*base.hrAllowed+liveWeight*liveHR9,
          offRating:newOff, defRating:newDef, spRating:newSP, powRating:newPow, wins, losses,
          liveGames:gamesPlayed, liveWeight:Math.round(liveWeight*100),
          pythagWinPct:+pythagWinPct.toFixed(3), recencyWinPct:+recencyWinPct.toFixed(3), pythagDiff,
          eloRating:Math.round(liveElo), eloContrib:+eloContrib.toFixed(2),
          streak:st?.streak, last10:st?.last10, gb:st?.gb,
          dataSource: ts?"mlb-api":gr?"game-agg+elo":"baseline",
          lambdaAdj: getLambdaAdj(base.id),
          eloVol: eloVolatility[base.id] ?? 0
        };
      });
    }

    function poissonDraw(lambda) {

      const L = Math.exp(-lambda); let k = 0, p = 1;

    // Negative Binomial draw: NB(μ, r) where r is dispersion (lower = more overdispersed)
    // Uses Gamma-Poisson mixture: draw λ' from Gamma(r, μ/r), then Poisson(λ')
    function negativeBinomialDraw(mu, r) {
      if (mu <= 0) return 0;
      // Gamma draw via Marsaglia-Tsang (shape=r, scale=mu/r)
      // For simplicity use log-normal approximation for r >= 2
      // Variance of NB = mu + mu²/r (always > Poisson variance of mu)
      const shape = r;
      const scale = mu / r;
      // Gamma sample via sum of exponentials for integer r (r=5 or r=10)
      let gamma = 0;
      const rInt = Math.max(2, Math.round(shape));
      for (let i = 0; i < rInt; i++) gamma -= Math.log(Math.random());
      // gamma is now Gamma(rInt, 1) with mean=rInt
      // Target: Gamma(shape, scale) with mean = shape*scale = mu
      // Correct rescale: multiply by (shape * scale / rInt) = mu/rInt
      gamma *= mu / rInt;
      return poissonDraw(Math.max(0.01, gamma));

    // Blended draw: mix Poisson and NB based on volatility weight w

        : poissonDraw(mu);

    function simulateGame(hLambda, aLambda, nbWeight=0, nbR=10) {
      let h = 0, a = 0;

    // 2. Bullpen ERA variance multiplier (uses live pitcher data)
    function bullpenVarianceMultiplier(teamAbbr) {
      try {
        const pitcherData = loadLivePitcherERA();
        const rosterDB    = loadRosterDB();
        const bullpen = Object.values(rosterDB).filter(p =>
          p.teamAbbr===teamAbbr && (p.role==="RP"||p.role==="CL") && p.ip>0
        );
        if (bullpen.length < 2) return 1.0;
        let totalIP=0, totalER=0;
        for (const p of bullpen) {
          const live = pitcherData[p.name];
          const era  = live?.era2026 ?? p.era ?? 4.50;
          const ip   = live?.ip ?? p.ip ?? 0;
          if (ip>0) { totalER+=(era/9)*ip; totalIP+=ip; }
        }
        if (totalIP<5) return 1.0;
        const bullpenERA = (totalER/totalIP)*9;
        return Math.min(1.08, Math.max(0.96, 1.0+(bullpenERA-4.30)*0.02));

    }

    // 2b. Bullpen stress multiplier (leverage/usage state)

    // Uses pitcher ERA log timestamps to detect recently used relievers
    function bullpenStressMultiplier(teamAbbr) {
      try {
        const pitcherData = loadLivePitcherERA();
        const rosterDB    = loadRosterDB();
        const now         = Date.now();
        const LAST_24H    = 24 * 60 * 60 * 1000;
        const LAST_48H    = 48 * 60 * 60 * 1000;

        // Find relievers for this team with recent outings
        const relievers = Object.values(rosterDB).filter(p =>
          p.teamAbbr === teamAbbr && (p.role === "RP" || p.role === "CL")
        );

        let recentCount  = 0; // relievers used in last 24h
        let closerUsed   = false;
        let highLeverage = 0; // relievers used in last 24h with low IP/outing (came in early)

        for (const r of relievers) {
          const log = pitcherData[r.name];
          if (!log?.lastOutingAt) continue;
          const hoursAgo = (now - log.lastOutingAt) / (60 * 60 * 1000);
          if (hoursAgo <= 24) {
            recentCount++;
            if (r.role === "CL") closerUsed = true;
            // If they threw < 0.7 IP in last outing, likely a high-leverage multi-batter appearance
            if (log.lastIP && log.lastIP < 0.7) highLeverage++;
          }
        }

        // No stress data available
        if (recentCount === 0) return 1.0;

        let stress = 1.0;
        if (recentCount >= 5) stress += 0.08;      // heavily used bullpen
        else if (recentCount >= 4) stress += 0.05; // moderately used
        else if (recentCount >= 3) stress += 0.03; // light usage
        if (closerUsed)    stress += 0.04;          // closer unavailable/tired
        if (highLeverage >= 2) stress += 0.03;     // multiple fire drill appearances

        return Math.min(1.15, stress);
      } catch(e) { return 1.0; }
    }

        if (p?.ip && p?.gs && p.gs>=1) {

          if (ips>=6.5) return 0.97;
          if (ips>=5.5) return 1.00;
          if (ips>=4.5) return 1.03;

        if (era!=null&&era<3.8) return 1.00;

    function runSimulation(home, away, hfa=true, homeSpSlot=2, awaySpSlot=2, ctx=null) {

      const hPythFlag=pythagFlag(home), aPythFlag=pythagFlag(away);
      let pythagAdj=0;
      if(hPythFlag==="LUCKY") pythagAdj-=0.02; if(hPythFlag==="UNLUCKY") pythagAdj+=0.02;
      if(aPythFlag==="LUCKY") pythagAdj+=0.02; if(aPythFlag==="UNLUCKY") pythagAdj-=0.02;
      // Apply calibration then compress toward 50% to address overconfidence
      // Compression factor 0.94 reduces a +3.8pp overconfidence index by ~2.3pp
      // Will auto-relax via adaptive system as sample builds
      const COMPRESS = 0.94;
      const rawCalib = applyCalibration(Math.max(0.05,Math.min(0.95,hWinProb+pythagAdj)), null, nbWeight >= 0.2);
      const hWinCalib = 0.5 + (rawCalib - 0.5) * COMPRESS;
      return {
        hWinProb:hWinCalib, aWinProb:1-hWinCalib,
        hWinPct:(hWinCalib*100).toFixed(1), aWinPct:((1-hWinCalib)*100).toFixed(1),
        rlCoverPct:+(rlCoverPct*100).toFixed(1), aRLCoverPct:+((1-rlCoverPct)*100).toFixed(1),
        avgTotal:+avgTotal.toFixed(1), hAvgRuns:+(hRunSum/POISSON_N).toFixed(1), aAvgRuns:+(aRunSum/POISSON_N).toFixed(1),
        totalDist:totals, hLambda:+hLambda.toFixed(3), aLambda:+aLambda.toFixed(3),
        hPythFlag,aPythFlag, park:park.park,parkFactor:park.pf,parkHfa, hSpAdj,aSpAdj, simN:POISSON_N,
        nbWeight:+nbWeight.toFixed(2), nbRouted: nbWeight >= 0.2,
      };
    }
    function predictMatchup(home, away, hfa=true, homeSpSlot=2, awaySpSlot=2) {
      const sim = runSimulation(home, away, hfa, homeSpSlot, awaySpSlot);
      return { hWinPct:sim.hWinPct, aWinPct:sim.aWinPct, hRuns:sim.hAvgRuns, aRuns:sim.aAvgRuns, total:sim.avgTotal,
        rlCoverPct:sim.rlCoverPct, aRLCoverPct:sim.aRLCoverPct, edge:(sim.hLambda-sim.aLambda).toFixed(3),
        hSpAdj:sim.hSpAdj, aSpAdj:sim.aSpAdj, hPythFlag:sim.hPythFlag, aPythFlag:sim.aPythFlag,
        pythagAdj:"0.0", park:sim.park,parkFactor:sim.parkFactor,parkHfa:sim.parkHfa, sim };
    }
    function simOverProb(totalDist, ouLine) {
      const n = totalDist.reduce((s,v)=>s+v,0); if(n===0) return 0.5;
      return totalDist.slice(Math.ceil(ouLine+1)).reduce((s,v)=>s+v,0)/n;
    }
    function fmtDate(iso) { try { return new Date(iso).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}); } catch { return iso; } }

    // ── Poisson Lambda Learning ───────────────────────────────────
    // After each settled game, nudge team offensive/defensive lambda
    // adjustments based on prediction error. Conservative learning rate.
    const LAMBDA_KEY = "mlb_lambda_adj";
    const LAMBDA_LEARN_RATE = 0.03;  // 3% nudge per game
    const LAMBDA_MAX = 0.20;          // max ±20% total adjustment
    const LAMBDA_DECAY = 0.995;       // 0.5% decay per game (slow forgetting)

    async function loadLambdaAdj() {
      try {
        const s = await window.storage.get(LAMBDA_KEY);
        if (s && s.value) return JSON.parse(s.value);
      } catch(e) {}
      return {};
    }

    async function saveLambdaAdj(data) {
      try { await window.storage.set(LAMBDA_KEY, JSON.stringify(data)); } catch(e) {}
    }

    // Record a game result and update lambda adjustments
    async function updateLambdaAdj(homeAbbr, awayAbbr, projHomeRuns, projAwayRuns, actualHomeRuns, actualAwayRuns) {
      if (projHomeRuns == null || projAwayRuns == null) return;
      if (actualHomeRuns == null || actualAwayRuns == null) return;

      const data = await loadLambdaAdj();

      // Helper: get or init team adj {offAdj, defAdj, n}
      const get = id => data[id] || { offAdj: 0, defAdj: 0, n: 0 };

      // Offense error: actual - projected (positive = underestimated)
      const hOffErr = actualHomeRuns - projHomeRuns;
      const aOffErr = actualAwayRuns - projAwayRuns;
      // Defense error: we projected opponent would score X, they scored Y
      const hDefErr = actualAwayRuns - projAwayRuns; // home defense let away score more/less
      const aDefErr = actualHomeRuns - projHomeRuns; // away defense let home score more/less

      for (const [id, offErr, defErr] of [
        [homeAbbr, hOffErr, hDefErr],
        [awayAbbr, aOffErr, aDefErr],
      ]) {
        const cur = get(id);
        // Apply decay first (slow forgetting of old adjustments)
        cur.offAdj *= LAMBDA_DECAY;
        cur.defAdj *= LAMBDA_DECAY;
        // Nudge toward error signal, normalized by expected runs (5 runs ≈ typical game)
        const offNudge = (offErr / 5) * LAMBDA_LEARN_RATE;
        const defNudge = (defErr / 5) * LAMBDA_LEARN_RATE;
        cur.offAdj = Math.max(-LAMBDA_MAX, Math.min(LAMBDA_MAX, cur.offAdj + offNudge));
        cur.defAdj = Math.max(-LAMBDA_MAX, Math.min(LAMBDA_MAX, cur.defAdj + defNudge));
        cur.n = (cur.n || 0) + 1;
        data[id] = cur;
      }

      await saveLambdaAdj(data);
    }

    // Expose for use in runSimulation

    // ── Adaptive Model Feedback System ──────────────────────────
    // Reads from analytics (rolling windows, segment perf, CLV, bias)
    // and writes small parameter corrections back into the simulation
    const ADAPTIVE_KEY = "mlb_adaptive_params";

    function loadAdaptiveParams() {
      try {

        return r ? JSON.parse(r) : {};

    // Global lambda offset: added to all team run expectations
    // Corrects for systematic OU bias (model consistently over/undershooting totals)
    function getGlobalLambdaOffset() {
      return loadAdaptiveParams().globalLambdaOffset ?? 0;
    }

    // Calibration tightening factor: multiplies correction strength
    // 1.0 = normal, <1.0 = tighter (less aggressive correction when Brier degrades)
    function getCalibTightening() {
      return loadAdaptiveParams().calibTightening ?? 1.0;
    }

    // Park disp nudges: small adjustments to specific park dispersion values
    function getParkDispNudge(parkId) {
      return (loadAdaptiveParams().parkDispNudges ?? {})[parkId] ?? 0;

    // Main feedback function — called from ModelPerfPage after analytics computed
    async function applyAdaptiveFeedback({ouBias, brierRecent, brierSeason, w14, wAll, clvBuckets, segmentData, totalSettled, tagFreq={}, tagN=0, dominantTag=null}) {
      const params = loadAdaptiveParams();
      const log = params.log || [];
      const now = Date.now();
      const changes = [];
      const DAY_MS = 86400000;

      // ── 1. OU Bias Correction ──────────────────────────────────
      // Requires: 40+ games, bias > 0.6 runs, 14-day cooldown between corrections
      const lastBiasRun = params.lastBiasRun || 0;
      const daysSinceLastBias = (now - lastBiasRun) / DAY_MS;
      if (ouBias != null && Math.abs(ouBias) > 0.6 && totalSettled >= 40 && daysSinceLastBias >= 14) {
        const current = params.globalLambdaOffset ?? 0;
        const nudge = ouBias * 0.05 / 9; // 5% nudge per cycle (was 10%), /9 innings
        const next = Math.max(-0.04, Math.min(0.04, current + nudge)); // tighter cap ±0.12
        if (Math.abs(next - current) > 0.001) {
          params.globalLambdaOffset = +next.toFixed(4);
          params.lastBiasRun = now;
          changes.push(`OU bias ${ouBias>0?"+":""}${ouBias} runs (n=${totalSettled}) → lambda offset ${next>0?"+":""}${next.toFixed(4)}/inn`);
        }
      }

      // ── 2. Calibration Tightening ─────────────────────────────
      // Requires: 50+ games AND L14 brier degraded vs season by 0.025+ (was 0.02)
      // Relaxation requires consistent improvement over 2+ feedback cycles
      if (totalSettled >= 50 && brierRecent != null && brierSeason != null) {
        if (brierRecent > brierSeason + 0.025) {
          const current = params.calibTightening ?? 1.0;
          const next = Math.max(0.75, current - 0.04); // smaller step (was 0.05), higher floor (was 0.7)
          if (next < current) {
            params.calibTightening = +next.toFixed(3);
            changes.push(`Brier degraded ${brierRecent} vs ${brierSeason} season (n=${totalSettled}) → calib ×${next.toFixed(2)}`);
          }
        } else if (brierRecent < brierSeason - 0.015) {
          const current = params.calibTightening ?? 1.0;
          const next = Math.min(1.0, current + 0.015); // slower relaxation (was 0.02)
          if (next > current) {
            params.calibTightening = +next.toFixed(3);
            changes.push(`Brier improving → calib relaxed to ×${next.toFixed(2)}`);
          }
        }
      }

      // ── 3. Park Disp Nudges ───────────────────────────────────
      // Requires: 40+ games at high-disp parks (not just 15)
      // Nudge is 0.005 (was 0.01) — half speed
      // Cap is ±0.08 (was ±0.15) — much tighter
      if (segmentData && totalSettled >= 60) {
        const highDispSeg = segmentData.find(s => s.id === "high_disp");
        if (highDispSeg && highDispSeg.n >= 40 && highDispSeg.mlPct != null) {
          const gap = highDispSeg.mlPct - 52;
          const HIGH_DISP_PARKS = ["COL","CIN","CHC","NYY","PHI","BOS"];
          const nudges = params.parkDispNudges || {};
          if (gap < -8) {
            HIGH_DISP_PARKS.forEach(pk => { nudges[pk] = Math.min(0.08, (nudges[pk]??0) + 0.005); });
            params.parkDispNudges = nudges;
            changes.push(`High-disp parks ML ${highDispSeg.mlPct.toFixed(0)}% (n=${highDispSeg.n}) → disp nudged +0.005`);
          } else if (gap > 10) {
            HIGH_DISP_PARKS.forEach(pk => { nudges[pk] = Math.max(-0.08, (nudges[pk]??0) - 0.003); });
            params.parkDispNudges = nudges;
            changes.push(`High-disp parks overperforming (n=${highDispSeg.n}) → disp nudged -0.003`);
          }
        }
      }

      // ── 4. CLV-based learning rate adjustment ─────────────────
      // Now uses w30 (30-day window) instead of w14 — much more reliable signal
      // Requires 30+ games with CLV data, threshold raised to ±4pp (was ±3/±1)
      // Step size halved, cap tightened
      const clvWindow = wAll; // use full season CLV as signal, not 14-day
      const clvN = clvWindow?.clvN ?? 0;
      if (clvWindow?.avgCLV != null && clvN >= 30) {
        const currentRate = params.learnRateMultiplier ?? 1.0;
        if (clvWindow.avgCLV > 4) {
          const next = Math.min(1.2, currentRate + 0.01); // smaller step, tighter cap (was 1.3, 0.02)
          if (next > currentRate + 0.001) {
            params.learnRateMultiplier = +next.toFixed(3);
            changes.push(`Season CLV +${clvWindow.avgCLV.toFixed(1)}pp (n=${clvN}) → learn rate ×${next.toFixed(2)}`);
          }
        } else if (clvWindow.avgCLV < -2) {
          const next = Math.max(0.8, currentRate - 0.015); // tighter floor (was 0.7), smaller step
          if (next < currentRate - 0.001) {
            params.learnRateMultiplier = +next.toFixed(3);
            changes.push(`Season CLV ${clvWindow.avgCLV.toFixed(1)}pp (n=${clvN}) → learn rate ×${next.toFixed(2)}`);
          }
        }
      }

      // ── 5. Tag-driven feedback ───────────────────────────────
      if (tagN >= 30 && dominantTag && dominantTag[1]/tagN >= 0.35 && totalSettled >= 60) {
        const [topTag, topCount] = dominantTag;
        const tagPct = topCount/tagN;
        const tn = params.tagNudges || {};
        if (topTag==="sp_mismatch" && !tn.sp_mismatch) {
          params.learnRateMultiplier = Math.min(1.2,(params.learnRateMultiplier??1.0)+0.02);
          params.tagNudges={...tn,sp_mismatch:true};
          changes.push(`SP Mismatch ${(tagPct*100).toFixed(0)}% of losses → learn rate ×${params.learnRateMultiplier.toFixed(2)}`);
        }
        if (topTag==="bullpen_blow" && !tn.bullpen_blow) {
          params.calibTightening=Math.max(0.75,(params.calibTightening??1.0)-0.05);
          params.tagNudges={...tn,bullpen_blow:true};
          changes.push(`Bullpen Collapse ${(tagPct*100).toFixed(0)}% of losses → calib ×${params.calibTightening.toFixed(2)}`);
        }
        if ((topTag==="off_variance"||topTag==="off_explosion") && !tn.off_variance) {
          const nudge = topTag==="off_explosion" ? 0.008 : 0.004;
          params.globalLambdaOffset=Math.min(0.12,(params.globalLambdaOffset??0)+nudge);
          params.tagNudges={...tn,off_variance:true};
          changes.push(`${topTag} ${(tagPct*100).toFixed(0)}% of losses → lambda +${nudge.toFixed(3)}/inn`);
        }
        if (topTag==="market_drift" && !tn.market_drift) {
          params.learnRateMultiplier=Math.max(0.8,(params.learnRateMultiplier??1.0)-0.03);
          params.tagNudges={...tn,market_drift:true};
          changes.push(`Market Drift ${(tagPct*100).toFixed(0)}% of losses → learn rate ×${params.learnRateMultiplier.toFixed(2)}`);
        }
      }

      if (changes.length > 0) {
        log.push({ at: now, changes });
        params.log = log.slice(-50);
        params.lastRun = now;
        saveAdaptiveParams(params);
        await refreshLambdaAdj();
      }

      return { changes, params };
    }

        clearTimeout(tid);
        return res;
      } catch(e) {
        clearTimeout(tid);
        return null;
      }
    }

                if (["P","RP","SP"].includes(db[pid].pos)) { db[pid].pos=isSP?"SP":"RP"; db[pid].role=playerRole(db[pid].pos); }
                db[pid].era=era; db[pid].whip=whip; db[pid].ip=ip;

                db[pid].so=parseInt(s.strikeOuts)||0; db[pid].bb=parseInt(s.baseOnBalls)||0;

    // Fetch recent IL transactions (last 7 days)
    async function fetchILTransactions(season) {
      const ilLog = loadILLog();
      try {
        const end   = new Date();
        const start = new Date(end.getTime() - 7*24*60*60*1000);
        const fmt   = d => d.toISOString().slice(0,10);
        const res = await fetchWithTimeout(
          `https://statsapi.mlb.com/api/v1/transactions?sportId=1&startDate=${fmt(start)}&endDate=${fmt(end)}`
        );
        if (!res||!res.ok) return ilLog;
        const data = await res.json();
        for (const tx of (data.transactions||[])) {
          // MLB API uses typeDesc (plain English) - most reliable field
          const typeDesc = (tx.typeDesc || tx.description || "").toLowerCase();
          const typeCode = (tx.typeCode || "").toString();
          // IL placement: typeDesc contains "injured list" or "disabled list"
          const isIL = typeDesc.includes("injured list") || typeDesc.includes("disabled list") ||
                       typeCode === "175" || typeDesc.includes("placed on");
          // Activation: returned from IL
          const isActivation = typeDesc.includes("activated") || typeDesc.includes("reinstated") ||
                               typeCode === "176";
          const pid = tx.person?.id;
          if (!pid) continue;
          // Team: use toTeam for activations, fromTeam for IL placements
          const teamId = isIL ? tx.fromTeam?.id : tx.toTeam?.id;
          if (isIL) {
            ilLog[pid] = {
              name: tx.person?.fullName,
              teamId,
              teamAbbr: MLB_ID_TO_ABBR[teamId] || null,
              date: tx.date || fmt(new Date()),
              typeDesc: tx.typeDesc || "",
              active: true,
            };
          } else if (isActivation && ilLog[pid]) {
            ilLog[pid].active = false;
          }
        }
      } catch(e) { console.warn("IL transactions fetch failed:", e.message); }
      saveILLog(ilLog);
      return ilLog;
    }

    // Compute injury impact for a team given IL log and roster DB
    function computeTeamInjuryImpact(teamAbbr, ilLog, rosterDB) {
      const impact = {
        offMult: 1.0,   // multiplier on team run scoring (< 1 = weaker)
        spSlotAdj: 0,   // add to SP slot (higher = worse pitcher)
        rpMult: 1.0,    // multiplier on bullpen effectiveness
        notes: [],
        ilPlayers: [],
      };
      const activeIL = Object.values(ilLog).filter(p =>
        p.active && p.teamAbbr === teamAbbr &&
        (Date.now() - new Date(p.date).getTime()) < 7*24*60*60*1000
      );

      for (const ilPlayer of activeIL) {
        const dbEntry = Object.values(rosterDB).find(p => p.name === ilPlayer.name && p.teamAbbr === teamAbbr);
        const role = dbEntry?.role || "bench";
        impact.ilPlayers.push({ name: ilPlayer.name, role, date: ilPlayer.date });

        if (role === "SP") {
          // SP on IL: rotation takes a hit — next man in is worse
          const spEra    = dbEntry?.effectiveEra || 4.5;
          const repEra   = REPLACEMENT_ERA["SP"];
          const eraDiff  = repEra - spEra; // positive = lost a good pitcher
          impact.spSlotAdj += Math.max(0, Math.round(eraDiff / 0.8));
          if (eraDiff > 0.5) impact.notes.push(`${ilPlayer.name} (SP, ${spEra} ERA) on IL`);
        } else if (role === "RP" || role === "CL") {
          impact.rpMult *= 0.97; // slight bullpen weakness
          if (role === "CL") impact.notes.push(`${ilPlayer.name} (CL) on IL`);
        } else if (role === "everyday") {
          // Position player on IL: offensive impact based on OPS delta
          const opsDelta = dbEntry?.opsDelta || 0;
          // Each 0.050 OPS above replacement = ~0.5% more runs per game
          const offImpact = Math.max(0, opsDelta) * 0.10;
          impact.offMult *= (1 - offImpact);
          if (opsDelta > 0.05) impact.notes.push(`${ilPlayer.name} (${dbEntry?.pos}, .${Math.round((dbEntry?.ops||0.700)*1000)} OPS) on IL`);
        }
      }
      return impact;
    }

    // ── Live Pitcher ERA Learning ─────────────────────────────────
    const PITCHER_ERA_KEY = "mlb_pitcher_era_2026";

    function loadLivePitcherERA() {
      try {
        const raw = localStorage.getItem(PITCHER_ERA_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch(e) { return {}; }
    }

    // Record a pitcher's outing: update rolling ERA from game results
    function recordPitcherOuting(pitcherName, earnedRuns, inningsPitched, teamAbbr=null) {
      if (!pitcherName || earnedRuns == null || !inningsPitched) return;
      const data = loadLivePitcherERA();
      const cur = data[pitcherName] || { er: 0, ip: 0, n: 0 };
      cur.er += earnedRuns;
      cur.ip += inningsPitched;
      cur.n  += 1;
      cur.era2026 = cur.ip > 0 ? +((cur.er / cur.ip) * 9).toFixed(2) : null;
      // Track last outing time and team for bullpen stress calculation
      cur.lastOutingAt = Date.now();
      cur.lastIP = inningsPitched;
      if (teamAbbr) cur.team = teamAbbr;
      data[pitcherName] = cur;
      saveLivePitcherERA(data);
    }

    // Get best ERA for a pitcher: prefer 2026 live data if enough sample (3+ starts)
    // blend with preseason if smaller sample
    function getEffectiveERA(pitcherName) {
      const preseason = KNOWN_ERA[pitcherName];
      const live = loadLivePitcherERA()[pitcherName];
      if (!live || live.n < 1) return preseason ?? null;
      if (live.n >= 5) return live.era2026; // enough sample, trust live fully
      if (preseason == null) return live.era2026;
      // Blend: weight live by starts (max 60% at 3 starts)
      const liveWeight = Math.min(0.60, live.n / 5);
      return +(preseason * (1 - liveWeight) + live.era2026 * liveWeight).toFixed(2);
    }

    // Map pitcher ERA to SP slot (0=ace,1,2,3,4=5th)
    function eraToSpSlot(era) {
      if (era == null) return 2; // default mid-rotation
      if (era < 3.0)  return 0;
      if (era < 3.6)  return 1;
      if (era < 4.2)  return 2;
      if (era < 4.8)  return 3;
      return 4;
    }

    // Fetch probable pitchers and roster from MLB API for a gamePk
    async function fetchGameContext(gamePk, homeId, awayId) {

      const cached = _gameContext[gamePk];
      const weatherFresh = cached?.weather && cached?._weatherAt && (Date.now() - cached._weatherAt < 60*60*1000);
      if (cached?.weather && weatherFresh) return cached;
      const ctx = cached || { sp: { home: null, away: null, homeEra: null, awayEra: null, homeSlot: 2, awaySlot: 2 },

          if (gameData) {

            if (ap) { ctx.sp.away = ap.fullName; ctx.sp.awayEra = getEffectiveERA(ap.fullName); ctx.sp.awaySlot = eraToSpSlot(ctx.sp.awayEra); }
            // Injury/lineup thinness: check if lineups are posted and count position players
            const hl = gameData.lineups?.homePlayers?.length ?? null;

            if (hl != null && hl < 8) { ctx.injury.homeThin = true; ctx.injury.homeNote = `${hl} starters listed`; }
            if (al != null && al < 8) { ctx.injury.awayThin = true; ctx.injury.awayNote = `${al} starters listed`; }
          }
        }
      } catch(e) {}

      // Weather fetch (Open-Meteo, free, no key)
      try {
        const park = PARK_FACTORS[homeId];
        if (park && park.lat) {
          // Shared cache with in-flight deduplication - prevents race conditions
          const wc = _weatherCache[homeId];
          let wd = (wc && Date.now()-wc._at < 3600000) ? wc._d : null;
          if (!wd) {
            // If already fetching for this park, wait for that promise instead of firing another
            if (!_weatherInFlight[homeId]) {
              _weatherInFlight[homeId] = (async()=>{
                const now = new Date();
                const dateStr = now.toISOString().slice(0,10);
                const tomorrow = new Date(now); tomorrow.setUTCDate(tomorrow.getUTCDate()+1);
                const tomorrowStr = tomorrow.toISOString().slice(0,10);

                const wCtrl = new AbortController();
                const wTimer = setTimeout(()=>wCtrl.abort(), 8000);
                const wRes = await fetch(wUrl, {signal:wCtrl.signal}).catch(()=>null);
                clearTimeout(wTimer);
                if (wRes && wRes.ok) {
                  const d = await wRes.json();
                  _weatherCache[homeId] = {_d:d, _at:Date.now()};
                  return d;
                }
                return null;
              })().finally(()=>{ delete _weatherInFlight[homeId]; });
            }
            wd = await _weatherInFlight[homeId];
          }
          if (wd) {

            const hours = wd.hourly?.time || [];
            const temps = wd.hourly?.temperature_2m || [];
            const winds = wd.hourly?.windspeed_10m || [];
            const windDirs = wd.hourly?.winddirection_10m || [];

            // Use actual game start hour, fall back to T19 (7pm) if not found

            // gamePk is stored as game.id which comes from start_time
            // Use T18/T19/T20 fallback based on typical game times - no extra API call
            // Try multiple candidate hours until we find one in the data

            const candidateHours = ["T18:","T19:","T20:","T17:","T13:","T14:","T15:","T16:"];
            let idx = -1;
            for (const h of candidateHours) {
              idx = hours.findIndex(hr => hr.includes(h));
              if (idx >= 0) break;

            if (idx < 0 && hours.length > 0) idx = Math.min(18, hours.length - 1);

    // Compute weather run factor: cold/hot and wind affect scoring
    function weatherRunFactor(weather) {
      if (!weather) return 1.0;
      let factor = 1.0;
      const temp = weather.temp;
      // Temperature effect
      if (temp < 40)      factor *= 0.91;
      else if (temp < 50) factor *= 0.95;
      else if (temp < 60) factor *= 0.98;
      else if (temp > 85) factor *= 1.04;
      else if (temp > 75) factor *= 1.02;
      // Wind direction and speed
      const wd = weather.windDir;
      const ws = weather.wind;
      if (ws > 10) {
        const outWind = (wd >= 135 && wd <= 225);
        const inWind  = (wd >= 315 || wd <= 45);
        if (outWind)  factor *= 1 + (ws-10)*0.003;
        if (inWind)   factor *= 1 - (ws-10)*0.003;
        factor = Math.max(0.88, Math.min(1.12, factor));
      }
      if (weather.rain > 60) factor *= 0.97;
      return factor;
    }

    // Weather volatility index: high wind + extreme temp = more run variance
    // Returns a dispersion multiplier for the Poisson lambda spread
    function weatherVolatilityIndex(weather) {
      if (!weather) return 1.0;
      const temp = weather.temp;
      const ws   = weather.wind;
      // Cold suppresses offense AND increases variance (pitcher grip, movement)
      const tempVol = temp < 45 ? 1.08 : temp > 85 ? 1.04 : 1.0;
      // Strong wind in any direction increases variance (unpredictable ball flight)
      const windVol = ws > 20 ? 1.10 : ws > 15 ? 1.06 : ws > 10 ? 1.03 : 1.0;
      return Math.min(1.15, tempVol * windVol);
    }

    // H2H storage ─────────────────────────────────────────────────
    const H2H_KEY = "mlb_h2h";
    function h2hKey(t1,t2) { return [t1,t2].sort().join("|"); }
    async function loadH2H() { try { const s=await window.storage.get(H2H_KEY); if(s&&s.value) return JSON.parse(s.value); } catch{} return {}; }
    async function saveH2H(data) { try { await window.storage.set(H2H_KEY,JSON.stringify(data)); } catch{} }
    async function recordH2H(home,away,homeWon) {
      const data=await loadH2H(), key=h2hKey(home,away), first=key.split("|")[0];
      if(!data[key]) data[key]={t1:first,t2:key.split("|")[1],t1W:0,t2W:0,games:[]};
      const rec=data[key];
      if(first===home) { if(homeWon) rec.t1W++; else rec.t2W++; } else { if(homeWon) rec.t2W++; else rec.t1W++; }
      rec.games.push({home,away,homeWon,ts:Date.now()});
      if(rec.games.length>20) rec.games=rec.games.slice(-20);
      data[key]=rec; await saveH2H(data);

    function getH2HRecord(homeTeamId,awayTeamId,h2hData,minGames=4) {
      const key=h2hKey(homeTeamId,awayTeamId), rec=h2hData[key]; if(!rec) return null;
      const total=rec.t1W+rec.t2W; if(total<minGames) return null;
      const first=key.split("|")[0], teamW=first===homeTeamId?rec.t1W:rec.t2W;
      return {teamWins:teamW,oppWins:total-teamW,total,teamWinRate:teamW/total};
    }
    function applyH2HAdj(rawProb,homeId,awayId,h2hData) {
      const H2H_WEIGHT=0.12, MIN_H2H_GAMES=4;
      const rec=getH2HRecord(homeId,awayId,h2hData,MIN_H2H_GAMES);
      if(!rec) return {prob:rawProb,h2hAdj:0,h2hRecord:null};
      const blended=rawProb*(1-H2H_WEIGHT)+rec.teamWinRate*H2H_WEIGHT;
      const clamped=Math.max(0.05,Math.min(0.95,blended));
      return {prob:clamped,h2hAdj:+(clamped-rawProb).toFixed(3),h2hRecord:rec};

          "RUN MARGIN: " + margin + " runs",
          spFavLine, spDogLine, weatherLine,
          "PARK: " + (park.park||rec.home) + " (pf=" + (park.pf??1.0) + ", disp=" + (park.disp??1.0) + ")",
          "VEGAS ML: " + (rec.vegasML||"unknown") + " (model was " + (rec.clvVsClose!=null?(rec.clvVsClose>0?"ahead of":"behind")+" closing line by "+Math.abs(rec.clvVsClose)+"pp":"unknown vs close") + ")",
          "",
          "AVAILABLE TAGS (pick 1-3, most important first):",
          "sp_mismatch - starter underperformed projection",
          "bullpen_blow - bullpen allowed unexpected runs",
          "off_variance - model team offense underperformed (scored " + favScore + " vs " + (projFav?.toFixed(1)??"?") + " proj)",
          "off_explosion - opponent offense exceeded projection (scored " + dogScore + " vs " + (projDog?.toFixed(1)??"?") + " proj)",
          "weather_park - weather or park factor caused unusual scoring",
          "market_drift - line moved against model before game",
          "lineup_change - late lineup change or key player scratched",
          "small_sample - genuinely fluky result, no clear cause",
          "",
          'Respond with ONLY a JSON array of tag IDs. Example: ["bullpen_blow","off_variance"]',
          "No explanation, no extra text, just the JSON array."
        ].filter(Boolean).join("\n");;

        const response = await callAI(prompt, 100, 0.2);
        const clean = response.trim().replace(/```json|```/g, "").trim();
        const tags = JSON.parse(clean);
        if (Array.isArray(tags) && tags.length > 0) {
          const validIds = new Set(["sp_mismatch","bullpen_blow","off_variance","off_explosion","weather_park","market_drift","lineup_change","small_sample"]);
          const filtered = tags.filter(t => validIds.has(t)).slice(0, 3);
          if (filtered.length > 0) {
            await saveGameTags(game.id, [...filtered, "_auto"]); // _auto marks AI-generated
          }
        }
      } catch(e) {
        // Silent fail — tagging is best-effort
      }
    }

    // Batch tag all untagged losses — runs on Model Performance tab load
    // Processes up to 5 losses at a time to avoid hammering the API
    async function batchTagLosses(losses, maxBatch=5) {
      if (!localStorage.getItem("mlb_ai_key")) return 0;
      const untagged = losses.filter(g =>
        !g.mlHit &&
        (!g.errorTags || g.errorTags.length === 0 ||
         (g.errorTags.length === 1 && g.errorTags[0] === "_auto"))
      ).slice(0, maxBatch);
      let count = 0;
      for (const g of untagged) {
        try {
          await autoTagLoss(g);
          count++;
          await new Promise(r => setTimeout(r, 1500)); // pace API calls
        } catch(e) {}
      }
      return count;
    }

    // ── Calibration ───────────────────────────────────────────────
    const PRED_KEY="mlb_predictions", MAX_PREDS=500;
    const HISTORICAL_CALIB_PRIORS = [
      {label:"50-55%",min:0.50,max:0.55,midpoint:0.525,actualRate:0.528,n:4200},
      {label:"55-60%",min:0.55,max:0.60,midpoint:0.575,actualRate:0.569,n:3800},
      {label:"60-65%",min:0.60,max:0.65,midpoint:0.625,actualRate:0.608,n:2400},
      {label:"65-70%",min:0.65,max:0.70,midpoint:0.675,actualRate:0.641,n:1200},
      {label:"70%+",  min:0.70,max:1.00,midpoint:0.750,actualRate:0.694,n:550 },
    ];
    // NB-routed games: high-variance matchups have compressed win rates (upsets more common)
    const NB_CALIB_PRIORS = [
      {label:"50-55%",min:0.50,max:0.55,midpoint:0.525,actualRate:0.521,n:800},
      {label:"55-60%",min:0.55,max:0.60,midpoint:0.575,actualRate:0.558,n:720},
      {label:"60-65%",min:0.60,max:0.65,midpoint:0.625,actualRate:0.591,n:440},
      {label:"65-70%",min:0.65,max:0.70,midpoint:0.675,actualRate:0.621,n:220},
      {label:"70%+",  min:0.70,max:1.00,midpoint:0.750,actualRate:0.668,n:100},
    ];
    async function loadPredictions() { try { const s=await window.storage.get(PRED_KEY); if(s&&s.value) return JSON.parse(s.value); } catch{} return {predictions:[]}; }
    async function savePredictions(data) { try { if(data.predictions.length>MAX_PREDS) data.predictions=data.predictions.slice(-MAX_PREDS); await window.storage.set(PRED_KEY,JSON.stringify(data)); } catch{} }
    async function recordPrediction(gameId,home,away,hWinPct,modelOU,nbRouted=false) {
      const data=await loadPredictions(); if(data.predictions.find(p=>p.id===gameId)) return;
      data.predictions.push({id:gameId,home,away,predictedAt:Date.now(),hWinPct:parseFloat(hWinPct)/100,modelOU:parseFloat(modelOU),outcome:null,nbRouted});
      await savePredictions(data);
    }
    async function settlePrediction(gameId,homeWon,actualTotal) {
      const data=await loadPredictions(), pred=data.predictions.find(p=>p.id===gameId);
      if(!pred||pred.outcome) return;
      pred.outcome={homeWon,actualTotal,settledAt:Date.now()};
      await savePredictions(data);
    }
    function computeCalibration(predictions) {
      const settled=predictions.filter(p=>p.outcome!=null);
      const liveBuckets={}, nbLiveBuckets={};
      let correct=0,brierSum=0,ouCorrect=0,ouTotal=0,maeSum=0;
      let nbCorrect=0,nbTotal=0;
      for (const p of settled) {
        const favHome=p.hWinPct>=0.5, favWon=favHome?p.outcome.homeWon:!p.outcome.homeWon, favProb=favHome?p.hWinPct:1-p.hWinPct;
        if(favWon) correct++;
        if(p.nbRouted) { nbTotal++; if(favWon) nbCorrect++; }
        brierSum+=Math.pow(p.hWinPct-(p.outcome.homeWon?1:0),2);
        if(p.modelOU&&p.outcome.actualTotal!=null) {
          ouTotal++;
          if((p.modelOU>9.0&&p.outcome.actualTotal>p.modelOU)||(p.modelOU<=9.0&&p.outcome.actualTotal<=p.modelOU)) ouCorrect++;
          maeSum+=Math.abs(p.outcome.actualTotal-p.modelOU);
        }
        // Track separate calibration buckets for NB vs Poisson games
        const bucketSet = p.nbRouted ? nbLiveBuckets : liveBuckets;
        for (const prior of HISTORICAL_CALIB_PRIORS) {
          if(favProb>=prior.min&&favProb<prior.max) {
            if(!bucketSet[prior.label]) bucketSet[prior.label]={wins:0,n:0};
            bucketSet[prior.label].n++; if(favWon) bucketSet[prior.label].wins++; break;
          }
        }
      }
      const calibration=HISTORICAL_CALIB_PRIORS.map(prior => {
        const live=liveBuckets[prior.label]||{wins:0,n:0};
        const totalN=prior.n+live.n;
        const blendedRate=(prior.n*prior.actualRate+live.n*(live.n>0?live.wins/live.n:prior.actualRate))/totalN;
        const correction=Math.max(0.5,Math.min(2.0,blendedRate/prior.midpoint));
        return {label:prior.label,min:prior.min,max:prior.max,midpoint:prior.midpoint,n:live.n,priorN:prior.n,actualRate:blendedRate,liveRate:live.n>0?live.wins/live.n:null,priorRate:prior.actualRate,correction};
      });
      const nbCalibration = NB_CALIB_PRIORS.map(prior => {
        const live=nbLiveBuckets[prior.label]||{wins:0,n:0};
        const totalN=prior.n+live.n;
        const blendedRate=(prior.n*prior.actualRate+live.n*(live.n>0?live.wins/live.n:prior.actualRate))/totalN;
        const correction=Math.max(0.5,Math.min(2.0,blendedRate/prior.midpoint));
        return {label:prior.label,n:live.n,actualRate:blendedRate,correction};
      });
      return {total:settled.length,accuracy:settled.length>0?correct/settled.length:null,brierScore:settled.length>0?brierSum/settled.length:null,ouAccuracy:ouTotal>0?ouCorrect/ouTotal:null,ouMAE:ouTotal>0?maeSum/ouTotal:null,calibration,nbCalibration,nbAccuracy:nbTotal>0?nbCorrect/nbTotal:null,nbGames:nbTotal,settled,hasHistoricalPrior:true};
    }
    function applyCalibration(rawProb, calibrationBuckets, nbRouted=false) {
      // Use NB-specific priors for high-variance games, standard priors for normal games
      const defaultPriors = nbRouted ? NB_CALIB_PRIORS : HISTORICAL_CALIB_PRIORS;
      const tighten = getCalibTightening();
      const buckets = calibrationBuckets || defaultPriors.map(p=>({
        ...p, n:p.n,
        // Apply calibration tightening: pulls correction toward 1.0 when model is unstable
        correction: Math.max(0.5, Math.min(2.0, 1.0 + (p.actualRate/p.midpoint - 1.0) * tighten))
      }));
      const favProb=rawProb>=0.5?rawProb:1-rawProb;
      const bucket=buckets.find(b=>favProb>=b.min&&favProb<b.max);
      if(!bucket) return rawProb;
      const corrected=favProb*bucket.correction, clamped=Math.max(0.05,Math.min(0.95,corrected));
      return rawProb>=0.5?clamped:1-clamped;
    }

    // ── Page: XY Explorer ─────────────────────────────────────────
    function XYExplorerPage() {
      const {teams}=useLive();
      const [xKey,setXKey]=useState("era"), [yKey,setYKey]=useState("winPct");
      const numCols=ALL_COLUMNS.filter(c=>!["streak","last10"].includes(c.key));
      const xs=teams.map(t=>t[xKey]).filter(v=>typeof v==="number");
      const ys=teams.map(t=>t[yKey]).filter(v=>typeof v==="number");
      const xMin=Math.min(...xs),xMax=Math.max(...xs),yMin=Math.min(...ys),yMax=Math.max(...ys);
      const W=570,H=370,pad=0.06;
      const toX=v=>30+(pad+(v-xMin)/(xMax-xMin||1)*(1-2*pad))*(W-40);
      const toY=v=>10+(pad+(1-(v-yMin)/(yMax-yMin||1))*(1-2*pad))*(H-40);
      return (
        <div style={{padding:"1.5rem"}}>
          <SectionHeader>XY EXPLORER <LiveBadge/></SectionHeader>

            <Ctrl label="Y Axis"><select value={yKey} onChange={e=>setYKey(e.target.value)} style={ss}>{numCols.map(c=><option key={c.key} value={c.key}>{c.label}</option>)}</select></Ctrl>
          </div>
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:4,padding:"1rem",overflowX:"auto"}}>
            <svg width={W} height={H}>
              <line x1={30} y1={H-30} x2={W-10} y2={H-30} stroke={C.border} strokeWidth={1}/>
              <line x1={30} y1={10} x2={30} y2={H-30} stroke={C.border} strokeWidth={1}/>
              <text x={W/2} y={H-4} textAnchor="middle" fontSize={10} fill={C.muted}>{ALL_COLUMNS.find(c=>c.key===xKey)?.label}</text>
              <text x={10} y={H/2} textAnchor="middle" fontSize={10} fill={C.muted} transform={`rotate(-90,10,${H/2})`}>{ALL_COLUMNS.find(c=>c.key===yKey)?.label}</text>
              {[0.25,0.5,0.75].map(p=><g key={p}><line x1={30+p*(W-40)} y1={10} x2={30+p*(W-40)} y2={H-30} stroke={C.border} strokeWidth={0.5} strokeDasharray="3,4"/><line x1={30} y1={10+p*(H-40)} x2={W-10} y2={10+p*(H-40)} stroke={C.border} strokeWidth={0.5} strokeDasharray="3,4"/></g>)}
              {teams.map(t=>{const xv=t[xKey],yv=t[yKey];if(typeof xv!=="number"||typeof yv!=="number")return null;return<g key={t.id}><circle cx={toX(xv)} cy={toY(yv)} r={9} fill={t.color} opacity={0.88} stroke="#fff" strokeWidth={0.5}/><text x={toX(xv)} y={toY(yv)+4} textAnchor="middle" fontSize={6.5} fill="#fff" fontWeight="bold">{t.id}</text></g>;})}
            </svg>
          </div>
        </div>
      );
    }

    // ── Page: Matchup Simulator ───────────────────────────────────
    function MatchupSimPage() {
      const {teams}=useLive();

      const [hfa,setHfa]=useState(true), [homeSpSlot,setHomeSpSlot]=useState(2), [awaySpSlot,setAwaySpSlot]=useState(2);
      const [result,setResult]=useState(null), [aiText,setAiText]=useState(""), [aiLoad,setAiLoad]=useState(false);
      const [simH2H,setSimH2H]=useState(null), [simH2hData,setSimH2hData]=useState({});
      const sorted=useMemo(()=>[...teams].sort((a,b)=>a.name.localeCompare(b.name)),[teams]);
      const home=teams.find(t=>t.id===homeId)||BASELINE.find(t=>t.id===homeId);
      const away=teams.find(t=>t.id===awayId)||BASELINE.find(t=>t.id===awayId);
      const SP_LABELS=["Ace (#1)","Solid #2","Mid-rotation #3","Back-end #4","5th Starter"];
      useEffect(()=>{loadH2H().then(d=>setSimH2hData(d));},[]);
      useEffect(()=>{if(home&&away){const rec=getH2HRecord(homeId,awayId,simH2hData);setSimH2H(rec);}},[homeId,awayId,simH2hData]);
      async function simulate() {
        const r=predictMatchup(home,away,hfa,homeSpSlot,awaySpSlot);
        setResult(r); setAiText(""); setAiLoad(true);

    function GameDetailModal({game, onClose}) {
      const [detail, setDetail] = useState(null);
      const [loading, setLoading] = useState(true);
      const isLiveGame = game?._state === "live";

      useEffect(()=>{
        if (!game?.id) return;
        async function fetchDetail() {
          try {
            // Fetch linescore and boxscore together
            const [lsRes, bsRes] = await Promise.all([
              fetch(`https://statsapi.mlb.com/api/v1/game/${game.id}/linescore`).catch(()=>null),
              fetch(`https://statsapi.mlb.com/api/v1/game/${game.id}/boxscore`).catch(()=>null),
            ]);
            if (lsRes && lsRes.ok) {
              const ls = await lsRes.json();
              // Build a battingOrder lookup from boxscore
              if (bsRes && bsRes.ok) {
                const bs = await bsRes.json();
                const orderMap = {};
                for (const side of ["away","home"]) {
                  const players = bs.teams?.[side]?.players || {};
                  for (const p of Object.values(players)) {
                    if (p.battingOrder) {
                      orderMap[p.person?.id] = Math.ceil(parseInt(p.battingOrder) / 100);
                    }
                  }
                }
                ls._orderMap = orderMap;
              }
              setDetail(ls);
            }
          } catch(e) {}
          setLoading(false);
        }
        fetchDetail();
        // Auto-refresh every 15s for live games
        if (isLiveGame) {
          const interval = setInterval(fetchDetail, 15000);
          return () => clearInterval(interval);
        }
      }, [game?.id, isLiveGame]);

      if (!game) return null;
      const isFinal = game._state === "final";
      const isLive  = game._state === "live";

      const innings = detail?.innings || [];
      const totalInnings = Math.max(9, innings.length);
      const inningNums = Array.from({length: totalInnings}, (_, i) => i+1);

      const awayRuns = innings.reduce((s,i)=>s+(i.away?.runs??0),0);
      const homeRuns = innings.reduce((s,i)=>s+(i.home?.runs??0),0);
      const awayHits = innings.reduce((s,i)=>s+(i.away?.hits??0),0);
      const homeHits = innings.reduce((s,i)=>s+(i.home?.hits??0),0);
      const awayErrs = innings.reduce((s,i)=>s+(i.away?.errors??0),0);
      const homeErrs = innings.reduce((s,i)=>s+(i.home?.errors??0),0);

      const onFirst  = !!detail?.offense?.first;
      const onSecond = !!detail?.offense?.second;
      const onThird  = !!detail?.offense?.third;

      const headerCell = {...cellStyle,fontSize:"0.6rem",color:C.dim,fontWeight:"bold",background:C.header};
      const statCell = {...cellStyle,fontWeight:"bold",fontSize:"0.82rem",minWidth:"2.2rem",color:C.gold};

      // Base diamond component
      function BaseDiamond() {
        const size = 13;
        const gap = 3;
        const occupied = "#c9a84c";
        const empty = "#333";
        const base = (filled) => ({
          width: size, height: size,
          background: filled ? occupied : empty,
          border: "1.5px solid " + (filled ? occupied : "#555"),
          transform: "rotate(45deg)",
          borderRadius: 2,
          flexShrink: 0,
        });
        return (
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:gap,userSelect:"none"}}>
            {/* 2nd base (top) */}
            <div style={base(onSecond)}/>
            {/* 1st and 3rd (middle row) */}
            <div style={{display:"flex",gap:gap*3+size}}>
              <div style={base(onThird)}/>
              <div style={base(onFirst)}/>
            </div>
            {/* Home (bottom) - always empty indicator */}
            <div style={{...base(false),background:"#222",border:"1.5px solid #444"}}/>
          </div>
        );
      }

      return (
        <div style={{position:"fixed",inset:0,zIndex:100,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"flex-end"}} onClick={onClose}>
          <div style={{width:"100%",maxHeight:"85vh",background:C.surface,borderRadius:"12px 12px 0 0",overflow:"auto",border:"1px solid "+C.border}} onClick={e=>e.stopPropagation()}>
            <div style={{padding:"0.75rem 1rem",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid "+C.border,position:"sticky",top:0,background:C.surface,zIndex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:"0.6rem"}}>
                <div style={{fontSize:"0.75rem",fontWeight:"bold",color:C.gold,letterSpacing:"0.08em"}}>
                  {isLive?"LIVE":isFinal?"FINAL":fmtTime(game.start_time)}
                  {isLive&&game.inning&&<span style={{color:C.dim,fontWeight:"normal",marginLeft:"0.5rem"}}>{game.inningHalf} {game.inning}</span>}
                </div>
                {isLive&&<span style={{fontSize:"0.55rem",color:C.dim,letterSpacing:"0.06em"}}>↻ 15s</span>}
              </div>
              <button onClick={onClose} style={{background:"none",border:"none",color:C.muted,fontSize:"1.2rem",cursor:"pointer",padding:"0.2rem 0.4rem",lineHeight:1}}>✕</button>
            </div>

            <div style={{padding:"1rem"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",alignItems:"center",marginBottom:"1.25rem",gap:"0.5rem"}}>
                <div style={{display:"flex",alignItems:"center",gap:"0.5rem"}}>
                  <TeamLogo abbr={game.awayTeam.id} color={game.awayTeam.color} size={32}/>
                  <div>
                    <div style={{fontSize:"0.9rem",fontWeight:"bold"}}>{game.awayTeam.name}</div>
                    <div style={{fontSize:"0.65rem",color:C.dim}}>Away</div>

                </div>
                <div style={{textAlign:"center"}}>
                  {game._hasScore

                        <span style={{fontSize:"2.8rem",fontWeight:"bold",color:game.aScore>game.hScore?C.green:C.muted}}>{game.aScore}</span>
                        <span style={{fontSize:"1rem",color:C.dim}}>-</span>
                        <span style={{fontSize:"2.8rem",fontWeight:"bold",color:game.hScore>game.aScore?C.green:C.muted}}>{game.hScore}</span>

                  <div>
                    <div style={{fontSize:"0.9rem",fontWeight:"bold"}}>{game.homeTeam.name}</div>
                    <div style={{fontSize:"0.65rem",color:C.dim}}>Home</div>
                  </div>
                  <TeamLogo abbr={game.homeTeam.id} color={game.homeTeam.color} size={32}/>

              </div>

              {loading&&<div style={{textAlign:"center",padding:"1rem"}}><Dots/></div>}

              {!loading&&innings.length>0&&(
                <div style={{marginBottom:"1.25rem"}}>
                  <div style={{fontSize:"0.62rem",letterSpacing:"0.1em",color:C.dim,marginBottom:"0.5rem"}}>LINE SCORE</div>
                  <div style={{overflowX:"auto",border:"1px solid "+C.border,borderRadius:6}}>
                    <table style={{borderCollapse:"collapse",fontSize:"0.75rem",width:"100%"}}>
                      <thead>
                        <tr style={{background:C.header}}>
                          <td style={{...headerCell,textAlign:"left",minWidth:"3rem",paddingLeft:"0.6rem"}}></td>
                          {inningNums.map(n=><td key={n} style={headerCell}>{n}</td>)}
                          <td style={{...statCell,background:C.header,color:C.dim,fontSize:"0.6rem"}}>R</td>
                          <td style={{...statCell,background:C.header,color:C.dim,fontSize:"0.6rem"}}>H</td>
                          <td style={{...statCell,background:C.header,color:C.dim,fontSize:"0.6rem",borderRight:"none"}}>E</td>
                        </tr>
                      </thead>
                      <tbody>
                        {[
                          {label:game.awayTeam.id, key:"away", score:game.aScore, hits:awayHits, errs:awayErrs},
                          {label:game.homeTeam.id, key:"home", score:game.hScore, hits:homeHits, errs:homeErrs},
                        ].map(row=>(
                          <tr key={row.key} style={{borderTop:"1px solid "+C.border}}>
                            <td style={{...cellStyle,textAlign:"left",fontWeight:"bold",paddingLeft:"0.6rem",color:C.text}}>{row.label}</td>
                            {inningNums.map(n=>{
                              const inn = innings[n-1];
                              const val = inn?.[row.key]?.runs;
                              const isCurrentInning = isLive && game.inning === n;
                              return <td key={n} style={{...cellStyle,background:isCurrentInning?"rgba(201,168,76,0.1)":"transparent",color:val>0?C.text:C.dim}}>{val!=null?val:inn?"0":"—"}</td>;
                            })}
                            <td style={statCell}>{row.score??0}</td>
                            <td style={statCell}>{row.hits}</td>
                            <td style={{...statCell,borderRight:"none"}}>{row.errs}</td>

                      </tbody>
                    </table>

              {!loading&&innings.length===0&&game._hasScore&&(
                <div style={{textAlign:"center",padding:"1rem",color:C.dim,fontSize:"0.8rem"}}>Linescore not available</div>
              )}

              {isLive&&detail&&(
                <div style={{marginTop:"0.75rem",padding:"0.75rem",background:C.bg,borderRadius:6,border:"1px solid "+C.border}}>
                  <div style={{fontSize:"0.6rem",letterSpacing:"0.1em",color:C.dim,marginBottom:"0.6rem"}}>CURRENT AT BAT</div>
                  {(()=>{

                    const pitcherName = detail.defense?.pitcher?.fullName;
                    const batterId = detail.offense?.batter?.id;
                    const batterSpot = (batterId && detail._orderMap) ? detail._orderMap[batterId] : null;
                    // Pitcher role: compare to game's probable pitcher stored in context
                    const currentInning = detail.currentInning || game.inning || 1;
                    const probablePitcherAway = detail.teams?.away?.probablePitcher?.fullName || null;
                    const probablePitcherHome = detail.teams?.home?.probablePitcher?.fullName || null;
                    const probablePitcher = probablePitcherAway || probablePitcherHome;
                    let pitcherRole = null;
                    if (pitcherName) {

                      </div>

                  })()}
                </div>

    function ScoreboardPage() {
      const {allGames,loading,refresh,dataStatus,teams}=useLive();
      const [view, setView] = useState("results");
      const [selectedGame, setSelectedGame] = useState(null);
      const recordMap = useMemo(()=>{
        const m={};
        for (const t of teams) m[t.id]={wins:t.wins||0,losses:t.losses||0};
        return m;
      },[teams]);

      function gameState(g) {
        const s = (g.status||"").toLowerCase();
        if (s==="final"||s==="closed") return "final";
        if (s==="inprogress"||s==="live") return "live";
        return "scheduled";
      }

      function hasRealScore(g) {
        const state = gameState(g);
        return (state==="final"||state==="live") && g.hScore!=null && g.aScore!=null;
      }

      const enriched = useMemo(()=>{
        const liveDates = new Set(
          allGames.filter(g=>g._source==="live").map(g=>localDateKey(g.start_time))
        );
        const hasAnyLive = liveDates.size > 0;
        return allGames
          .filter(g=>{
            if(hasAnyLive && g._source==="seed" && liveDates.has(g.start_time.slice(0,10))) return false;
            return true;
          })
          .map(g=>{
            const ht=BASELINE.find(t=>t.id===g.home), at=BASELINE.find(t=>t.id===g.away);
            if(!ht||!at) return null;
            return {...g, homeTeam:ht, awayTeam:at, _state:gameState(g), _hasScore:hasRealScore(g)};
          })
          .filter(Boolean);
      },[allGames]);

      const resultGames = useMemo(()=>{
        const finals = enriched
          .filter(g => g._state==="final" || g._state==="live")
          .sort((a,b)=>new Date(b.start_time)-new Date(a.start_time));
        const out={};
        finals.forEach(g=>{
          const day=fmtDate(g.start_time);
