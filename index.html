    async function recordVsVegas(game, odds, ctx=null) {
      const gameDate = localDateKey(game.start_time);
      if (gameDate < REGULAR_SEASON_START) return;
      if (game.gameType && game.gameType !== "R" && game.gameType !== "P") return;
      const s = (game.status||"").toLowerCase();
      if (s !== "final" && s !== "closed") return;
      if (game.hScore == null || game.aScore == null) return;

      const data = await loadVsVegas();
      const existingIdx = data.games.findIndex(g => g.id === game.id);
      // Re-record if existing entry has no Vegas ML (odds weren't loaded first time)
      if (existingIdx >= 0 && data.games[existingIdx].vegasML != null) return;
      if (existingIdx >= 0) data.games.splice(existingIdx, 1); // remove stale entry

      const total = game.hScore + game.aScore;
      const homeWon = game.hScore > game.aScore;
      const mHWin = parseFloat(odds.hWinPct || 50);
      const mAWin = parseFloat(odds.aWinPct || 50);

      // ML pick: use value pick (edge vs Vegas) not just model favorite
      const vegasHProb = odds.hMLraw != null ? (odds.hMLraw < 0 ? Math.abs(odds.hMLraw)/(Math.abs(odds.hMLraw)+100) : 100/(odds.hMLraw+100)) : null;
      const vegasAProb = odds.aMLraw != null ? (odds.aMLraw < 0 ? Math.abs(odds.aMLraw)/(Math.abs(odds.aMLraw)+100) : 100/(odds.aMLraw+100)) : null;
      const hValueEdge = vegasHProb != null ? (mHWin/100) - vegasHProb : null;
      const aValueEdge = vegasAProb != null ? (mAWin/100) - vegasAProb : null;
      // Pick the value side; fall back to model favorite if no Vegas line
      const pickHome = (hValueEdge != null && aValueEdge != null)
        ? hValueEdge >= aValueEdge
        : mHWin >= mAWin;
      const modelFavHome = pickHome;
      const modelFavTeam = pickHome ? game.home : game.away;
      const modelFavPct  = pickHome ? mHWin : mAWin;
      const modelFavWon  = pickHome ? homeWon : !homeWon;
      const mlHit = modelFavWon;
      const margin = game.hScore - game.aScore;
      // RL: always track value pick team at -1.5 (consistent with ML/OU model tracking)
      const rlHit = pickHome ? margin >= 2 : margin <= -2;

      // O/U: use Vegas line if available, else model projected total
      const closingKey = `${game.home}|${game.away}|${localDateKey(game.start_time)}`;
      const storedCL = (() => { try { const r = localStorage.getItem("mlb_closing_lines"); if(r) { const p=JSON.parse(r); return p[closingKey]; } } catch(e){} return null; })();
      const vegasOU = storedCL?.ou ? parseFloat(storedCL.ou) : null;
      const ouLine = vegasOU || parseFloat(odds.ou) || null;
      // Model's pick: projected total vs Vegas line
      const projTotal = (odds.aRuns || 0) + (odds.hRuns || 0);
      const modelPickOver = vegasOU ? projTotal > vegasOU : parseFloat(odds.overPct) >= 50;
      const modelOUPick = modelPickOver ? "OVER" : "UNDER";
      const ouHit = ouLine != null
        ? (total === ouLine ? null   // push — exclude from accuracy
           : modelPickOver ? total > ouLine : total < ouLine)
        : null;
      // Always prefer closing line ML over live odds at record time (alignment fix)
      const vegasML = pickHome
        ? (closingLineData?.hML || odds.hML || null)
        : (closingLineData?.aML || odds.aML || null);
      const modelRLLine = pickHome ? (odds.hRL || null) : (odds.aRL || null);

      // Pull projected runs — prefer direct property, fall back to sim
      const projHomeRuns = odds.hRuns != null ? +odds.hRuns : (odds.sim ? +odds.sim.hAvgRuns : null);
      const projAwayRuns = odds.aRuns != null ? +odds.aRuns : (odds.sim ? +odds.sim.aAvgRuns : null);
      // Store simulation confidence bands (Monte Carlo distribution width)
      const sim = odds.sim;
      const simOverPct  = sim && ouLine ? +(simOverProb(sim.totalDist, ouLine)*100).toFixed(1) : null;
      const simRLCover  = sim ? +(sim.rlCoverPct).toFixed(1) : null;   // % sims fav covers -1.5
      const simWinPct   = +(modelFavPct).toFixed(1);                    // already stored
      // Distribution width: % of sims within 1 run of mean (tighter = more certain)
      const simTotal = sim?.totalDist?.reduce((s,v)=>s+v,0) || 0;
      const projMean = projHomeRuns && projAwayRuns ? +(projHomeRuns+projAwayRuns).toFixed(1) : null;
      const simWithin1 = (sim && projMean && simTotal > 0)
        ? +((sim.totalDist.slice(Math.max(0,Math.floor(projMean)-1), Math.ceil(projMean)+2).reduce((s,v)=>s+v,0)/simTotal)*100).toFixed(1)
        : null;

      // CLV: compare model's implied probability vs closing line probability
      const clvKey = `${game.home}|${game.away}|${localDateKey(game.start_time)}`;
      const openLineData = (() => {
        try {
          const r = localStorage.getItem(OPEN_LINES_KEY);
          if (!r) return null;
          const ol = JSON.parse(r);
          if (ol[clvKey]) return ol[clvKey];
          const d = new Date(game.start_time);
          const alt1 = `${game.home}|${game.away}|${d.toISOString().slice(0,10)}`;
          if (ol[alt1]) return ol[alt1];
          const dNext = new Date(d.getTime() + 86400000);
          const dPrev = new Date(d.getTime() - 86400000);
          return ol[`${game.home}|${game.away}|${dNext.toISOString().slice(0,10)}`]
              || ol[`${game.home}|${game.away}|${dPrev.toISOString().slice(0,10)}`]
              || null;
        } catch{return null;}
      })();
      const closingLineData = (() => {
        try {
          const r = localStorage.getItem(CLOSING_LINES_KEY);
          if (!r) return null;
          const cl = JSON.parse(r);
          // Try exact key first, then day-shifted variants for timezone edge cases
          if (cl[clvKey]) return cl[clvKey];
          const d = new Date(game.start_time);
          const alt1 = `${game.home}|${game.away}|${d.toISOString().slice(0,10)}`;
          if (cl[alt1]) return cl[alt1];
          // Try next/prev day
          const dNext = new Date(d.getTime() + 86400000);
          const dPrev = new Date(d.getTime() - 86400000);
          const alt2 = `${game.home}|${game.away}|${dNext.toISOString().slice(0,10)}`;
          const alt3 = `${game.home}|${game.away}|${dPrev.toISOString().slice(0,10)}`;
          return cl[alt2] || cl[alt3] || null;
        } catch{return null;}
      })();

      // Model's implied probability for the pick
      const modelPickProb = pickHome ? (mHWin/100) : (mAWin/100);
      // Open line implied prob for that side
      const openRaw  = pickHome ? openLineData?.hMLraw  : openLineData?.aMLraw;
      const closeRaw = pickHome ? closingLineData?.hMLraw : closingLineData?.aMLraw;
      const rawToProb = r => r==null?null:(r<0?Math.abs(r)/(Math.abs(r)+100):100/(r+100));
      const openImplied  = rawToProb(openRaw);
      const closeImplied = rawToProb(closeRaw);
      // CLV vs Open: model prob - open implied (positive = model was ahead of opening market)
      const clvVsOpen  = openImplied  != null ? +(( modelPickProb - openImplied  )*100).toFixed(1) : null;
      // CLV vs Close: model prob - closing implied (positive = model beat the closing line)
      // Fallback: use live odds at settlement time if no closing line stored
      const fallbackCloseRaw = pickHome ? odds.hMLraw : odds.aMLraw;
      const fallbackCloseImplied = closeImplied ?? (fallbackCloseRaw != null
        ? (fallbackCloseRaw < 0 ? Math.abs(fallbackCloseRaw)/(Math.abs(fallbackCloseRaw)+100) : 100/(fallbackCloseRaw+100))
        : null);
      const clvVsClose = fallbackCloseImplied != null ? +(( modelPickProb - fallbackCloseImplied )*100).toFixed(1) : null;
      // Line movement: close - open (positive = line moved toward our pick = sharp money agreed)
      const lineMove   = (openImplied!=null&&closeImplied!=null) ? +((closeImplied-openImplied)*100).toFixed(1) : null;

      // Derive context segments for performance analysis
      const park = PARK_FACTORS[game.home] || {};
      const totalBucket = ouLine
        ? ouLine <= 7.0 ? "low" : ouLine <= 8.5 ? "mid" : "high"
        : null;
      // Favorite tier based on model confidence
      const favTier = Math.abs(mHWin - 50) < 5 ? "pick" :
                      Math.abs(mHWin - 50) < 12 ? "slight" :
                      Math.abs(mHWin - 50) < 20 ? "moderate" : "heavy";
      // Whether model pick is the underdog vs Vegas
      const vegasPickProb = closeImplied || openImplied;
      const pickIsUnderdog = vegasPickProb != null && modelPickProb > 0.5 && vegasPickProb < 0.5;
      const pickIsDog = vegasPickProb != null ? vegasPickProb < 0.48 : false;
      // Park regime
      const parkDisp = park.disp ?? 1.0;
      const parkRegime = parkDisp >= 1.10 ? "high_disp" : parkDisp <= 0.93 ? "low_disp" : "neutral";
      // SP regime from ctx
      const homeSlot = ctx?.sp?.homeSlot ?? 2;
      const awaySlot = ctx?.sp?.awaySlot ?? 2;
      // Record games played at time of game for 40-game threshold filtering
      const homeGP = (()=>{ try { const t=getT(game.home); return t?(t.wins||0)+(t.losses||0):0; } catch{return 0;}})();
      const awayGP = (()=>{ try { const t=getT(game.away); return t?(t.wins||0)+(t.losses||0):0; } catch{return 0;}})();
      const minGP  = Math.min(homeGP, awayGP); // both teams must have 40+ games
      const spRegime = Math.min(homeSlot, awaySlot) <= 1 ? "ace" :
                       Math.max(homeSlot, awaySlot) >= 3 ? "backend" : "mid";
      // Bullpen stress from ctx (high = recently used bullpen)
      const bullpenStressed = (() => {
        try {
          const hs = bullpenStressMultiplier(game.home);
          const as = bullpenStressMultiplier(game.away);
          return Math.max(hs, as) >= 1.05;
        } catch { return false; }
      })();

      data.games.push({
        id: game.id,
        date: localDateKey(game.start_time),
        home: game.home, away: game.away,
        modelFavTeam, modelFavPct,
        vegasML, mlHit,
        modelRLTeam: modelFavTeam, modelRLLine, rlHit,
        modelOUPick, ouLine, ouHit,
        hScore: game.hScore, aScore: game.aScore, total,
        projHomeRuns, projAwayRuns,
        projTotal: ouLine,
        clvVsOpen, clvVsClose, lineMove,
        openML: pickHome ? openLineData?.hML : openLineData?.aML,
        closeML: closingLineData ? (pickHome ? closingLineData.hML : closingLineData.aML) : null,
        // Monte Carlo confidence
        simOverPct, simRLCover, simWithin1,
        // Context segments
        minGP, // games played when recorded — used for 40-game threshold filter
        totalBucket, favTier, pickIsDog, parkRegime, spRegime, bullpenStressed,
        settledAt: Date.now(),
      });

      await saveVsVegas(data);

      // Auto-tag losses using AI attribution (async, non-blocking)
      if (!mlHit) setTimeout(() => autoTagLoss(game), 2000);

      // Update Poisson lambda adjustments from this game's prediction error
      await updateLambdaAdj(game.home, game.away, projHomeRuns, projAwayRuns, game.hScore, game.aScore);
      await refreshLambdaAdj();

      // Update pitcher ERA from boxscore if available
      try {
        const bsRes = await fetch(`https://statsapi.mlb.com/api/v1/game/${game.id}/boxscore`).catch(()=>null);
        if (bsRes && bsRes.ok) {
          const bs = await bsRes.json();
          for (const side of ["away","home"]) {
            const pitchers = bs.teams?.[side]?.pitchers || [];
            const players  = bs.teams?.[side]?.players  || {};
            for (const pid of pitchers) {
              const p = players["ID"+pid];
              if (!p) continue;
              const name = p.person?.fullName;
              const er   = p.stats?.pitching?.earnedRuns;
              const ipStr = p.stats?.pitching?.inningsPitched;
              const ip    = ipStr ? parseFloat(ipStr) : null;
              if (name && er != null && ip != null && ip > 0) {
                const tAbbr = MLB_ID_TO_ABBR[bs.teams?.[side]?.team?.id] || null;
                recordPitcherOuting(name, er, ip, tAbbr);
              }
            }
          }
        }
      } catch(e) {}
    }

    function mlToProb(mlStr) {
      if (!mlStr) return null;
      const n = parseFloat(mlStr.replace(/[^0-9\-+]/g,''));
      if (isNaN(n)) return null;
      return n < 0 ? Math.abs(n)/(Math.abs(n)+100) : 100/(n+100);
    }

    // Parse American odds string to decimal multiplier (profit per unit)
    function mlToDecimal(mlStr) {
      if (!mlStr || mlStr === "—") return null;
      const n = parseFloat((mlStr||"").replace(/[^0-9\-+]/g,''));
      if (isNaN(n)) return null;
      return n < 0 ? 100/Math.abs(n) : n/100;
    }

    // Flat 1-unit ROI — all values in units (1u per bet)
    function computeROI(games, pickField, hitField, mlField) {
      let spent = 0, returned = 0, wins = 0, losses = 0, pushes = 0;
      for (const g of games) {
        if (g[hitField] == null) continue;
        const ml = mlField ? g[mlField] : null;
        spent += 1;
        if (g[hitField] === true) {
          wins++;
          const dec = mlToDecimal(ml);
          returned += 1 + (dec != null ? dec : 0.9);
        } else {
          losses++;
        }
      }
      const net = returned - spent;
      const roi = spent > 0 ? (net/spent*100) : 0;
      return { spent:+spent.toFixed(2), returned:+returned.toFixed(2), net:+net.toFixed(2), roi:+roi.toFixed(1), wins, losses, pushes, total: wins+losses+pushes };
    }

    // Kelly-fraction stake: f = (p*(b+1) - 1) / b
    // where p = model win prob, b = decimal odds
    // Capped at 0.25 units (quarter-Kelly), floored at 0.05 units
    function kellyStake(modelProb, decimalOdds, fraction=0.25) {
      if (!modelProb || !decimalOdds || decimalOdds <= 0) return 0.1;
      const edge = modelProb * (decimalOdds + 1) - 1;
      if (edge <= 0) return 0; // no edge, no bet
      const full = edge / decimalOdds;
      return Math.max(0.05, Math.min(0.25, full * fraction));
    }

    // Kelly-weighted ROI — tests whether staking size adds or destroys value
    function computeKellyROI(games, hitField, mlField, probField) {
      let spent = 0, returned = 0, wins = 0, losses = 0;
      for (const g of games) {
        if (g[hitField] == null) continue;
        const dec = mlToDecimal(g[mlField]);
        if (dec == null) continue;
        const prob = g[probField] != null ? g[probField]/100 : 0.55;
        const stake = kellyStake(prob, dec); // already in units (0.05–0.25u)
        if (stake <= 0) continue;
        spent += stake;
        if (g[hitField] === true) { wins++; returned += stake + stake * dec; }
        else losses++;
      }
      const net = returned - spent;
      const roi = spent > 0 ? (net/spent*100) : 0;
      return { spent:+spent.toFixed(2), returned:+returned.toFixed(2), net:+net.toFixed(2), roi:+roi.toFixed(1), wins, losses, total:wins+losses };
    }

    // Confidence-tier staking: edge 1-3=0.5u, 4-5=1u, 6-7=1.5u, 8-9=2u, 10=3u
    function confidenceStake(modelFavPct) {
      const edge = Math.min(10, Math.max(1, Math.round(Math.abs((modelFavPct||50) - 50) / 2.5)));
      return edge >= 10 ? 3.0 : edge >= 8 ? 2.0 : edge >= 6 ? 1.5 : edge >= 4 ? 1.0 : 0.5;
    }

    function computeConfROI(games, hitField, mlField, probField) {
      let spent = 0, returned = 0, wins = 0, losses = 0;
      for (const g of games) {
        if (g[hitField] == null) continue;
        const dec = mlToDecimal(g[mlField]);
        const stake = confidenceStake(g[probField]); // 0.5u – 3.0u
        spent += stake;
        if (g[hitField] === true) { wins++; returned += stake + stake * (dec ?? 0.9); }
        else losses++;
      }
      const net = returned - spent;
      const roi = spent > 0 ? (net/spent*100) : 0;
      return { spent:+spent.toFixed(2), returned:+returned.toFixed(2), net:+net.toFixed(2), roi:+roi.toFixed(1), wins, losses, total:wins+losses };
    }

    function ModelPerfPage() {
      const [vvData, setVvData]       = useState(null);
      const [loading, setLoading]     = useState(true);
      const [logPage, setLogPage]     = useState(0);
      const [tagGame, setTagGame]     = useState(null);
      const [adaptiveLog, setAdaptiveLog] = useState([]);
      const [adaptiveParams, setAdaptiveParams] = useState({});
      const LOG_PER_PAGE = 15;

      useEffect(()=>{
        async function load() {
          setLoading(true);
          const vv = await loadVsVegas();
          setVvData(vv);
          setLoading(false);
          setAdaptiveParams(loadAdaptiveParams());
          // Batch tag any untagged losses in background
          const losses = (vv.games||[]).filter(g=>g.mlHit===false);
          if (losses.length > 0) {
            batchTagLosses(losses, 5).then(n => {
              if (n > 0) loadVsVegas().then(fresh => setVvData(fresh));
            });
          }
        }
        async function handleTag(gameId, tagId) {
          const data = await loadVsVegas();
          const g = data.games.find(g => g.id === gameId);
          if (!g) return;
          const existing = g.errorTags || [];
          g.errorTags = existing.includes(tagId)
            ? existing.filter(t => t !== tagId)
            : [...existing, tagId];
          await saveVsVegas(data);
          const fresh = await loadVsVegas();
          setVvData(fresh);
        }
        load();
        const id = setInterval(load, 60000);
        return () => clearInterval(id);
      },[]);

      const games   = vvData?.games || [];
      const settled = games.filter(g => g.mlHit != null);
      // Games with sufficient sample (40+ games played by both teams)
      // Pre-threshold games tracked but flagged — don't count toward accuracy
      // Track all games — no threshold exclusion
      // Early-season games are labeled but included in all metrics
      const settledValid = settled;
      // settledEarly kept for future use when 40gp threshold becomes meaningful (late April+)
      // const settledEarly = settled.filter(g => g.minGP != null && g.minGP < 40);
      const mlGames = settledValid.filter(g => g.mlHit  != null);
      const rlGames = settledValid.filter(g => g.rlHit  != null);
      const ouGames = settledValid.filter(g => g.ouHit  != null);
      const mlW = mlGames.filter(g=>g.mlHit).length;
      const rlW = rlGames.filter(g=>g.rlHit).length;
      const ouW = ouGames.filter(g=>g.ouHit).length;
      const mlPct = mlGames.length ? mlW/mlGames.length*100 : null;
      const rlPct = rlGames.length ? rlW/rlGames.length*100 : null;
      const ouPct = ouGames.length ? ouW/ouGames.length*100 : null;
      const mlRoi     = computeROI(mlGames,"modelFavTeam","mlHit","vegasML");
      const rlRoi     = computeROI(rlGames,"modelRLTeam","rlHit",null);
      const ouRoi     = computeROI(ouGames,"modelOUPick","ouHit",null);
      // Kelly-weighted ROI (stake proportional to model edge)
      const mlKelly   = computeKellyROI(mlGames,"mlHit","vegasML","modelFavPct");
      // Confidence-tier ROI (stake by edge score tier)
      const mlConf    = computeConfROI(mlGames,"mlHit","vegasML","modelFavPct");
      // Signal quality check: flat accuracy independent of stake
      const flatAccuracy = mlGames.length ? (mlGames.filter(g=>g.mlHit).length/mlGames.length*100) : null;
      const last10 = [...settled].slice(-10);
      const l10ML = last10.filter(g=>g.mlHit).length;
      const l10RL = last10.filter(g=>g.rlHit).length;
      const l10OU = last10.filter(g=>g.ouHit).length;

      // helper: compute ML/RL/OU stats for a set of games
      function bucketStats(games) {
        const mlW=games.filter(g=>g.mlHit).length, mlN=games.filter(g=>g.mlHit!=null).length;
        const rlW=games.filter(g=>g.rlHit).length, rlN=games.filter(g=>g.rlHit!=null).length;
        const ouW=games.filter(g=>g.ouHit).length, ouN=games.filter(g=>g.ouHit!=null).length;
        return {
          ml:{ w:mlW, n:mlN, pct:mlN?mlW/mlN*100:null },
          rl:{ w:rlW, n:rlN, pct:rlN?rlW/rlN*100:null },
          ou:{ w:ouW, n:ouN, pct:ouN?ouW/ouN*100:null },
        };
      }

      const buckets = [
        {label:"50-55%",min:50,max:55},{label:"55-60%",min:55,max:60},
        {label:"60-65%",min:60,max:65},{label:"65-70%",min:65,max:70},
        {label:"70%+",min:70,max:100},
      ].map(b=>{
        const bg=settled.filter(g=>g.modelFavPct>=b.min&&g.modelFavPct<b.max);
        return {...b, ...bucketStats(bg), n:bg.length};
      });

      // Edge buckets — edge = min(10,max(1,round(abs(modelFavPct-50)/2.5)))
      const edgeBuckets = [
        {label:"1-3",  min:1, max:3,  desc:"Low"},
        {label:"4-5",  min:4, max:5,  desc:"Moderate"},
        {label:"6-7",  min:6, max:7,  desc:"Strong"},
        {label:"8-9",  min:8, max:9,  desc:"Elite"},
        {label:"10",   min:10,max:10, desc:"Max"},
      ].map(b=>{
        const bg = settled.filter(g=>{
          const edge = Math.min(10,Math.max(1,Math.round(Math.abs(g.modelFavPct-50)/2.5)));
          return edge >= b.min && edge <= b.max;
        });
        return {...b, ...bucketStats(bg), n:bg.length};
      });

      // ── Advanced Analytics ─────────────────────────────────────
      // Brier Score: mean squared error of probability predictions (0=perfect, 0.25=random)
      // Lower is better. Random coin flip = 0.25
      const brierScore = (() => {
        const g = mlGames.filter(g => g.modelFavPct != null);
        if (!g.length) return null;
        const sum = g.reduce((s, g) => {
          const p = g.modelFavPct / 100;
          const outcome = g.mlHit ? 1 : 0;
          return s + Math.pow(p - outcome, 2);
        }, 0);
        return (sum / g.length).toFixed(3);
      })();

      // Log Loss: penalizes confident wrong predictions heavily (lower = better)
      // Perfect model = 0, random = 0.693
      const logLoss = (() => {
        const g = mlGames.filter(g => g.modelFavPct != null);
        if (!g.length) return null;
        const eps = 1e-7;
        const sum = g.reduce((s, g) => {
          const p = Math.max(eps, Math.min(1-eps, g.modelFavPct / 100));
          const outcome = g.mlHit ? 1 : 0;
          return s - (outcome * Math.log(p) + (1-outcome) * Math.log(1-p));
        }, 0);
        return (sum / g.length).toFixed(3);
      })();

      // Calibration curve: expected win rate vs realized win rate per probability bucket
      const calibCurve = [
        {label:"50-55%", mid:52.5, min:50, max:55},
        {label:"55-60%", mid:57.5, min:55, max:60},
        {label:"60-65%", mid:62.5, min:60, max:65},
        {label:"65-70%", mid:67.5, min:65, max:70},
        {label:"70%+",   mid:75.0, min:70, max:100},
      ].map(b => {
        const bg = mlGames.filter(g => g.modelFavPct >= b.min && g.modelFavPct < b.max);
        const wins = bg.filter(g => g.mlHit).length;
        const realized = bg.length ? (wins / bg.length * 100) : null;
        const error = realized != null ? (realized - b.mid) : null;
        return { ...b, n: bg.length, wins, realized, error };
      });

      // Overconfidence index: avg(model% - realized%) across buckets with enough sample
      const overconfidence = (() => {
        const valid = calibCurve.filter(b => b.n >= 5 && b.realized != null);
        if (!valid.length) return null;
        return (valid.reduce((s,b) => s + (b.mid - b.realized), 0) / valid.length).toFixed(1);
      })();

      // O/U MAE: mean absolute error between model total projection and actual
      const ouMAE = (() => {
        const g = ouGames.filter(g => g.projTotal != null && g.total != null);
        if (!g.length) return null;
        return (g.reduce((s,g) => s + Math.abs(g.total - g.projTotal), 0) / g.length).toFixed(2);
      })();

      // O/U Bias: avg(actual - projected) — positive = model undershoots totals
      const ouBias = (() => {
        const g = ouGames.filter(g => g.projTotal != null && g.total != null);
        if (!g.length) return null;
        return (g.reduce((s,g) => s + (g.total - g.projTotal), 0) / g.length).toFixed(2);
      })();

      // Sharp value capture: win rate on games where edge >= 6 (edge-filtered accuracy)
      const sharpGames = mlGames.filter(g => {
        const edge = Math.min(10, Math.max(1, Math.round(Math.abs(g.modelFavPct - 50) / 2.5)));
        return edge >= 6;
      });
      const sharpWinPct = sharpGames.length ? (sharpGames.filter(g=>g.mlHit).length / sharpGames.length * 100) : null;

      // Streak analysis
      const currentStreak = (() => {
        if (!settled.length) return null;
        const recent = [...settled].reverse();
        const first = recent[0].mlHit;
        let count = 0;
        for (const g of recent) { if (g.mlHit === first) count++; else break; }
        return { type: first ? 'W' : 'L', count };
      })();

      // ── CLV Analytics ──────────────────────────────────────────
      const clvGames = settled.filter(g => g.clvVsClose != null);
      const avgCLVvsClose = clvGames.length
        ? (clvGames.reduce((s,g)=>s+g.clvVsClose,0)/clvGames.length).toFixed(1) : null;
      const avgCLVvsOpen  = settled.filter(g=>g.clvVsOpen!=null).length
        ? (settled.filter(g=>g.clvVsOpen!=null).reduce((s,g)=>s+g.clvVsOpen,0)/settled.filter(g=>g.clvVsOpen!=null).length).toFixed(1) : null;
      // Beat closing line rate: % of picks where model was ahead of close
      const beatCloseGames = clvGames.filter(g=>g.clvVsClose>0);
      const beatClosePct = clvGames.length ? (beatCloseGames.length/clvGames.length*100).toFixed(1) : null;
      // Line movement alignment: % where line moved toward model pick (sharp agreement)
      const lineMoveGames = settled.filter(g=>g.lineMove!=null);
      const sharpAlignPct = lineMoveGames.length
        ? (lineMoveGames.filter(g=>g.lineMove>0).length/lineMoveGames.length*100).toFixed(1) : null;
      // CLV buckets: how model performs when it beats close by various margins
      const clvBuckets = [
        {label:"-5pp+",  min:-99, max:-5,  desc:"Faded by market"},
        {label:"-5–0pp", min:-5,  max:0,   desc:"Slightly behind close"},
        {label:"0–3pp",  min:0,   max:3,   desc:"At close"},
        {label:"3–6pp",  min:3,   max:6,   desc:"Ahead of close"},
        {label:"6pp+",   min:6,   max:99,  desc:"Strong CLV"},
      ].map(b=>{
        const bg = clvGames.filter(g=>g.clvVsClose>=b.min&&g.clvVsClose<b.max);
        const wins = bg.filter(g=>g.mlHit).length;
        return {...b, n:bg.length, wins, pct:bg.length?(wins/bg.length*100):null};
      });

      // ── Rolling Window Metrics & Drift Detection ──────────────
      const now = Date.now();
      const DAY = 86400000;

      function windowStats(games, days) {
        const cutoff = now - days * DAY;
        const g = games.filter(g => g.settledAt && g.settledAt >= cutoff);
        const ml = g.filter(x => x.mlHit != null);
        const ou = g.filter(x => x.ouHit != null);
        const mlW = ml.filter(x => x.mlHit).length;
        const ouW = ou.filter(x => x.ouHit).length;
        const clvG = g.filter(x => x.clvVsClose != null);
        const avgCLV = clvG.length ? (clvG.reduce((s,x)=>s+x.clvVsClose,0)/clvG.length) : null;
        // Brier for window
        const brierG = ml.filter(x=>x.modelFavPct!=null);
        const brier = brierG.length
          ? brierG.reduce((s,x)=>s+Math.pow(x.modelFavPct/100-(x.mlHit?1:0),2),0)/brierG.length
          : null;
        return {
          n: g.length, mlN: ml.length, ouN: ou.length,
          mlPct: ml.length ? mlW/ml.length*100 : null,
          ouPct: ou.length ? ouW/ou.length*100 : null,
          avgCLV, brier: brier ? +brier.toFixed(3) : null,
        };
      }

      const w7  = windowStats(settled, 7);
      const w14 = windowStats(settled, 14);
      const w30 = windowStats(settled, 30);
      const wAll = { mlPct, ouPct, avgCLVvsClose: avgCLVvsClose ? parseFloat(avgCLVvsClose) : null, brier: brierScore ? parseFloat(brierScore) : null };

      // Weekly trend: last 4 weeks of 7-day windows
      const weeklyTrend = [4,3,2,1].map(weeksAgo => {
        const start = now - weeksAgo * 7 * DAY;
        const end   = now - (weeksAgo-1) * 7 * DAY;
        const g = settled.filter(x => x.settledAt && x.settledAt >= start && x.settledAt < end);
        const ml = g.filter(x=>x.mlHit!=null);
        const ou = g.filter(x=>x.ouHit!=null);
        return {
          week: `W-${weeksAgo}`,
          n: g.length,
          mlPct: ml.length ? +(ml.filter(x=>x.mlHit).length/ml.length*100).toFixed(0) : null,
          ouPct: ou.length ? +(ou.filter(x=>x.ouHit).length/ou.length*100).toFixed(0) : null,
        };
      });

      // Drift flags: compare last 14d to season baseline
      const DRIFT_THRESHOLD = 8; // pp shift that warrants a flag
      const driftFlags = [];
      if (w14.mlPct!=null && mlPct!=null && Math.abs(w14.mlPct - mlPct) >= DRIFT_THRESHOLD) {
        driftFlags.push({
          label: "ML Win Rate Drift",
          delta: +(w14.mlPct - mlPct).toFixed(1),
          msg: w14.mlPct > mlPct ? "Recent outperformance — check for small-sample variance" : "Recent underperformance — review signal quality or market shifts",
        });
      }
      if (w14.ouPct!=null && ouPct!=null && Math.abs(w14.ouPct - ouPct) >= DRIFT_THRESHOLD) {
        driftFlags.push({
          label: "O/U Win Rate Drift",
          delta: +(w14.ouPct - ouPct).toFixed(1),
          msg: w14.ouPct > ouPct ? "Totals model hot recently — may reflect run environment shift" : "Totals model cold — check for ball/weather/rule change",
        });
      }
      if (w14.brier!=null && wAll.brier!=null && w14.brier - wAll.brier >= 0.03) {
        driftFlags.push({
          label: "Brier Score Degraded",
          delta: +(w14.brier - wAll.brier).toFixed(3),
          msg: "Recent probability estimates worse than season avg — model may need recalibration",
        });
      }
      if (w14.avgCLV!=null && clvGames.length>=10 && parseFloat(avgCLVvsClose)!=null && w14.avgCLV - parseFloat(avgCLVvsClose) <= -3) {
        driftFlags.push({
          label: "CLV Erosion",
          delta: +(w14.avgCLV - parseFloat(avgCLVvsClose)).toFixed(1),
          msg: "Market moving against model recently — closing line efficiency may be improving",
        });
      }

      // Error attribution summary across all tagged losses
      const taggedLosses = settled.filter(g => !g.mlHit && g.errorTags?.length);
      const tagSummary = ERROR_TAGS.map(t => ({
        ...t,
        count: taggedLosses.filter(g => g.errorTags.includes(t.id)).length,
        pct: taggedLosses.length
          ? (taggedLosses.filter(g => g.errorTags.includes(t.id)).length / taggedLosses.length * 100)
          : 0,
      })).filter(t => t.count > 0).sort((a,b) => b.count - a.count);

      // Auto-detect tags for recently settled games (heuristics)
      function autoDetectTags(g) {
        const tags = [];
        const margin = Math.abs(g.hScore - g.aScore);
        const actualTotal = g.total;
        const projTotal = g.projTotal;
        // Market drift: if vegasML moved significantly (proxy: high-confidence loss)
        if (!g.mlHit && g.modelFavPct >= 65) tags.push('market_drift');
        // O/U variance: actual total far from projected
        if (projTotal && Math.abs(actualTotal - projTotal) > 3.5) tags.push('off_variance');
        // Blowout loss suggests SP or bullpen issue
        if (!g.mlHit && margin >= 5) tags.push('bullpen_blow');
        // Opponent exploded past projection
        const favIsHome = g.modelFavTeam === g.home;
        const oppActual = favIsHome ? g.aScore : g.hScore;
        const oppProj   = favIsHome ? g.projAwayRuns : g.projHomeRuns;
        if (oppProj && oppActual - oppProj >= 3) tags.push('off_explosion');
        return [...new Set(tags)];
      }

      const logGames  = [...settled].reverse();
      const totalPages = Math.ceil(logGames.length/LOG_PER_PAGE);
      const pageGames  = logGames.slice(logPage*LOG_PER_PAGE,(logPage+1)*LOG_PER_PAGE);

      // Auto-run adaptive feedback when sufficient sample exists
      // Runs at most once per hour to avoid feedback loops
      const runFeedback = React.useCallback(async () => {
        if (settled.length < 20) return; // need minimum sample
        const existing = loadAdaptiveParams();
        if (existing.lastRun && Date.now() - existing.lastRun < 60*60*1000) return; // 1hr throttle
        const segData = [
          {id:"high_disp", n: mlGames.filter(g=>g.parkRegime==="high_disp").length,
           mlPct: (()=>{ const g=mlGames.filter(x=>x.parkRegime==="high_disp"); return g.length?g.filter(x=>x.mlHit).length/g.length*100:null; })()},
        ];
        const taggedLossesAll = mlGames.filter(g=>!g.mlHit&&g.errorTags?.length);
        const tagFreq = {};
        taggedLossesAll.forEach(g => g.errorTags.filter(t=>t!=="_auto").forEach(t=>{tagFreq[t]=(tagFreq[t]||0)+1;}));
        const tagN = taggedLossesAll.length;
        const dominantTag = tagN >= 30 ? Object.entries(tagFreq).sort((a,b)=>b[1]-a[1])[0] : null;
        const result = await applyAdaptiveFeedback({
          ouBias: ouBias ? parseFloat(ouBias) : null,
          brierRecent: w14.brier,
          brierSeason: brierScore ? parseFloat(brierScore) : null,
          w14,
          wAll: { avgCLV: parseFloat(avgCLVvsClose)||null, clvN: clvGames.length },
          clvBuckets,
          segmentData: segData,
          totalSettled: settled.length,
          tagFreq, tagN, dominantTag,
        });
        if (result.changes.length > 0) {
          setAdaptiveLog(result.params.log || []);
          setAdaptiveParams(result.params);
        }
      }, [settled.length, ouBias, w14.brier, brierScore]);

      React.useEffect(() => { if (!loading) runFeedback(); }, [loading, settled.length]);

      const StatCard = ({label,value,sub,color,trend}) => (
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:"1rem 1.1rem",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:color||C.gold,opacity:0.7}}/>
          <div style={{fontSize:"0.6rem",letterSpacing:"0.12em",color:C.dim,marginBottom:"0.4rem"}}>{label}</div>
          <div style={{fontSize:"1.6rem",fontWeight:"bold",color:color||C.gold,lineHeight:1}}>{value??'--'}</div>
          {sub&&<div style={{fontSize:"0.65rem",color:C.dim,marginTop:"0.3rem"}}>{sub}</div>}
          {trend!=null&&<div style={{fontSize:"0.65rem",color:trend>=5?C.green:C.red,marginTop:"0.15rem",fontWeight:"bold"}}>{trend>=5?"↑":"↓"} L10: {trend}-{10-trend}</div>}
        </div>
      );

      if (loading) return <div style={{padding:"3rem",textAlign:"center",color:C.muted}}>Loading…</div>;

      return (
        <div style={{padding:"1.5rem"}}>
          <SectionHeader>MODEL PERFORMANCE <LiveBadge/></SectionHeader>
          <div style={{marginBottom:"1rem",fontSize:"0.72rem",color:C.dim}}>{CURRENT_SEASON} · {settled.length} games tracked · ML/RL = value pick vs Vegas · O/U = proj vs closing line</div>
          {/* Adaptive model now lives on its own tab */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"0.75rem",marginBottom:"1.25rem"}}>
            <StatCard label="ML PICK ACCURACY" value={mlPct!=null?mlPct.toFixed(1)+"%":null} sub={mlGames.length?`${mlW}-${mlGames.length-mlW} (value picks only · need >52.4%)`:settledEarly.length?`${settledEarly.length} early-season games excluded`:"No games yet (need 40gp)"} color={mlPct!=null?(mlPct>=55?C.green:mlPct>=52?C.gold:C.red):C.muted} trend={last10.length>=5?l10ML:null}/>
            <StatCard label="RL WIN RATE" value={rlPct!=null?rlPct.toFixed(1)+"%":null} sub={rlGames.length?`${rlW}-${rlGames.length-rlW} · run line (-1.5)`:"No games yet"} color={rlPct!=null?(rlPct>=55?C.green:rlPct>=52?C.gold:C.red):C.muted} trend={last10.length>=5?l10RL:null}/>
            <StatCard label="O/U WIN RATE" value={ouPct!=null?ouPct.toFixed(1)+"%":null} sub={ouGames.length?`${ouW}-${ouGames.length-ouW} · over/under`:"No games yet"} color={ouPct!=null?(ouPct>=55?C.green:ouPct>=52?C.gold:C.red):C.muted} trend={last10.length>=5?l10OU:null}/>
          </div>
          {settled.length>0&&(
            <>
              <SectionHeader>STAKING ANALYSIS — SIGNAL VS SIZING</SectionHeader>
              <div style={{fontSize:"0.62rem",color:C.dim,marginBottom:"0.75rem",lineHeight:1.6}}>
                Separates edge accuracy from staking effectiveness.
                If flat ROI is positive but Kelly/confidence ROI is worse → sizing logic needs work, not the model core.
              </div>
              {/* 3-column comparison header */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0.5rem",marginBottom:"0.75rem"}}>
                {[
                  {label:"FLAT 1u BASELINE",sub:"unweighted accuracy signal",color:C.muted},
                  {label:"CONFIDENCE TIERS",sub:"0.5u–3u by edge score",color:C.gold},
                  {label:"KELLY FRACTION",sub:"¼ Kelly by model prob",color:"#1493FF"},
                ].map(({label,sub,color})=>(
                  <div key={label} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:"0.7rem 0.75rem",borderTop:`2px solid ${color}`}}>
                    <div style={{fontSize:"0.52rem",letterSpacing:"0.08em",color,fontWeight:"bold",marginBottom:"0.2rem"}}>{label}</div>
                    <div style={{fontSize:"0.5rem",color:C.dim}}>{sub}</div>
                  </div>
                ))}
              </div>
              {/* ML comparison row */}
              {mlRoi.total>0&&(()=>{
                const rows = [
                  {label:"Flat 1u",    roi:mlRoi.roi,   net:mlRoi.net,   w:mlRoi.wins,   l:mlRoi.losses,   color:C.muted},
                  {label:"Conf tier",  roi:mlConf.roi,  net:mlConf.net,  w:mlConf.wins,  l:mlConf.losses,  color:C.gold},
                  {label:"Kelly ¼",   roi:mlKelly.roi, net:mlKelly.net, w:mlKelly.wins, l:mlKelly.losses, color:"#1493FF"},
                ];
                return (
                  <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,overflow:"hidden",marginBottom:"1rem"}}>
                    <div style={{padding:"0.5rem 0.85rem",background:C.header,fontSize:"0.62rem",fontWeight:"bold",color:C.muted,letterSpacing:"0.08em",borderBottom:`1px solid ${C.border}`}}>
                      MONEYLINE — {mlRoi.total} games · flat accuracy {flatAccuracy!=null?flatAccuracy.toFixed(1)+"%":"--"}
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:0}}>
                      {rows.map(({label,roi,net,w,l,color},i)=>(
                        <div key={label} style={{padding:"0.75rem 0.85rem",borderRight:i<2?`1px solid ${C.border}`:"none"}}>
                          <div style={{fontSize:"0.52rem",color:C.dim,marginBottom:"0.25rem"}}>{label}</div>
                          <div style={{fontSize:"1.2rem",fontWeight:"bold",color:roi>=0?C.green:C.red}}>{roi>=0?"+":""}{roi}%</div>
                          <div style={{fontSize:"0.6rem",color:C.dim,marginTop:"0.2rem"}}>{w}-{l}</div>
                          <div style={{fontSize:"0.58rem",color:net>=0?C.green:C.red,marginTop:"0.1rem"}}>{net>=0?"+":""}{net}u net</div>
                        </div>
                      ))}
                    </div>
                    {/* Diagnostic verdict */}
                    <div style={{padding:"0.45rem 0.85rem",borderTop:`1px solid ${C.border}`,background:"rgba(201,168,76,0.04)",fontSize:"0.58rem",color:C.dim}}>
                      {mlRoi.roi>=0&&mlKelly.roi<mlRoi.roi-5
                        ? "⚠️ Flat beats Kelly → edge estimation inflated at high confidence"
                        : mlKelly.roi>mlRoi.roi+3
                        ? "✅ Kelly outperforms flat → model correctly identifies stronger edges"
                        : mlConf.roi>mlRoi.roi+3
                        ? "✅ Confidence tiers adding value → staking amplifying signal"
                        : mlRoi.roi>=0
                        ? "✅ Consistent across stake methods → signal is stable"
                        : "📊 Negative ROI across all methods → signal quality needs review"}
                    </div>
                  </div>
                );
              })()}
              {/* RL and O/U flat comparison */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.75rem",marginBottom:"1.25rem"}}>
                {[{label:"RUN LINE (-1.5)",roi:rlRoi,color:"#53D337"},{label:"OVER/UNDER",roi:ouRoi,color:C.gold}].map(({label,roi,color})=>
                  roi.total===0?null:(
                    <div key={label} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:"0.75rem 0.85rem"}}>
                      <div style={{fontSize:"0.52rem",letterSpacing:"0.08em",color:C.dim,marginBottom:"0.35rem"}}>{label}</div>
                      <div style={{fontSize:"1.2rem",fontWeight:"bold",color:roi.roi>=0?C.green:C.red}}>{roi.roi>=0?"+":""}{roi.roi.toFixed(1)}%</div>
                      <div style={{fontSize:"0.6rem",color:C.dim,marginTop:"0.2rem"}}>{roi.wins}-{roi.losses} · flat 1u only</div>
                    </div>
                  )
                )}
              </div>
            </>
          )}
          {mlGames.length>0&&(
            <>
              <SectionHeader>WIN RATE BY CONFIDENCE</SectionHeader>
              <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,overflow:"hidden",marginBottom:"1.25rem"}}>
                {/* header */}
                <div style={{display:"grid",gridTemplateColumns:"3.6rem 1fr 1fr 1fr",background:C.header,borderBottom:`1px solid ${C.border}`}}>
                  <div style={{padding:"0.3rem 0.3rem",fontSize:"0.52rem",letterSpacing:"0.03em",color:C.muted,fontWeight:"bold",textAlign:"center"}}>BUCKET</div>
                  {["ML","RL","O/U"].map(h=><div key={h} style={{padding:"0.3rem 0.2rem",fontSize:"0.52rem",letterSpacing:"0.04em",color:C.muted,fontWeight:"bold",textAlign:"center",borderLeft:`1px solid ${C.border}`}}>{h}</div>)}
                </div>
                {/* sub-header */}
                <div style={{display:"grid",gridTemplateColumns:"3.6rem 1fr 1fr 1fr",background:"rgba(255,255,255,0.02)",borderBottom:`1px solid ${C.border}`}}>
                  <div/>
                  {[0,1,2].map(i=><div key={i} style={{display:"grid",gridTemplateColumns:"1fr 1fr",borderLeft:`1px solid ${C.border}`}}>
                    <div style={{padding:"0.22rem 0",fontSize:"0.48rem",color:C.dim,textAlign:"center",letterSpacing:"0.03em"}}>W-L</div>
                    <div style={{padding:"0.22rem 0",fontSize:"0.48rem",color:C.dim,textAlign:"center",letterSpacing:"0.03em"}}>WIN%</div>
                  </div>)}
                </div>
                {buckets.map(b=>{
                  const col = s => s.pct!=null?(s.pct>=58?C.green:s.pct>=52?C.gold:C.red):C.dim;
                  const wl  = s => s.n>0?`${s.w}-${s.n-s.w}`:"--";
                  const pct = s => s.pct!=null?s.pct.toFixed(0)+"%":"--";
                  return (
                    <div key={b.label} style={{display:"grid",gridTemplateColumns:"3.6rem 1fr 1fr 1fr",alignItems:"center",borderBottom:`1px solid ${C.border}`,minHeight:"2.4rem"}}>
                      <div style={{padding:"0.3rem 0.25rem",textAlign:"center"}}>
                        <div style={{fontSize:"0.66rem",fontWeight:"bold",color:C.muted}}>{b.label}</div>
                        <div style={{fontSize:"0.48rem",color:C.dim}}>{b.n>0?`n=${b.n}`:""}</div>
                      </div>
                      {[b.ml, b.rl, b.ou].map((s,i)=>(
                        <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 1fr",alignItems:"center",borderLeft:`1px solid ${C.border}`,height:"100%"}}>
                          <div style={{fontSize:"0.62rem",color:C.dim,textAlign:"center"}}>{wl(s)}</div>
                          <div style={{fontSize:"0.68rem",fontWeight:"bold",color:col(s),textAlign:"center"}}>{pct(s)}</div>
                        </div>
                      ))}
                    </div>
                  );
                })}
              </div>
            </>
          )}
          {mlGames.length>0&&(
            <>
              <SectionHeader>WIN RATE BY EDGE SCORE</SectionHeader>
              <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,overflow:"hidden",marginBottom:"1.25rem"}}>
                {/* header */}
                <div style={{display:"grid",gridTemplateColumns:"3.6rem 1fr 1fr 1fr",background:C.header,borderBottom:`1px solid ${C.border}`}}>
                  <div style={{padding:"0.3rem 0.3rem",fontSize:"0.52rem",letterSpacing:"0.03em",color:C.muted,fontWeight:"bold",textAlign:"center"}}>EDGE</div>
                  {["ML","RL","O/U"].map(h=><div key={h} style={{padding:"0.3rem 0.2rem",fontSize:"0.52rem",letterSpacing:"0.04em",color:C.muted,fontWeight:"bold",textAlign:"center",borderLeft:`1px solid ${C.border}`}}>{h}</div>)}
                </div>
                {/* sub-header */}
                <div style={{display:"grid",gridTemplateColumns:"3.6rem 1fr 1fr 1fr",background:"rgba(255,255,255,0.02)",borderBottom:`1px solid ${C.border}`}}>
                  <div/>
                  {[0,1,2].map(i=><div key={i} style={{display:"grid",gridTemplateColumns:"1fr 1fr",borderLeft:`1px solid ${C.border}`}}>
                    <div style={{padding:"0.22rem 0",fontSize:"0.48rem",color:C.dim,textAlign:"center",letterSpacing:"0.03em"}}>W-L</div>
                    <div style={{padding:"0.22rem 0",fontSize:"0.48rem",color:C.dim,textAlign:"center",letterSpacing:"0.03em"}}>WIN%</div>
                  </div>)}
                </div>
                {edgeBuckets.map(b=>{
                  const edgeColor = b.min>=10?"#ffffff":b.min>=8?"#e0c06a":b.min>=6?C.green:b.min>=4?C.gold:C.muted;
                  const col = s => s.pct!=null?(s.pct>=58?C.green:s.pct>=52?C.gold:C.red):C.dim;
                  const wl  = s => s.n>0?`${s.w}-${s.n-s.w}`:"--";
                  const pct = s => s.pct!=null?s.pct.toFixed(0)+"%":"--";
                  return (
                    <div key={b.label} style={{display:"grid",gridTemplateColumns:"3.6rem 1fr 1fr 1fr",alignItems:"center",borderBottom:`1px solid ${C.border}`,minHeight:"2.4rem"}}>
                      <div style={{padding:"0.3rem 0.25rem",textAlign:"center"}}>
                        <div style={{fontSize:"0.72rem",fontWeight:"bold",color:edgeColor}}>{b.label}</div>
                        <div style={{fontSize:"0.45rem",color:C.dim,letterSpacing:"0.04em"}}>{b.desc.toUpperCase()}</div>
                      </div>
                      {[b.ml, b.rl, b.ou].map((s,i)=>(
                        <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 1fr",alignItems:"center",borderLeft:`1px solid ${C.border}`,height:"100%"}}>
                          <div style={{fontSize:"0.62rem",color:C.dim,textAlign:"center"}}>{wl(s)}</div>
                          <div style={{fontSize:"0.68rem",fontWeight:"bold",color:col(s),textAlign:"center"}}>{pct(s)}</div>
                        </div>
                      ))}
                    </div>
                  );
                })}
                <div style={{padding:"0.45rem 0.75rem",background:"rgba(201,168,76,0.04)",borderTop:`1px solid ${C.border}`,fontSize:"0.54rem",color:C.dim}}>
                  Edge 1–3 = low · 4–5 = moderate · 6–7 = strong · 8–9 = elite · 10 = max conviction
                </div>
              </div>
            </>
          )}
          {settled.length>0&&(
            <>
              <SectionHeader>PREDICTIVE QUALITY METRICS</SectionHeader>
              {/* Monte Carlo distribution accuracy */}
              {(()=>{
                const simGames = settledValid.filter(g=>g.simOverPct!=null&&g.ouHit!=null);
                if (simGames.length < 5) return null;
                // When simOverPct > 55%, did OVER hit?
                const highConfOver = simGames.filter(g=>g.simOverPct>55);
                const highConfUnder = simGames.filter(g=>g.simOverPct<45);

              // Underdog vs favorite
              {id:"fav_pick",    label:"Model Fav",          icon:"👑", fn:g=>!g.pickIsDog},
              {id:"dog_pick",    label:"Model Dog",          icon:"🐕", fn:g=>g.pickIsDog===true},
              // SP regime
              {id:"ace_start",   label:"Ace Matchup",        icon:"⭐", fn:g=>g.spRegime==="ace"},
              {id:"mid_start",   label:"Mid Rotation",       icon:"⚾", fn:g=>g.spRegime==="mid"},
              {id:"backend",     label:"Backend/Bullpen",    icon:"🔄", fn:g=>g.spRegime==="backend"},
              // Park
              {id:"high_disp",   label:"High Disp Park",     icon:"🌪️", fn:g=>g.parkRegime==="high_disp"},
              {id:"low_disp",    label:"Low Disp Park",      icon:"🏟️", fn:g=>g.parkRegime==="low_disp"},
              // Bullpen stress
              {id:"bp_stressed", label:"Bullpen Stressed",   icon:"😤", fn:g=>g.bullpenStressed===true},

              <>

                <div style={{fontSize:"0.6rem",color:C.dim,marginBottom:"0.75rem",lineHeight:1.6}}>

                <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,overflow:"hidden",marginBottom:"1.25rem"}}>
                  {/* Header */}
                  <div style={{display:"grid",gridTemplateColumns:"8rem 1fr 2.8rem 2.8rem 3.5rem 3.5rem",background:C.header,borderBottom:`1px solid ${C.border}`}}>

                      {ids.map(sid=>{
                        const seg = SEGMENTS.find(s=>s.id===sid);

                        const mlW = sg.filter(g=>g.mlHit).length;

                        const mlPct = sg.length ? mlW/sg.length*100 : null;

                        const avgCLV = sg.filter(g=>g.clvVsClose!=null).length

                  <div style={{padding:"0.5rem 0.75rem",background:"rgba(201,168,76,0.04)",borderTop:`1px solid ${C.border}`,fontSize:"0.55rem",color:C.dim}}>

                  </div>
                </div>
              </>
            );
          })()}
          {tagSummary.length>0&&(
            <>
              <SectionHeader>ERROR ATTRIBUTION</SectionHeader>
              <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:"1rem 1.1rem",marginBottom:"1.25rem"}}>
                <div style={{fontSize:"0.62rem",color:C.dim,marginBottom:"0.75rem"}}>
                  {taggedLosses.length} of {settled.filter(g=>!g.mlHit).length} losses tagged · tap any loss row in Game Log to add tags

                <div style={{display:"flex",flexWrap:"wrap",gap:"0.5rem",marginBottom:"0.75rem"}}>
                  {tagSummary.map(t=>(
                    <div key={t.id} style={{display:"flex",alignItems:"center",gap:"0.35rem",padding:"0.3rem 0.65rem",borderRadius:20,background:`${t.color}18`,border:`1px solid ${t.color}44`}}>

                <div style={{paddingTop:"0.6rem",borderTop:`1px solid ${C.border}`,fontSize:"0.58rem",color:C.dim}}>
