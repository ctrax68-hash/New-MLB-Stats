          const raw = localStorage.getItem("mlb_closing_lines");
          if (raw) {
            const parsed = JSON.parse(raw);
            const clean = {};
            const validML = n => { const v = parseFloat((n||"").replace(/[^0-9\-+]/g,"")); return !isNaN(v) && Math.abs(v) >= 100 && Math.abs(v) <= 2500; };
            const validRLPrice = n => { const v = parseFloat((n||"").replace(/[^0-9\-+]/g,"")); return !isNaN(v) && Math.abs(v) >= 100 && Math.abs(v) <= 250; };
            for (const [k, v] of Object.entries(parsed)) {
              if (!v.isClosing) continue;
              if (v.hML && v.hML !== "—" && !validML(v.hML)) continue;
              if (v.aML && v.aML !== "—" && !validML(v.aML)) continue;
              // Scrub bad RL prices (e.g. +32, -2 are impossible run line prices)
              if (v.hRL && v.hRL !== "—") {
                const rlPrice = parseFloat(v.hRL);
                if (!isNaN(rlPrice) && !validRLPrice(v.hRL)) { v.hRL = "—"; v.aRL = "—"; }
              }
              // Scrub lines where both FD and DK are missing (saved after game started with no data)
              if ((!v.books?.FD && !v.books?.DK) && (v.hML === "—" || v.aML === "—")) continue;
              clean[k] = v;
            }
            setStoredLines(clean);
            localStorage.setItem("mlb_closing_lines", JSON.stringify(clean));
          }
        } catch {}
      },[]);

      const CLOSING_LINES_KEY = "mlb_closing_lines";

      function saveClosingLine(homeAbbr, awayAbbr, dateStr, lineData) {
        const key = `${homeAbbr}|${awayAbbr}|${dateStr}`;
        setStoredLines(prev => {
          const existing = prev[key];
          // Only overwrite if: no existing line, OR existing was saved during game (markedLive)
          // Never overwrite a clean pre-game save with in-game/post-game data
          if (existing && existing.isClosing && !existing.markedLive) return prev;
          const next = {...prev, [key]: {...lineData, savedAt: Date.now(), isClosing: true}};
          const cutoff = Date.now() - 200*24*60*60*1000;
          for (const k of Object.keys(next)) {
            if (next[k].savedAt < cutoff) delete next[k];
          }
          try { localStorage.setItem(CLOSING_LINES_KEY, JSON.stringify(next)); } catch {}
          return next;
        });
      }

      const ODDS_API_KEY = "af2ff1de807138a8224376918f1833f5";

      const FULL_NAME_TO_ABBR = {
        "Los Angeles Dodgers":"LAD","Atlanta Braves":"ATL","New York Yankees":"NYY",
        "Houston Astros":"HOU","Baltimore Orioles":"BAL","Philadelphia Phillies":"PHI",
        "Milwaukee Brewers":"MIL","Toronto Blue Jays":"TOR","San Diego Padres":"SDP",
        "Texas Rangers":"TEX","Seattle Mariners":"SEA","St. Louis Cardinals":"STL",
        "Chicago Cubs":"CHC","Minnesota Twins":"MIN","Cleveland Guardians":"CLE",
        "New York Mets":"NYM","Arizona Diamondbacks":"ARI","San Francisco Giants":"SFG",
        "Tampa Bay Rays":"TBR","Boston Red Sox":"BOS","Detroit Tigers":"DET",
        "Kansas City Royals":"KCR","Washington Nationals":"WSN","Miami Marlins":"MIA",
        "Los Angeles Angels":"LAA","Pittsburgh Pirates":"PIT","Cincinnati Reds":"CIN",
        "Colorado Rockies":"COL","Chicago White Sox":"CWS","Oakland Athletics":"OAK",
        "Sacramento Athletics":"OAK","Athletics":"OAK",
      };
      const ABBR_TO_FULL = Object.fromEntries(Object.entries(FULL_NAME_TO_ABBR).map(([k,v])=>[v,k]));

      // Parse raw odds JSON array into our vegasOdds map
      async function fetchVegasOdds() {
        setVegasLoading(true); setVegasStatus("fetching…");
        const apiUrl = `https://api.the-odds-api.com/v4/sports/baseball_mlb/odds/?apiKey=${ODDS_API_KEY}&regions=us&markets=h2h,spreads,totals&oddsFormat=american&bookmakers=fanduel,draftkings`;

        let data = null;
        let statusMsg = "";
        try {
          const res = await fetch(apiUrl);
          if (res.ok) {
            data = await res.json();
            statusMsg = `✓ ${Array.isArray(data)?data.length:0} games`;
          } else {
            const errText = await res.text().catch(()=>"");
            statusMsg = `API ${res.status}${errText.includes("quota")||errText.includes("limit")?" — quota exceeded":""}`;
          }
        } catch(e) {
          // Try allorigins proxy
          try {
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(apiUrl)}`);
            if (res.ok) { const w = await res.json(); data = JSON.parse(w.contents); statusMsg = `✓ proxy ${Array.isArray(data)?data.length:0} games`; }
            else statusMsg = `proxy ${res.status}`;
          } catch(e2) { statusMsg = `blocked (${e2.message})`; }
        }

          const map = {};

          const validSpread = s => s != null && Math.abs(Math.abs(s.point) - 1.5) < 0.01 && Math.abs(s.price) >= 100 && Math.abs(s.price) <= 500;
          const validTotal = s => s != null && s.point >= 5 && s.point <= 15 && Math.abs(s.price) >= 100 && Math.abs(s.price) <= 500;

          for (const game of data) {

            if (commenceTime <= new Date(Date.now() - 3*60*60*1000)) continue;
            const key = `${hAbbr}|${aAbbr}`;

            const books = {};
            for (const bm of (game.bookmakers||[])) {
              const bookLabel = BOOK_KEYS[bm.key];
              if (!bookLabel) continue;
              const bookData = {hML:null,aML:null,hRL:null,aRL:null,ou:null,overPr:null,underPr:null,hMLraw:null,aMLraw:null};
              for (const mkt of (bm.markets||[])) {
                if (mkt.key==="h2h") {
                  for (const o of mkt.outcomes) {

                    if (FULL_NAME_TO_ABBR[o.name]===aAbbr) { bookData.aML=fmt(o.price); bookData.aMLraw=o.price; }
                  }

                  if (hSpread) bookData.hRL = `${fmt(hSpread.price)} (${hSpread.point<0?"-":"+"}1.5)`;
                  if (aSpread) bookData.aRL = `${fmt(aSpread.price)} (${aSpread.point<0?"-":"+"}1.5)`;

            const fd = books["FD"], dk = books["DK"];

      useEffect(()=>{ fetchVegasOdds(); },[]);

      function getT(abbr){

      }
      function modelOdds(homeAbbr, awayAbbr, ctx=null){
        const h=getT(homeAbbr),a=getT(awayAbbr); if(!h||!a) return null;
        // Use pitcher slots from context if available

        const adj=applyH2HAdj(sim.hWinProb,homeAbbr,awayAbbr,h2hData);
        const hWin=adj.prob, aWin=1-hWin;
        const hRLProb=sim.rlCoverPct/100, ouLine=sim.avgTotal, overProb=simOverProb(sim.totalDist,ouLine);
        const hModelFav = hWin >= aWin;
        const hRLLabel = hModelFav ? "-1.5" : "+1.5";
        const aRLLabel = hModelFav ? "+1.5" : "-1.5";
        const hRLProbFinal = hModelFav ? hRLProb : (1-hRLProb);
        const aRLProbFinal = hModelFav ? (1-hRLProb) : hRLProb;
        return {hTeam:h,aTeam:a,hML:toML(hWin),aML:toML(aWin),hWin,aWin,hWinPct:(hWin*100).toFixed(0),aWinPct:(aWin*100).toFixed(0),hRL:toML(hRLProbFinal)+" ("+hRLLabel+")",aRL:toML(aRLProbFinal)+" ("+aRLLabel+")",ou:+ouLine.toFixed(1),overPct:+(overProb*100).toFixed(1),underPct:+((1-overProb)*100).toFixed(1),parkFactor:park.pf,parkName:park.park,sim,hRuns:+sim.hAvgRuns,aRuns:+sim.aAvgRuns,h2hRecord:adj.h2hRecord,h2hAdj:adj.h2hAdj,source:"model",ctx};
      }
      const processed=useMemo(()=>{
        const liveDates = new Set(
          allGames.filter(g=>g._source==="live").map(g=>localDateKey(g.start_time))
        );
        const hasAnyLive = liveDates.size > 0;
        return allGames
          .filter(g=>{
            if(!getT(g.home)||!getT(g.away)) return false;
            if(hasAnyLive && g._source==="seed") {
              const gDate = localDateKey(g.start_time);
              if(liveDates.has(gDate)) return false;
            }
            return true;
          })
          .map(g=>{
          const ctx = gameCtxMap[g.id] || null;
          const odds=modelOdds(g.home,g.away,ctx); if(!odds) return null;
          const s=(g.status||"").toLowerCase();
          const isFinal=s==="final"||s==="closed", isLive=s==="live"||s==="inprogress";
          const total=g.hScore!=null&&g.aScore!=null?g.hScore+g.aScore:null;
          // Use Vegas OU line ONLY — never fall back to model line for result tracking
          const vkOU = `${g.home}|${g.away}`;
          const clOU = storedLines[`${g.home}|${g.away}|${localDateKey(g.start_time)}`];
          const vlOU = vegasOdds[vkOU];
          const vegasOUForResult = parseFloat((clOU||vlOU)?.ou) || null;
          // Only track O/U result if we have the actual Vegas line
          const ouLineForResult = vegasOUForResult;
          const ouR = isFinal && total != null && ouLineForResult != null
            ? (total > ouLineForResult ? "OVER" : total < ouLineForResult ? "UNDER" : "PUSH")
            : null;
          // Value pick for ML correct tracking
          const vegasHProbG = odds.sim && vlOU?.hMLraw != null ? (vlOU.hMLraw < 0 ? Math.abs(vlOU.hMLraw)/(Math.abs(vlOU.hMLraw)+100) : 100/(vlOU.hMLraw+100)) : null;
          const vegasAProbG = odds.sim && vlOU?.aMLraw != null ? (vlOU.aMLraw < 0 ? Math.abs(vlOU.aMLraw)/(Math.abs(vlOU.aMLraw)+100) : 100/(vlOU.aMLraw+100)) : null;
          const hEdgeG = vegasHProbG != null ? (parseFloat(odds.hWinPct)/100) - vegasHProbG : null;
          const aEdgeG = vegasAProbG != null ? (parseFloat(odds.aWinPct)/100) - vegasAProbG : null;
          const pickHomeG = (hEdgeG != null && aEdgeG != null) ? hEdgeG >= aEdgeG : parseFloat(odds.hWinPct) >= parseFloat(odds.aWinPct);
          const mCorr=isFinal&&g.hScore!=null&&g.aScore!=null?(pickHomeG?g.hScore>g.aScore:g.aScore>g.hScore):null;
          if (isFinal) setTimeout(() => { recordVsVegas(g, odds); settleAIPick(g); recordH2H(g.home, g.away, g.hScore > g.aScore); }, 0);
          return {...g,odds,isFinal,isLive,total,ouResult:ouR,ouLine:ouLineForResult,modelCorrect:mCorr};
        }).filter(Boolean).sort((a,b)=>{
          const ord=g=>g.isLive?0:(!g.isFinal&&new Date(g.start_time)>new Date()?1:2);
          return ord(a)-ord(b)||new Date(a.start_time)-new Date(b.start_time);
        });
      },[allGames,teams,h2hData]);

      const todayKey=todayLocalKey(), tomorrowKey=tomorrowLocalKey();
      const [selectedDay,setSelectedDay]=useState("today");
      const todayG=processed.filter(g=>localDateKey(g.start_time)===todayKey);
      const tomorrowG=processed.filter(g=>localDateKey(g.start_time)===tomorrowKey);
      const displayGames=selectedDay==="today"?todayG:tomorrowG;
      const finalTd=todayG.filter(g=>g.isFinal);
      const mRec=finalTd.reduce((a,g)=>({w:a.w+(g.modelCorrect?1:0),l:a.l+(g.modelCorrect===false?1:0)}),{w:0,l:0});

      function toggleBet(id,side,line){setMyBets(p=>{const e=p.find(b=>b.id===id&&b.side===side);return e?p.filter(b=>!(b.id===id&&b.side===side)):[...p,{id,side,line}];});}
      function hasBet(id,side){return myBets.some(b=>b.id===id&&b.side===side);}
      // Core AI pick fetch — can be called manually or automatically
      async function fetchAIPick(game, vegasLine, valueTeam, valueEdge, ctx=null) {
        const gameId = game.id;
        const h=game.odds.hTeam, a=game.odds.aTeam;
        const vl = vegasLine;
        const hML  = vl?.hML  || game.odds.hML || "—";
        const aML  = vl?.aML  || game.odds.aML || "—";
        const hRL  = vl?.hRL  || "—";
        const aRL  = vl?.aRL  || "—";
        const vegasOU = vl?.ou || String(game.odds.ou) || "—";
        const overPr  = vl?.overPr  || "-110";
        const underPr = vl?.underPr || "-110";
        const modelOU = game.odds.ou;
        const sim = game.odds.sim;
        const overProb = sim ? (simOverProb(sim.totalDist, modelOU)*100).toFixed(0) : "50";
        const valueCtx = valueTeam && valueEdge >= 0.03
          ? "Model edge: " + valueTeam.name + " " + (valueEdge*100).toFixed(0) + "pp value vs Vegas." : "";
        const ctxLines = [];
        if (ctx?.sp?.away) ctxLines.push("SP: " + a.name + " — " + ctx.sp.away + (ctx.sp.awayEra ? " (" + ctx.sp.awayEra + " ERA)" : ""));
        if (ctx?.sp?.home) ctxLines.push("SP: " + h.name + " — " + ctx.sp.home + (ctx.sp.homeEra ? " (" + ctx.sp.homeEra + " ERA)" : ""));
        if (ctx?.weather) ctxLines.push("Weather: " + ctx.weather.temp + "°F, wind " + ctx.weather.wind + "mph" + (ctx.weather.rain > 40 ? ", " + ctx.weather.rain + "% rain" : ""));
        if (ctx?.injury?.awayThin) ctxLines.push("⚠ " + a.name + " thin lineup: " + ctx.injury.awayNote);
        if (ctx?.injury?.homeThin) ctxLines.push("⚠ " + h.name + " thin lineup: " + ctx.injury.homeNote);
        const hasRL = hRL !== "—" && aRL !== "—";
        const hasML = hML !== "—" && aML !== "—";
        const hasOU = vegasOU !== "—";
        const aRLSpread = aRL !== "—" ? (aRL.match(/[+-]1\.5/) ? aRL.match(/[+-]1\.5/)[0] : "+1.5") : "+1.5";
        const hRLSpread = hRL !== "—" ? (hRL.match(/[+-]1\.5/) ? hRL.match(/[+-]1\.5/)[0] : "-1.5") : "-1.5";
        const aRLPrice = aRL !== "—" ? aRL.split(" ")[0] : "—";
        const hRLPrice = hRL !== "—" ? hRL.split(" ")[0] : "—";
        const prompt = "You are a sharp MLB betting analyst. Make picks ONLY using the exact Vegas lines provided below. Never substitute model projections or invented numbers.\n\n" +
"Respond with EXACTLY 3 lines:\n" +
"MLPICK: [team name] [exact ML price from Vegas lines below] — [reason, max 10 words]\n" +
(hasRL ? "RLPICK: [team name] [exact spread+price from Vegas lines below e.g. +1.5 at -138] — [reason, max 10 words]\n" : "RLPICK: N/A — no run line available\n") +
"OUPICK: [OVER or UNDER] [exact total from Vegas lines below] — [reason, max 10 words]\n\n" +
"=== VEGAS LINES (copy prices exactly from here) ===\n" +
(hasML ? "ML: " + a.name + " " + aML + " / " + h.name + " " + hML + "\n" : "ML: not available\n") +
(hasRL ? "RL: " + a.name + " " + aRLSpread + " at " + aRLPrice + " / " + h.name + " " + hRLSpread + " at " + hRLPrice + "\n" : "RL: not available\n") +
(hasOU ? "Total: " + vegasOU + " (Over " + overPr + " / Under " + underPr + ")\n" : "Total: not available\n") +
"=== END VEGAS LINES ===\n\n" +
"=== CONTEXT (use for reasoning only, never as pick prices) ===\n" +
"Model win%: " + h.name + " " + game.odds.hWinPct + "% / " + a.name + " " + game.odds.aWinPct + "%\n" +
"Model proj total: " + modelOU + " (" + overProb + "% over, " + (100-parseInt(overProb)) + "% under)\n" +
"ERA: " + h.name + " " + h.era.toFixed(2) + " / " + a.name + " " + a.era.toFixed(2) + "\n" +
(ctxLines.length ? ctxLines.join("\n") + "\n" : "") +
(valueCtx ? valueCtx + "\n" : "") +
"Model RL lean: " + (parseInt(game.odds.hWinPct) >= parseInt(game.odds.aWinPct) ? h.name + " -1.5 (favored)" : a.name + " -1.5 (favored)") + "\n" +
"=== END CONTEXT ===\n\n" +
"RULES: (1) ML price must come from Vegas Lines ML section. (2) RL price must come from Vegas Lines RL section. (3) OU total must be exactly " + vegasOU + ". (4) If any line is not available, output N/A for that pick.\n" +
"Output only the 3 labeled lines. No intro, no explanation.";
        const text = (await callAI(prompt, 300, 0.3)).trim();
        let ml="—", rl="—", ou="—";
        for (const raw of text.split("\n")) {
          const line = raw.trim();
          if (/^MLPICK:/i.test(line))      ml = line.replace(/^MLPICK:\s*/i,"").trim();
          else if (/^RLPICK:/i.test(line)) rl = line.replace(/^RLPICK:\s*/i,"").trim();
          else if (/^OUPICK:/i.test(line)) ou = line.replace(/^OUPICK:\s*/i,"").trim();
        }
        return { ml, rl, ou };
      }

      // Manual AI TAKE button handler
      async function getAI(game, vegasLine, valueTeam, valueEdge, valueLine, ctx=null){
        const gameId = game.id;
        setSelGame(game);
        setAiPicksMap(prev=>({...prev,[gameId]:null}));
        setAiLoad(true);
        try {
          const picks = await fetchAIPick(game, vegasLine, valueTeam, valueEdge, ctx);
          setAiPicksMap(prev=>({...prev,[gameId]:picks}));
          recordAIPick(game, picks, vegasLine);
        } catch(e) {
          setAiPicksMap(prev=>({...prev,[gameId]:{ml:"Error: "+e.message, rl:"—", ou:"—"}}));
        }
        setAiLoad(false);
      }

      // Auto-fetch AI picks for games starting within 2 hours that don't have picks yet
      const [autoPickStatus, setAutoPickStatus] = useState("");
      useEffect(()=>{
        const key = localStorage.getItem("mlb_ai_key");
        if (!key) return; // no API key, skip
        async function autoFetch() {
          const now = new Date();
          const existingPicks = await loadAIPicks();
          const pickedIds = new Set(existingPicks.games.map(g=>g.id));
          const candidates = processed.filter(g => {
            if (g.isFinal || g.isLive) return false;
            if (pickedIds.has(g.id)) return false; // already have a pick
            const start = new Date(g.start_time);
            const minsUntil = (start - now) / 60000;
            return minsUntil > 0 && minsUntil <= 120; // within next 2 hours
          });
          if (!candidates.length) return;
          setAutoPickStatus("Auto-fetching " + candidates.length + " upcoming pick(s)…");
          for (const game of candidates) {
            try {
              const vk = game.home + "|" + game.away;
              const vl = vegasOdds[vk] || null;
              const ctx = gameCtxMap[game.id] || null;
              // Compute value side for prompt context
              const hWin = parseFloat(game.odds.hWinPct)/100;
              const aWin = parseFloat(game.odds.aWinPct)/100;
              const vegasHP = vl?.hMLraw != null ? (vl.hMLraw<0?Math.abs(vl.hMLraw)/(Math.abs(vl.hMLraw)+100):100/(vl.hMLraw+100)) : null;
              const vegasAP = vl?.aMLraw != null ? (vl.aMLraw<0?Math.abs(vl.aMLraw)/(Math.abs(vl.aMLraw)+100):100/(vl.aMLraw+100)) : null;
              const hEdge = vegasHP != null ? hWin - vegasHP : null;
              const aEdge = vegasAP != null ? aWin - vegasAP : null;
              const valueTeam = hEdge != null && aEdge != null ? (hEdge >= aEdge ? game.odds.hTeam : game.odds.aTeam) : null;
              const valueEdge = valueTeam ? (hEdge >= (aEdge||0) ? hEdge : aEdge) : null;
              const picks = await fetchAIPick(game, vl, valueTeam, valueEdge, ctx);
              setAiPicksMap(prev=>({...prev,[game.id]:picks}));
              recordAIPick(game, picks, vl);
              // Small delay between API calls
              await new Promise(r=>setTimeout(r,1500));
            } catch(e) {}
          }
          setAutoPickStatus("");
        }
        autoFetch();
        const interval = setInterval(autoFetch, 30 * 60 * 1000); // re-check every 30 min
        return () => clearInterval(interval);
      }, [processed.length, Object.keys(vegasOdds).length]);
      function odds_fallback(v){ return v||"—"; }
      return (
        <div style={{padding:"1.5rem"}}>
          <SectionHeader>DAILY BETTING LINES <LiveBadge/></SectionHeader>
          <AIKeyBanner/>
          {autoPickStatus&&<div style={{fontSize:"0.65rem",color:C.gold,marginBottom:"0.5rem",display:"flex",alignItems:"center",gap:"0.4rem"}}><Dots/>{autoPickStatus}</div>}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.75rem"}}>
            <span style={{fontSize:"0.65rem",color:vegasStatus.startsWith("✓")?C.green:vegasStatus?C.red:C.dim}}>
              Vegas: {vegasLoading?"fetching…":vegasStatus||"—"}
            </span>
            <button onClick={fetchVegasOdds} disabled={vegasLoading} style={{fontSize:"0.65rem",color:C.gold,background:"none",border:`1px solid rgba(201,168,76,0.3)`,borderRadius:3,padding:"0.2rem 0.6rem",cursor:"pointer",fontFamily:"inherit",opacity:vegasLoading?0.5:1}}>
              {vegasLoading?"…":"↻ Odds"}
            </button>
          </div>
          <div style={{display:"flex",gap:"0.5rem",marginBottom:"1.25rem"}}>
            {[{id:"today",label:"Today",count:todayG.length},{id:"tomorrow",label:"Tomorrow",count:tomorrowG.length}].map(tab=>(
              <button key={tab.id} onClick={()=>setSelectedDay(tab.id)} style={{flex:1,padding:"0.7rem 1rem",borderRadius:6,cursor:"pointer",fontFamily:"inherit",background:selectedDay===tab.id?"rgba(201,168,76,0.12)":C.surface,border:`2px solid ${selectedDay===tab.id?C.gold:C.border}`,color:selectedDay===tab.id?C.goldLight:C.muted}}>
                <div style={{fontSize:"0.95rem",fontWeight:"bold"}}>{tab.label}</div>
                <div style={{fontSize:"0.68rem",color:selectedDay===tab.id?C.gold:C.dim}}>{tab.count} games</div>
              </button>
            ))}
          </div>
          {selectedDay==="today"&&finalTd.length>0&&<div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:4,padding:"0.6rem 1rem",marginBottom:"1rem",fontSize:"0.78rem",color:C.muted}}>Today's model record: <strong style={{color:C.gold}}>{mRec.w}-{mRec.l}</strong></div>}
          {displayGames.length===0&&!loading&&<div style={{padding:"2rem",textAlign:"center",color:C.muted,background:C.surface,borderRadius:6,border:`1px solid ${C.border}`}}><div>No games loaded yet</div><button onClick={refresh} style={{marginTop:"1rem",background:"none",border:`1px solid ${C.border}`,color:C.gold,padding:"0.4rem 1rem",borderRadius:3,cursor:"pointer",fontFamily:"inherit"}}>Refresh Data</button></div>}
          <div style={{display:"grid",gap:"1rem"}}>
            {displayGames.map(game=>{
              const {odds,isFinal,isLive,hScore,aScore,ouResult,total,modelCorrect}=game;
              const hWon=isFinal&&hScore>aScore, aWon=isFinal&&aScore>hScore;
              const hWin=parseFloat(odds.hWinPct), aWin=parseFloat(odds.aWinPct);

              // Vegas value edge: compare model prob vs Vegas implied prob
              const vk = `${game.home}|${game.away}`;
              const vl = vegasOdds[vk];
              const closingKey = `${game.home}|${game.away}|${localDateKey(game.start_time)}`;
              const closingLine = storedLines[closingKey];
              // For live/final games, always show closing line (locked pre-game odds)
              const displayLine = (isFinal || isLive) ? (closingLine || vl) : vl;
              // Lock bestValueEdge display for live/final to pre-game closing line values
              const lockedVegasHProb = closingLine?.hMLraw != null ? (closingLine.hMLraw < 0 ? Math.abs(closingLine.hMLraw)/(Math.abs(closingLine.hMLraw)+100) : 100/(closingLine.hMLraw+100)) : vegasHProb;
              const lockedVegasAProb = closingLine?.aMLraw != null ? (closingLine.aMLraw < 0 ? Math.abs(closingLine.aMLraw)/(Math.abs(closingLine.aMLraw)+100) : 100/(closingLine.aMLraw+100)) : vegasAProb;
              const vegasHProb = vl?.hMLraw != null ? (vl.hMLraw < 0 ? Math.abs(vl.hMLraw)/(Math.abs(vl.hMLraw)+100) : 100/(vl.hMLraw+100)) : null;
              const vegasAProb = vl?.aMLraw != null ? (vl.aMLraw < 0 ? Math.abs(vl.aMLraw)/(Math.abs(vl.aMLraw)+100) : 100/(vl.aMLraw+100)) : null;
              const hValueEdge = vegasHProb != null ? (hWin/100) - vegasHProb : null;
              const aValueEdge = vegasAProb != null ? (aWin/100) - vegasAProb : null;
              // Best value pick: whichever side has the most positive edge vs Vegas
              const bestValueSide = hValueEdge != null && aValueEdge != null
                ? (hValueEdge >= aValueEdge ? "home" : "away") : null;
              const bestValueEdge = bestValueSide === "home" ? hValueEdge : aValueEdge;
              const bestValueTeam = bestValueSide === "home" ? odds.hTeam : odds.aTeam;
              const bestVegasLine = bestValueSide === "home" ? vl?.hML : vl?.aML;
              // Edge score: based on value vs Vegas when available, else model confidence
              // Lock edge score at first pitch
              const edgeKey = "edge_" + game.id;
              const computedEdge = bestValueEdge != null
                ? Math.min(10, Math.max(1, Math.round(Math.abs(bestValueEdge) * 100 / 3)))
                : Math.min(10, Math.max(1, Math.round(Math.abs(hWin-50)/2.5)));
              const storedEdge = (() => { try { return localStorage.getItem(edgeKey); } catch(e){ return null; } })();
              let edgeScore;
              if (storedEdge !== null) {
                // Already locked — always use stored value
                edgeScore = parseInt(storedEdge);
              } else if (isLive || isFinal) {
                // Live/Final with no stored value — lock NOW (handles already-live games)
                edgeScore = computedEdge;
                try { localStorage.setItem(edgeKey, String(edgeScore)); } catch(e){}
              } else {
                // Pre-game with Vegas line — save pre-game edge
                edgeScore = computedEdge;
                if (vl) { try { localStorage.setItem(edgeKey, String(edgeScore)); } catch(e){} }
              }
              const edgeColor = edgeScore>=8?C.green:edgeScore>=6?"#7ec87e":edgeScore>=4?C.gold:C.muted;
              const hasValue = bestValueEdge != null && bestValueEdge >= 0.03;

              return (
                <div key={game.id} style={{background:C.surface,border:`1px solid ${isLive?"rgba(93,200,122,0.4)":hasValue?"rgba(93,200,122,0.2)":isFinal?"rgba(255,255,255,0.06)":"rgba(255,255,255,0.1)"}`,borderRadius:8,overflow:"hidden"}}>
                  <div style={{padding:"0.9rem 1rem 0.7rem",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:"1rem",fontWeight:"bold",color:isFinal?C.muted:C.text}}>{odds.aTeam.name}{(odds.aTeam.wins+odds.aTeam.losses)>0?<span style={{fontSize:"0.68rem",fontWeight:"normal",color:C.dim}}> ({odds.aTeam.wins}-{odds.aTeam.losses})</span>:null}{" @ "}{odds.hTeam.name}{(odds.hTeam.wins+odds.hTeam.losses)>0?<span style={{fontSize:"0.68rem",fontWeight:"normal",color:C.dim}}> ({odds.hTeam.wins}-{odds.hTeam.losses})</span>:null}</div>
                      <div style={{fontSize:"0.68rem",color:isLive?C.green:isFinal?C.dim:C.muted,marginTop:"0.25rem"}}>{isLive?"LIVE":isFinal?"FINAL":fmtTime(game.start_time)}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:"1.2rem",fontWeight:"bold",color:edgeColor}}>Edge: {edgeScore}/10</div>
                      {hasValue
                        ? <div style={{fontSize:"0.68rem",color:edgeColor,fontWeight:"bold"}}>▲ {bestValueTeam.id} {bestVegasLine} (+{(bestValueEdge*100).toFixed(0)}pp value)</div>
                        : <div style={{fontSize:"0.7rem",color:C.muted}}>{hWin}% home win</div>
                      }
                      <div style={{fontSize:"0.68rem",color:C.dim,marginTop:"0.1rem"}}>
                      proj {odds.aRuns}–{odds.hRuns} · {odds.ou} tot
                      </div>
                    </div>
                  </div>
                  <div style={{padding:"0 1rem 0.7rem"}}>
                    <div style={{height:8,borderRadius:4,overflow:"hidden",display:"flex",background:C.bg}}><div style={{width:`${hWin}%`,background:`linear-gradient(90deg,${odds.hTeam.color},${odds.hTeam.color}cc)`,transition:"width 0.6s"}}/><div style={{flex:1,background:`linear-gradient(90deg,${odds.aTeam.color}cc,${odds.aTeam.color})`}}/></div>
                    <div style={{display:"flex",justifyContent:"space-between",marginTop:"0.3rem"}}><span style={{fontSize:"0.72rem"}}>{odds.hTeam.name} {hWin}%</span><span style={{fontSize:"0.72rem"}}>{odds.aTeam.name} {aWin}%</span></div>
                  </div>
                  {(isFinal||isLive)&&hScore!=null&&aScore!=null&&(
                    <div style={{margin:"0 1rem 0.7rem",background:C.bg,borderRadius:6,padding:"0.5rem 0.75rem",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div style={{display:"flex",alignItems:"center",gap:"0.5rem"}}>
                        <TeamLogo abbr={odds.aTeam.id} color={odds.aTeam.color} size={18}/>
                        <span style={{fontSize:"0.85rem",color:aWon?C.text:isFinal?C.dim:C.text}}>{odds.aTeam.name}</span>
                        <span style={{fontSize:"1.5rem",fontWeight:"bold",color:isFinal?(aWon?C.green:C.muted):C.text,marginLeft:"0.5rem"}}>{aScore}</span>
                      </div>
                      <div style={{textAlign:"center"}}>
                        {isLive
                          ? <div><div style={{fontSize:"0.65rem",color:C.green,fontWeight:"bold",letterSpacing:"0.06em"}}>LIVE</div>{game.inning&&<div style={{fontSize:"0.58rem",color:C.dim}}>{game.inningHalf} {game.inning}</div>}</div>
                          : <span style={{fontSize:"0.7rem",color:C.dim,letterSpacing:"0.06em"}}>FINAL</span>
                        }
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:"0.5rem"}}>
                        <span style={{fontSize:"1.5rem",fontWeight:"bold",color:isFinal?(hWon?C.green:C.muted):C.text,marginRight:"0.5rem"}}>{hScore}</span>
                        <span style={{fontSize:"0.85rem",color:hWon?C.text:isFinal?C.dim:C.text}}>{odds.hTeam.name}</span>
                        <TeamLogo abbr={odds.hTeam.id} color={odds.hTeam.color} size={18}/>
                      </div>
                    </div>
                  )}
                  {(()=>{
                    const sim = odds.sim;
                    const modelOU  = +odds.ou.toFixed(1);
                    // Use Vegas line for over probability — what % of sims beat the Vegas number
                    const vegasOUForProb = parseFloat(displayLine?.ou || vl?.ou || modelOU);
                    const overProb = sim ? (simOverProb(sim.totalDist, vegasOUForProb)*100).toFixed(0) : "--";
                    const vk = `${game.home}|${game.away}`;
                    const vl = vegasOdds[vk];
                    const actualMargin = isFinal && hScore!=null && aScore!=null ? hScore - aScore : null;
                    const actualTotal  = isFinal && hScore!=null && aScore!=null ? hScore + aScore : null;
                    // ML: track value pick (team with edge vs Vegas) not just model favorite
                    const mlPickHome = bestValueSide === "home" ? true : bestValueSide === "away" ? false : (hWin >= aWin);
                    const modelFavHome = mlPickHome;
                    const mlHit = isFinal && actualMargin != null
                      ? (mlPickHome ? actualMargin > 0 : actualMargin < 0) : null;
                    // RL: model favorite at -1.5 (not value pick — underdog can't cover -1.5)
                    const modelFavIsHomeCard = hWin >= aWin;
                    const rlHit = isFinal && actualMargin != null
                      ? (modelFavIsHomeCard ? actualMargin >= 2 : actualMargin <= -2) : null;
                    // O/U: use Vegas line if available, else model line
                    const vegasOULine = displayLine?.ou ? parseFloat(displayLine.ou) : null;
                    const ouLineToUse = vegasOULine || modelOU;
                    const modelOverFav = parseFloat(overProb) >= 50;
                    // Model's O/U pick vs the Vegas line specifically
                    const modelProjTotal = (odds.aRuns || 0) + (odds.hRuns || 0);
                    const modelPickOver = overProb !== "--" ? parseFloat(overProb) >= 50 : (vegasOULine ? modelProjTotal > vegasOULine : modelOverFav);
                    const ouHit = isFinal && actualTotal != null
                      ? (modelPickOver ? actualTotal > ouLineToUse : actualTotal < ouLineToUse) : null;

                        </div>
                      </>;
                    })()}
                    {/* Status + AI TAKE */}
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:"0.1rem"}}>
                      <div style={{display:"flex",gap:"0.5rem",alignItems:"center"}}>
                        {modelCorrect===true&&<span style={{fontSize:"0.65rem",color:C.green,fontWeight:"bold"}}>ML HIT</span>}
                        {modelCorrect===false&&<span style={{fontSize:"0.65rem",color:C.red}}>ML MISS</span>}
                        {ouResult&&<span style={{fontSize:"0.65rem",color:ouResult==="OVER"?C.green:ouResult==="UNDER"?C.muted:C.dim}}>{ouResult} {game.ouLine} · {total}R</span>}
                      </div>
                      <button onClick={()=>getAI(game,vl,bestValueTeam,bestValueEdge,bestVegasLine,gameCtxMap[game.id]||null)} style={{padding:"0.3rem 0.9rem",fontSize:"0.7rem",cursor:"pointer",fontFamily:"inherit",background:aiLoad&&selGame?.id===game.id?"rgba(201,168,76,0.2)":"rgba(201,168,76,0.1)",border:"1px solid rgba(201,168,76,0.3)",color:C.gold,borderRadius:4}}>
                        {aiLoad&&selGame?.id===game.id?"…":"AI TAKE"}
                      </button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
          {selGame&&(
            <div style={{background:"rgba(201,168,76,0.05)",border:"1px solid rgba(201,168,76,0.22)",borderRadius:6,padding:"0.9rem 1.1rem",marginTop:"1.25rem"}}>
              <div style={{fontSize:"0.62rem",letterSpacing:"0.14em",color:C.gold,marginBottom:"0.75rem"}}>AI TAKE – {selGame.away} @ {selGame.home}</div>
              {aiLoad ? <Dots/> : aiPicksMap[selGame.id] && (
                <div style={{display:"grid",gap:"0.5rem"}}>
                  {[
                    {label:"ML", value:aiPicksMap[selGame.id]?.ml, color:"#60a8e0"},
                    {label:"RL", value:aiPicksMap[selGame.id]?.rl, color:C.green},
                    {label:"O/U",value:aiPicksMap[selGame.id]?.ou, color:C.gold},
                  ].map(({label,value,color})=>(
                    <div key={label} style={{display:"flex",gap:"0.75rem",alignItems:"flex-start",padding:"0.55rem 0.75rem",background:C.bg,borderRadius:4,border:`1px solid ${C.border}`}}>

          {myBets.length>0&&<div style={{background:C.header,border:`1px solid ${C.border}`,borderRadius:4,padding:"0.9rem 1.1rem",marginTop:"1.25rem"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.6rem"}}><span style={{fontSize:"0.73rem",color:C.gold}}>BET SLIP ({myBets.length})</span><button onClick={()=>setMyBets([])} style={{fontSize:"0.68rem",color:C.dim,background:"none",border:`1px solid ${C.border}`,borderRadius:2,padding:"0.18rem 0.45rem",cursor:"pointer",fontFamily:"inherit"}}>CLEAR</button></div>{myBets.map((b,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",background:C.surface,borderRadius:3,padding:"0.4rem 0.7rem",border:`1px solid ${C.border}`,marginBottom:3}}><span style={{fontSize:"0.8rem"}}>{b.side==="hml"?processed.find(g=>g.id===b.id)?.odds.hTeam.name:processed.find(g=>g.id===b.id)?.odds.aTeam.name}</span><span style={{color:C.gold,fontWeight:"bold",fontSize:"0.8rem"}}>{b.line}</span></div>)}<div style={{marginTop:"0.6rem",fontSize:"0.7rem",color:C.dim,padding:"0.4rem 0.6rem",background:"rgba(201,168,76,0.05)",borderRadius:3}}>Research only. Not real wagering. Gamble responsibly.</div></div>}
        </div>
      );
    }

    // ── VS VEGAS TRACKING ─────────────────────────────────────────
    const VS_VEGAS_KEY = "mlb_vs_vegas";
    const CURRENT_SEASON = new Date().getFullYear().toString();
    const REGULAR_SEASON_START = "2026-03-28";

    const VS_VEGAS_SCHEMA_VERSION = "v2-rl-ai";

    // ── AI Picks storage ─────────────────────────────────────────
    const AI_PICKS_KEY = "mlb_ai_picks_log";
    async function loadAIPicks() {
      try { const s=await window.storage.get(AI_PICKS_KEY); if(s&&s.value) return JSON.parse(s.value); } catch(e){}
      return {games:[]};
    }
    async function saveAIPicks(data) {
      try { if(data.games.length>500) data.games=data.games.slice(-500); await window.storage.set(AI_PICKS_KEY,JSON.stringify(data)); } catch(e){}
    }
    async function recordAIPick(game, picks, vegasLine) {
      if (!picks||picks.ml==="—") return;
      if (localDateKey(game.start_time) < REGULAR_SEASON_START) return;
      const data = await loadAIPicks();
      const existing = data.games.findIndex(g=>g.id===game.id);
      const entry = {
        id:game.id, date:localDateKey(game.start_time), home:game.home, away:game.away,
        vegasHML:vegasLine?.hML||"—", vegasAML:vegasLine?.aML||"—",
        vegasHRL:vegasLine?.hRL||"—", vegasARL:vegasLine?.aRL||"—", vegasOU:vegasLine?.ou||"—",
        mlPick:picks.ml, rlPick:picks.rl, ouPick:picks.ou,
        hScore:null, aScore:null, mlHit:null, rlHit:null, ouHit:null,
        settledAt:null, recordedAt:Date.now(),
      };
      if (existing>=0) {
        const prev=data.games[existing];
        if (prev.settledAt) { entry.hScore=prev.hScore; entry.aScore=prev.aScore; entry.mlHit=prev.mlHit; entry.rlHit=prev.rlHit; entry.ouHit=prev.ouHit; entry.settledAt=prev.settledAt; }
        data.games[existing]=entry;
      } else { data.games.push(entry); }
      await saveAIPicks(data);
    }
    async function settleAIPick(game) {
      if (game.hScore==null||game.aScore==null) return;
      const data=await loadAIPicks();
      const idx=data.games.findIndex(g=>g.id===game.id);
      if (idx<0) return;
      const entry=data.games[idx];
      // Always re-settle (idempotent — correct data wins)
      const margin=game.hScore-game.aScore, total=game.hScore+game.aScore;
      // Use full name, city, nickname, and abbr for robust matching
      const homeFullName = (TEAM_FULL_NAMES[game.home]||"").toLowerCase();
      const awayFullName = (TEAM_FULL_NAMES[game.away]||"").toLowerCase();
      const homeLastWord = homeFullName.split(" ").pop();
      const awayLastWord = awayFullName.split(" ").pop();
      // Only use last word if it doesn't collide (e.g. "sox" for both BOS and CWS)
      const homeNames = [game.home.toLowerCase(), homeFullName, homeLastWord !== awayLastWord ? homeLastWord : ""].filter(Boolean);
      const awayNames = [game.away.toLowerCase(), awayFullName, homeLastWord !== awayLastWord ? awayLastWord : ""].filter(Boolean);
      // ML
      const mlText=(entry.mlPick||"").toLowerCase();
      const hMI=Math.min(...homeNames.map(n=>mlText.indexOf(n)>=0?mlText.indexOf(n):999));
      const aMI=Math.min(...awayNames.map(n=>mlText.indexOf(n)>=0?mlText.indexOf(n):999));
      let mlHit=null;
      if(hMI<999&&hMI<aMI) mlHit=margin>0; else if(aMI<999) mlHit=margin<0;
      // RL
      const rlText=(entry.rlPick||"").toLowerCase();
      const hRI=Math.min(...homeNames.map(n=>rlText.indexOf(n)>=0?rlText.indexOf(n):999));
      const aRI=Math.min(...awayNames.map(n=>rlText.indexOf(n)>=0?rlText.indexOf(n):999));
      let rlHit=null;
      if(hRI<999||aRI<999){const ph=hRI<aRI,plus=rlText.includes("+1.5"); rlHit=ph?(plus?margin>=-1:margin>=2):(plus?margin<=1:margin<=-2);}
      // OU — try stored Vegas line first, then closing line from localStorage, then parse from AI pick text
      const ouText=(entry.ouPick||"").toUpperCase();
      let vegasOUNum=parseFloat(entry.vegasOU);
      if (isNaN(vegasOUNum)) {
        // Try closing line from localStorage
        try {
          const clRaw = localStorage.getItem("mlb_closing_lines");
          if (clRaw) {
            const cl = JSON.parse(clRaw);
            const clKey = entry.home + "|" + entry.away + "|" + entry.date;
            const clOU = parseFloat(cl[clKey]?.ou);
            if (!isNaN(clOU)) vegasOUNum = clOU;
          }
        } catch(e) {}
      }
      if (isNaN(vegasOUNum)) {
        // Last resort: parse the total number from the AI pick text (e.g. "UNDER 8.5 — ...")
        const numMatch = ouText.match(/(\d+\.?\d*)/);
        if (numMatch) vegasOUNum = parseFloat(numMatch[1]);
      }
      let ouHit=null;
      if(!isNaN(vegasOUNum)&&ouText){
        if(ouText.includes("OVER"))  ouHit = total > vegasOUNum;
        else if(ouText.includes("UNDER")) ouHit = total < vegasOUNum;
      }
      entry.hScore=game.hScore; entry.aScore=game.aScore;
      entry.mlHit=mlHit; entry.rlHit=rlHit; entry.ouHit=ouHit; entry.settledAt=Date.now();
      data.games[idx]=entry;
      await saveAIPicks(data);
    }

    async function loadVsVegas() {
      try {
        const s = await window.storage.get(VS_VEGAS_KEY);
        if (s && s.value) {
          const d = JSON.parse(s.value);
          if (d.season !== CURRENT_SEASON) return { season: CURRENT_SEASON, games: [], schemaVersion: VS_VEGAS_SCHEMA_VERSION };
          // Schema migration: if stored data is from old schema, wipe and start fresh
          if (d.schemaVersion !== VS_VEGAS_SCHEMA_VERSION) {
            const fresh = { season: CURRENT_SEASON, games: [], schemaVersion: VS_VEGAS_SCHEMA_VERSION };
            await saveVsVegas(fresh);
            return fresh;
          }
          d.games = (d.games || []).filter(g =>
            (g.date || "") >= REGULAR_SEASON_START &&
            g.home && g.home.length >= 2 &&
            g.away && g.away.length >= 2
          );
          // Backfill projected scores for games stored before this field existed
          let needsSave = false;
          for (const g of d.games) {
            if (g.projHomeRuns == null || g.projAwayRuns == null) {
              const h = BASELINE.find(t=>t.id===g.home);
              const a = BASELINE.find(t=>t.id===g.away);
              if (h && a) {
                try {
                  const sim = runSimulation(h, a, true);
                  g.projHomeRuns = +sim.hAvgRuns;
                  g.projAwayRuns = +sim.aAvgRuns;
                  g.projTotal    = +sim.avgTotal.toFixed(1);
                  needsSave = true;
                } catch {}
              }
            }
          }
          if (needsSave) {
            try { await window.storage.set(VS_VEGAS_KEY, JSON.stringify(d)); } catch {}
          }
          return d;
        }
      } catch {}
      return { season: CURRENT_SEASON, games: [] };
    }

    async function saveVsVegas(data) {
      try {
        if (data.games.length > 1000) data.games = data.games.slice(-1000);
        await window.storage.set(VS_VEGAS_KEY, JSON.stringify(data));
      } catch {}
    }

    async function recordVsVegas(game, odds) {
      const gameDate = localDateKey(game.start_time);
      if (gameDate < REGULAR_SEASON_START) return;
      if (game.gameType && game.gameType !== "R" && game.gameType !== "P") return;
      const s = (game.status||"").toLowerCase();
      if (s !== "final" && s !== "closed") return;
      if (game.hScore == null || game.aScore == null) return;

      const data = await loadVsVegas();
      const existingIdx = data.games.findIndex(g => g.id === game.id);
      // Re-record if existing entry has no Vegas ML (odds weren't loaded first time)
      if (existingIdx >= 0 && data.games[existingIdx].vegasML != null) return;
      if (existingIdx >= 0) data.games.splice(existingIdx, 1); // remove stale entry

      const total = game.hScore + game.aScore;
      const homeWon = game.hScore > game.aScore;
      const mHWin = parseFloat(odds.hWinPct || 50);
      const mAWin = parseFloat(odds.aWinPct || 50);

      // ML pick: use value pick (edge vs Vegas) not just model favorite
      const vegasHProb = odds.hMLraw != null ? (odds.hMLraw < 0 ? Math.abs(odds.hMLraw)/(Math.abs(odds.hMLraw)+100) : 100/(odds.hMLraw+100)) : null;
      const vegasAProb = odds.aMLraw != null ? (odds.aMLraw < 0 ? Math.abs(odds.aMLraw)/(Math.abs(odds.aMLraw)+100) : 100/(odds.aMLraw+100)) : null;
      const hValueEdge = vegasHProb != null ? (mHWin/100) - vegasHProb : null;
      const aValueEdge = vegasAProb != null ? (mAWin/100) - vegasAProb : null;
      // Pick the value side; fall back to model favorite if no Vegas line
      const pickHome = (hValueEdge != null && aValueEdge != null)
        ? hValueEdge >= aValueEdge
        : mHWin >= mAWin;
      const modelFavHome = pickHome;
      const modelFavTeam = pickHome ? game.home : game.away;
      const modelFavPct  = pickHome ? mHWin : mAWin;
      const modelFavWon  = pickHome ? homeWon : !homeWon;
      const mlHit = modelFavWon;
      const margin = game.hScore - game.aScore;
      // RL: always track value pick team at -1.5 (consistent with ML/OU model tracking)
      const rlHit = pickHome ? margin >= 2 : margin <= -2;

      // O/U: use Vegas line if available, else model projected total
      const closingKey = `${game.home}|${game.away}|${localDateKey(game.start_time)}`;
      const storedCL = (() => { try { const r = localStorage.getItem("mlb_closing_lines"); if(r) { const p=JSON.parse(r); return p[closingKey]; } } catch(e){} return null; })();
      const vegasOU = storedCL?.ou ? parseFloat(storedCL.ou) : null;
      const ouLine = vegasOU || parseFloat(odds.ou) || null;
      // Model's pick: projected total vs Vegas line
      const projTotal = (odds.aRuns || 0) + (odds.hRuns || 0);
      const modelPickOver = vegasOU ? projTotal > vegasOU : parseFloat(odds.overPct) >= 50;
      const modelOUPick = modelPickOver ? "OVER" : "UNDER";
      const ouHit = ouLine != null
        ? (modelPickOver ? total > ouLine : total < ouLine)
        : null;
      const vegasML = pickHome ? (odds.hML || null) : (odds.aML || null);
      const modelRLLine = pickHome ? (odds.hRL || null) : (odds.aRL || null);

      // Pull projected runs — prefer direct property, fall back to sim
      const projHomeRuns = odds.hRuns != null ? +odds.hRuns : (odds.sim ? +odds.sim.hAvgRuns : null);
      const projAwayRuns = odds.aRuns != null ? +odds.aRuns : (odds.sim ? +odds.sim.aAvgRuns : null);

      data.games.push({
        id: game.id,
        date: localDateKey(game.start_time),
        home: game.home, away: game.away,
        modelFavTeam, modelFavPct,
        vegasML, mlHit,
        modelRLTeam: modelFavTeam, modelRLLine, rlHit,
        modelOUPick, ouLine, ouHit,
        hScore: game.hScore, aScore: game.aScore, total,
        projHomeRuns, projAwayRuns,
        projTotal: ouLine,
        settledAt: Date.now(),
      });

      await saveVsVegas(data);

      // Update Poisson lambda adjustments from this game's prediction error
      await updateLambdaAdj(game.home, game.away, projHomeRuns, projAwayRuns, game.hScore, game.aScore);
      await refreshLambdaAdj();

      // Update pitcher ERA from boxscore if available
      try {
        const bsRes = await fetch(`https://statsapi.mlb.com/api/v1/game/${game.id}/boxscore`).catch(()=>null);
        if (bsRes && bsRes.ok) {
          const bs = await bsRes.json();
          for (const side of ["away","home"]) {
            const pitchers = bs.teams?.[side]?.pitchers || [];
            const players  = bs.teams?.[side]?.players  || {};
            for (const pid of pitchers) {
              const p = players["ID"+pid];
              if (!p) continue;
              const name = p.person?.fullName;
              const er   = p.stats?.pitching?.earnedRuns;
              const ipStr = p.stats?.pitching?.inningsPitched;
              const ip    = ipStr ? parseFloat(ipStr) : null;
              if (name && er != null && ip != null && ip > 0) {
                recordPitcherOuting(name, er, ip);
              }
            }
          }
        }
      } catch(e) {}
    }

    function mlToProb(mlStr) {
      if (!mlStr) return null;
      const n = parseFloat(mlStr.replace(/[^0-9\-+]/g,''));
      if (isNaN(n)) return null;
      return n < 0 ? Math.abs(n)/(Math.abs(n)+100) : 100/(n+100);
    }

    function computeROI(games, pickField, hitField, mlField) {
      let spent = 0, returned = 0, wins = 0, losses = 0, pushes = 0;
      for (const g of games) {
        if (g[hitField] == null) continue;
        const ml = mlField ? g[mlField] : null;
        spent += 100;
        if (g[hitField] === true) {
          wins++;
          if (ml) {
            const n = parseFloat((ml||"").replace(/[^0-9\-+]/g,''));
            returned += 100 + (n < 0 ? 100/Math.abs(n)*100 : n);
          } else {
            returned += 190;
          }
        } else {
          losses++;
        }
      }
      const net = returned - spent;
      const roi = spent > 0 ? (net/spent*100) : 0;
      return { spent, returned, net, roi, wins, losses, pushes, total: wins+losses+pushes };
    }

    function ModelPerfPage() {
      const [vvData, setVvData]     = useState(null);
      const [loading, setLoading]   = useState(true);
      const [logPage, setLogPage]   = useState(0);
      const LOG_PER_PAGE = 15;

      useEffect(()=>{
        async function load() {
          setLoading(true);
          const vv = await loadVsVegas();
          setVvData(vv);
          setLoading(false);
        }
        load();
        const id = setInterval(load, 60000);
        return () => clearInterval(id);
      },[]);

      const games   = vvData?.games || [];
      const settled = games.filter(g => g.mlHit != null);
      const mlGames = settled.filter(g => g.mlHit  != null);
      const rlGames = settled.filter(g => g.rlHit  != null);
      const ouGames = settled.filter(g => g.ouHit  != null);
      const mlW = mlGames.filter(g=>g.mlHit).length;
      const rlW = rlGames.filter(g=>g.rlHit).length;
      const ouW = ouGames.filter(g=>g.ouHit).length;
      const mlPct = mlGames.length ? mlW/mlGames.length*100 : null;
      const rlPct = rlGames.length ? rlW/rlGames.length*100 : null;
      const ouPct = ouGames.length ? ouW/ouGames.length*100 : null;
      const mlRoi = computeROI(mlGames,"modelFavTeam","mlHit","vegasML");
      const rlRoi = computeROI(rlGames,"modelRLTeam","rlHit",null);
      const ouRoi = computeROI(ouGames,"modelOUPick","ouHit",null);
      const last10 = [...settled].slice(-10);
      const l10ML = last10.filter(g=>g.mlHit).length;
      const l10RL = last10.filter(g=>g.rlHit).length;
      const l10OU = last10.filter(g=>g.ouHit).length;

      // helper: compute ML/RL/OU stats for a set of games
      function bucketStats(games) {
        const mlW=games.filter(g=>g.mlHit).length, mlN=games.filter(g=>g.mlHit!=null).length;
        const rlW=games.filter(g=>g.rlHit).length, rlN=games.filter(g=>g.rlHit!=null).length;
        const ouW=games.filter(g=>g.ouHit).length, ouN=games.filter(g=>g.ouHit!=null).length;
        return {
          ml:{ w:mlW, n:mlN, pct:mlN?mlW/mlN*100:null },
          rl:{ w:rlW, n:rlN, pct:rlN?rlW/rlN*100:null },
          ou:{ w:ouW, n:ouN, pct:ouN?ouW/ouN*100:null },
        };
      }

      const buckets = [
        {label:"50-55%",min:50,max:55},{label:"55-60%",min:55,max:60},
        {label:"60-65%",min:60,max:65},{label:"65-70%",min:65,max:70},
        {label:"70%+",min:70,max:100},
      ].map(b=>{
        const bg=settled.filter(g=>g.modelFavPct>=b.min&&g.modelFavPct<b.max);
        return {...b, ...bucketStats(bg), n:bg.length};
      });

      // Edge buckets — edge = min(10,max(1,round(abs(modelFavPct-50)/2.5)))
      const edgeBuckets = [
        {label:"1-3",  min:1, max:3,  desc:"Low"},
        {label:"4-5",  min:4, max:5,  desc:"Moderate"},
        {label:"6-7",  min:6, max:7,  desc:"Strong"},
        {label:"8-9",  min:8, max:9,  desc:"Elite"},
        {label:"10",   min:10,max:10, desc:"Max"},
      ].map(b=>{
        const bg = settled.filter(g=>{
          const edge = Math.min(10,Math.max(1,Math.round(Math.abs(g.modelFavPct-50)/2.5)));
          return edge >= b.min && edge <= b.max;
        });
        return {...b, ...bucketStats(bg), n:bg.length};
      });

      const logGames  = [...settled].reverse();
      const totalPages = Math.ceil(logGames.length/LOG_PER_PAGE);
      const pageGames  = logGames.slice(logPage*LOG_PER_PAGE,(logPage+1)*LOG_PER_PAGE);

      const StatCard = ({label,value,sub,color,trend}) => (
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:"1rem 1.1rem",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:color||C.gold,opacity:0.7}}/>
          <div style={{fontSize:"0.6rem",letterSpacing:"0.12em",color:C.dim,marginBottom:"0.4rem"}}>{label}</div>
          <div style={{fontSize:"1.6rem",fontWeight:"bold",color:color||C.gold,lineHeight:1}}>{value??'--'}</div>
          {sub&&<div style={{fontSize:"0.65rem",color:C.dim,marginTop:"0.3rem"}}>{sub}</div>}
          {trend!=null&&<div style={{fontSize:"0.65rem",color:trend>=5?C.green:C.red,marginTop:"0.15rem",fontWeight:"bold"}}>{trend>=5?"↑":"↓"} L10: {trend}-{10-trend}</div>}
        </div>
      );

      if (loading) return <div style={{padding:"3rem",textAlign:"center",color:C.muted}}>Loading…</div>;

      return (
        <div style={{padding:"1.5rem"}}>
          <SectionHeader>MODEL PERFORMANCE <LiveBadge/></SectionHeader>
          <div style={{marginBottom:"1rem",fontSize:"0.72rem",color:C.dim}}>{CURRENT_SEASON} · {settled.length} games tracked · ML/RL = value pick vs Vegas · O/U = proj vs Vegas line</div>

    // ── Page: Methodology ─────────────────────────────────────────
    // ── Page: Predictions vs Actuals ─────────────────────────────
    function PredictionsPage() {
      const [vvData, setVvData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [filter, setFilter] = useState("all"); // all | ml-hit | ml-miss | ou-over | ou-under
      const [sortBy, setSortBy] = useState("date");
      const [page, setPage] = useState(0);
      const PER_PAGE = 20;

      useEffect(()=>{
        async function load() {
          setLoading(true);
          const vv = await loadVsVegas();
          setVvData(vv);
          setLoading(false);
        }
        load();
        const id = setInterval(load, 60000);
        return () => clearInterval(id);
      },[]);

      const games = (vvData?.games || []).filter(g => g.mlHit != null);

      const filtered = games.filter(g => {
        if (filter === "ml-hit")   return g.mlHit === true;
        if (filter === "ml-miss")  return g.mlHit === false;
        if (filter === "ou-over")  return g.modelOUPick === "OVER";
        if (filter === "ou-under") return g.modelOUPick === "UNDER";
        if (filter === "rl-hit")   return g.rlHit === true;
        if (filter === "rl-miss")  return g.rlHit === false;
        return true;
      }).sort((a,b) => sortBy === "date" ? b.settledAt - a.settledAt : 0);

      const totalPages = Math.ceil(filtered.length / PER_PAGE);
      const pageGames  = filtered.slice(page * PER_PAGE, (page+1) * PER_PAGE);

      // Summary stats
      const mlW = games.filter(g=>g.mlHit).length;
      const rlW = games.filter(g=>g.rlHit).length;
      const ouW = games.filter(g=>g.ouHit).length;
      const n   = games.length;

      // Score accuracy — MAE on projected vs actual runs
      const scoredGames = games.filter(g => g.projHomeRuns != null && g.projAwayRuns != null);
      const homeMAE = scoredGames.length
        ? (scoredGames.reduce((s,g) => s + Math.abs(g.projHomeRuns - g.hScore), 0) / scoredGames.length).toFixed(2)
        : null;
      const awayMAE = scoredGames.length
        ? (scoredGames.reduce((s,g) => s + Math.abs(g.projAwayRuns - g.aScore), 0) / scoredGames.length).toFixed(2)
        : null;
      const totalMAE = scoredGames.length
        ? (scoredGames.reduce((s,g) => s + Math.abs((g.projHomeRuns+g.projAwayRuns) - g.total), 0) / scoredGames.length).toFixed(2)
        : null;

      const Pill = ({label, val, color}) => (
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:"0.6rem 0.8rem",textAlign:"center",flex:1}}>
          <div style={{fontSize:"0.52rem",letterSpacing:"0.1em",color:C.dim,marginBottom:"0.25rem"}}>{label}</div>
          <div style={{fontSize:"1.1rem",fontWeight:"bold",color:color||C.gold}}>{val}</div>
        </div>
      );

      if (loading) return <div style={{padding:"3rem",textAlign:"center",color:C.muted}}>Loading…</div>;

      return (
        <div style={{padding:"1.5rem"}}>
          <SectionHeader>PREDICTIONS VS ACTUALS <LiveBadge/></SectionHeader>

          {/* Summary row */}
          {n > 0 && (
            <div style={{display:"flex",gap:"0.5rem",marginBottom:"1rem",flexWrap:"wrap"}}>
              <Pill label="ML" val={`${mlW}-${n-mlW}`} color={mlW/n>=0.524?C.green:C.red}/>
              <Pill label="RL" val={`${rlW}-${n-rlW}`} color={rlW/n>=0.524?C.green:C.red}/>
              <Pill label="O/U" val={`${ouW}-${n-ouW}`} color={ouW/n>=0.524?C.green:C.red}/>
              {homeMAE && <Pill label="SCORE MAE" val={`±${totalMAE}R`} color={C.muted}/>}
            </div>
          )}

          {/* Score accuracy detail */}
          {scoredGames.length > 0 && (
            <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:"0.7rem 1rem",marginBottom:"1rem",display:"flex",gap:"1.5rem",flexWrap:"wrap"}}>
              <div style={{fontSize:"0.62rem",color:C.dim,letterSpacing:"0.08em",alignSelf:"center"}}>PROJ SCORE MAE</div>
              <div style={{textAlign:"center"}}><div style={{fontSize:"0.55rem",color:C.dim}}>HOME</div><div style={{fontSize:"0.85rem",fontWeight:"bold",color:C.muted}}>±{homeMAE}R</div></div>
              <div style={{textAlign:"center"}}><div style={{fontSize:"0.55rem",color:C.dim}}>AWAY</div><div style={{fontSize:"0.85rem",fontWeight:"bold",color:C.muted}}>±{awayMAE}R</div></div>
              <div style={{textAlign:"center"}}><div style={{fontSize:"0.55rem",color:C.dim}}>TOTAL</div><div style={{fontSize:"0.85rem",fontWeight:"bold",color:parseFloat(totalMAE)<2?C.green:parseFloat(totalMAE)<3?C.gold:C.red}}>±{totalMAE}R</div></div>
              <div style={{fontSize:"0.58rem",color:C.dim,alignSelf:"center",marginLeft:"auto"}}>{scoredGames.length} games w/ proj</div>
            </div>
          )}

          {/* Filter tabs */}
          <div style={{display:"flex",gap:"0.3rem",marginBottom:"1rem",flexWrap:"wrap"}}>
            {[
              {id:"all",    label:"All"},
              {id:"ml-hit", label:"ML ✓"},
              {id:"ml-miss",label:"ML ✗"},
              {id:"rl-hit", label:"RL ✓"},
              {id:"rl-miss",label:"RL ✗"},
              {id:"ou-over",label:"OVER"},
              {id:"ou-under",label:"UNDER"},
            ].map(f=>(
              <button key={f.id} onClick={()=>{setFilter(f.id);setPage(0);}} style={{
                padding:"0.3rem 0.65rem",borderRadius:4,cursor:"pointer",fontFamily:"inherit",
                fontSize:"0.68rem",fontWeight:"bold",
                background:filter===f.id?"rgba(201,168,76,0.15)":C.surface,
                border:`1px solid ${filter===f.id?C.gold:C.border}`,
                color:filter===f.id?C.gold:C.muted,
              }}>{f.label}</button>
            ))}
            <div style={{marginLeft:"auto",fontSize:"0.65rem",color:C.dim,alignSelf:"center"}}>{filtered.length} games</div>
          </div>

          {n === 0 ? (
            <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:"3rem 2rem",textAlign:"center"}}>
              <div style={{fontSize:"2rem",marginBottom:"0.75rem"}}>🎯</div>
              <div style={{fontSize:"0.9rem",color:C.muted,marginBottom:"0.5rem"}}>No settled games yet</div>
              <div style={{fontSize:"0.75rem",color:C.dim}}>Predictions record automatically when games finalize on the Daily Betting Lines tab.</div>
            </div>
          ) : (
            <>
              {/* Table */}
              <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,overflow:"hidden",marginBottom:"0.5rem"}}>
                {/* Header */}
                <div style={{display:"grid",gridTemplateColumns:"2.4rem 3.8rem 4rem 4rem 2.8rem 2.6rem 2.6rem",background:C.header,borderBottom:`1px solid ${C.border}`}}>
                  {["DATE","MATCHUP","PROJ","ACTUAL","ML","RL","O/U"].map(h=>(
                    <div key={h} style={{padding:"0.35rem 0.1rem",fontSize:"0.5rem",letterSpacing:"0.03em",color:C.muted,fontWeight:"bold",textAlign:"center"}}>{h}</div>
                  ))}
                </div>
                {pageGames.map((g, i) => {
                  const favIsHome = g.modelFavTeam === g.home;
                  const homeWon = g.hScore > g.aScore;
                  const hasProj = g.projAwayRuns != null && g.projHomeRuns != null;
                  const totErr  = hasProj ? ((g.projHomeRuns+g.projAwayRuns) - g.total).toFixed(1) : null;
                  const errColor = e => Math.abs(parseFloat(e)) <= 1 ? C.green : Math.abs(parseFloat(e)) <= 2.5 ? C.gold : C.red;
                  return (
                    <div key={g.id} style={{display:"grid",gridTemplateColumns:"2.4rem 3.8rem 4rem 4rem 2.8rem 2.6rem 2.6rem",alignItems:"center",borderBottom:`1px solid ${C.border}`,background:i%2===0?"transparent":"rgba(255,255,255,0.016)"}}>
                      {/* Date */}
                      <div style={{padding:"0.35rem 0.05rem",fontSize:"0.55rem",color:C.dim,textAlign:"center",lineHeight:1.2}}>{g.date?.slice(5)||"--"}</div>
                      {/* Matchup stacked */}
                      <div style={{padding:"0.28rem 0.1rem"}}>
                        <div style={{display:"flex",alignItems:"center",gap:"0.12rem",marginBottom:"0.1rem"}}>
                          <span style={{fontSize:"0.38rem",color:C.dim,flexShrink:0}}>AWY</span>
                          <span style={{fontSize:"0.64rem",fontWeight:"bold",color:!favIsHome?C.gold:C.muted}}>{g.away}</span>
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:"0.12rem"}}>
                          <span style={{fontSize:"0.38rem",color:C.dim,flexShrink:0}}>HME</span>
                          <span style={{fontSize:"0.64rem",fontWeight:"bold",color:favIsHome?C.gold:C.muted}}>{g.home}</span>
                        </div>
                      </div>
                      {/* Projected score */}
                      <div style={{padding:"0.28rem 0.08rem",textAlign:"center"}}>
                        {hasProj ? (
                          <>
                            <div style={{fontSize:"0.64rem",fontWeight:"bold",color:C.gold,whiteSpace:"nowrap"}}>{g.projAwayRuns}-{g.projHomeRuns}</div>
                            <div style={{fontSize:"0.42rem",color:C.dim,letterSpacing:"0.02em"}}>awy-hme</div>
                            <div style={{fontSize:"0.42rem",color:C.dim}}>OU {g.projTotal}</div>
                          </>
                        ) : (
                          <div style={{fontSize:"0.6rem",color:C.dim}}>--</div>
                        )}
                      </div>
                      {/* Actual score + error */}
                      <div style={{padding:"0.28rem 0.08rem",textAlign:"center"}}>
                        <div style={{fontSize:"0.64rem",fontWeight:"bold",color:homeWon?C.green:C.text,whiteSpace:"nowrap"}}>{g.aScore}-{g.hScore}</div>
                        <div style={{fontSize:"0.42rem",color:C.dim,letterSpacing:"0.02em"}}>awy-hme</div>
                        {hasProj && (
                          <div style={{fontSize:"0.46rem",color:errColor(totErr)}}>Δ{parseFloat(totErr)>0?"+":""}{totErr}R</div>
                        )}
                      </div>
                      {/* ML */}
                      <div style={{textAlign:"center",padding:"0.1rem 0"}}>
                        <span style={{fontSize:"0.56rem",fontWeight:"bold",color:g.mlHit?C.green:C.red}}>{g.mlHit?"WIN":"LOS"}</span>
                        <div style={{fontSize:"0.44rem",color:C.dim}}>{g.modelFavTeam}</div>
                      </div>
                      {/* RL */}
                      <div style={{textAlign:"center",padding:"0.1rem 0"}}>
                        <span style={{fontSize:"0.56rem",fontWeight:"bold",color:g.rlHit?C.green:C.red}}>{g.rlHit?"WIN":"LOS"}</span>
                        <div style={{fontSize:"0.44rem",color:"transparent"}}>–</div>
                      </div>
                      {/* O/U */}
                      <div style={{textAlign:"center",padding:"0.1rem 0"}}>
                        <span style={{fontSize:"0.56rem",fontWeight:"bold",color:g.ouHit?C.green:C.red}}>{g.ouHit?"WIN":"LOS"}</span>
                        <div style={{fontSize:"0.44rem",color:C.dim}}>{g.modelOUPick==="OVER"?"OVR":"UND"}</div>
                      </div>
                    </div>
                  );
                })}
              </div>

              {/* Pagination */}
              {totalPages > 1 && (
                <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:"0.5rem",marginBottom:"1rem"}}>
                  <button onClick={()=>setPage(p=>Math.max(0,p-1))} disabled={page===0} style={{background:"none",border:`1px solid ${C.border}`,color:C.muted,padding:"0.2rem 0.6rem",borderRadius:3,cursor:"pointer",fontFamily:"inherit",fontSize:"0.75rem",opacity:page===0?0.3:1}}>←</button>
                  <span style={{fontSize:"0.72rem",color:C.dim}}>{page+1}/{totalPages}</span>
                  <button onClick={()=>setPage(p=>Math.min(totalPages-1,p+1))} disabled={page===totalPages-1} style={{background:"none",border:`1px solid ${C.border}`,color:C.muted,padding:"0.2rem 0.6rem",borderRadius:3,cursor:"pointer",fontFamily:"inherit",fontSize:"0.75rem",opacity:page===totalPages-1?0.3:1}}>→</button>
                </div>
              )}

              <div style={{fontSize:"0.62rem",color:C.dim,marginTop:"0.25rem",lineHeight:1.6}}>
                PROJ = model's projected score · Δ = actual minus projected total · color: green ≤1R, gold ≤2.5R, red &gt;2.5R off
              </div>
            </>
          )}
        </div>
      );
    }

    function MethodologyPage() {
      const items=[
        {t:"Data Source",b:"Live game data, team hitting stats (OPS/OBP/SLG), and team pitching stats (ERA/WHIP/K9/BB9) all fetched from MLB Stats API (statsapi.mlb.com). Pre-season projections blend with live stats using a liveWeight formula — at 9 games played the model is ~92% preseason, reaching 40% live at 43+ games."},
        {t:"Model Overview",b:"Three rating pillars: Offensive (40%), Defensive/Pitching (40%), Starting Pitcher (regime-based 10-35%). SP weight is nonlinear: ace-tier starters (ERA < 3.0) receive 35% weight with strong variance suppression; average starters ~20%; back-end/rookie starters 10-15% as bullpen increasingly dominates outcomes."},
        {t:"Live Blending",b:"liveWeight = min(40%, gamesPlayed / 162 × 1.5). At 0 games the model is 100% baseline. At 43+ games it reaches the 40% live cap. Prevents overreaction to early-season variance."},
        {t:"Elo System",b:"Margin-of-victory Elo updates after each completed game. K-factor scales with run margin (capped at 5 runs). A 5-run blowout updates ratings ~2.3× more than a 1-run win."},
        {t:"Poisson Simulation",b:"Each game is simulated 10,000 times using Poisson-distributed run scoring per inning. Lambda (expected runs/inning) is modulated by variance-proxy metrics: weather volatility index (wind speed × temperature extremes) and BB/9 (walks inflate run variance). This widens the run distribution for high-variance conditions without changing the mean projection."},
        {t:"Calibration",b:"Historical priors from 12,150 MLB games (2021-2025) seed the calibration system. Live predictions blend in via Bayesian updating. Correction factors applied per confidence bucket (50-55%, 55-60%, etc.)."},
        {t:"Park Factors",b:"Per-park run multipliers and home field advantage values derived from 5-year averages. Coors Field (1.38) boosts run totals significantly; Petco Park (0.91) suppresses them."},
      ];
      return (
        <div style={{padding:"1.5rem",maxWidth:740}}>
          <SectionHeader>METHODOLOGY</SectionHeader>
          {items.map(s=><div key={s.t} style={{marginBottom:"1.4rem",paddingBottom:"1.4rem",borderBottom:`1px solid ${C.border}`}}><div style={{fontWeight:"bold",color:C.goldLight,marginBottom:"0.35rem",fontSize:"0.92rem"}}>{s.t}</div><p style={{margin:0,lineHeight:1.8,fontSize:"0.84rem",color:C.muted}}>{s.b}</p></div>)}
        </div>
      );
    }

    function AIPicksPage() {
      const [data,setData]=useState({games:[]});
      const [loading,setLoading]=useState(true);
      useEffect(()=>{
        async function load(){setLoading(true);const d=await loadAIPicks();setData(d);setLoading(false);}
        load();
        const id=setInterval(load,30000);
        return ()=>clearInterval(id);
      },[]);
      const games=data.games||[];
      const settled=games.filter(g=>g.mlHit!=null||g.rlHit!=null||g.ouHit!=null);
      const pending=games.filter(g=>g.mlHit==null&&g.rlHit==null&&g.ouHit==null);
      const mlG=settled.filter(g=>g.mlHit!=null), mlW=mlG.filter(g=>g.mlHit).length;
      const rlG=settled.filter(g=>g.rlHit!=null), rlW=rlG.filter(g=>g.rlHit).length;
      const ouG=settled.filter(g=>g.ouHit!=null), ouW=ouG.filter(g=>g.ouHit).length;
      const mlPct=mlG.length?mlW/mlG.length*100:null;
      const rlPct=rlG.length?rlW/rlG.length*100:null;
      const ouPct=ouG.length?ouW/ouG.length*100:null;
      const pctColor=p=>p==null?C.muted:p>=60?C.green:p>=52?C.gold:C.red;
      function WinCard({label,w,n,pct,color}){
        return <div style={{background:C.surface,border:`1px solid ${C.border}`,borderTop:`2px solid ${color||C.border}`,borderRadius:4,padding:"0.75rem"}}>
          <div style={{fontSize:"0.58rem",letterSpacing:"0.1em",color:C.muted,marginBottom:"0.3rem"}}>{label}</div>
          <div style={{fontSize:"1.4rem",fontWeight:"bold",color:color||C.text}}>{pct!=null?pct.toFixed(1)+"%":"—"}</div>
          <div style={{fontSize:"0.62rem",color:C.dim}}>{n?`${w}-${n-w}`:"No picks yet"}</div>
        </div>;
      }
      const sortedSettled=[...settled].sort((a,b)=>b.settledAt-a.settledAt);
      const sortedPending=[...pending].sort((a,b)=>b.recordedAt-a.recordedAt);
      function Badge({hit}){
        if(hit==null)return <span style={{fontSize:"0.55rem",color:C.dim}}>—</span>;
        return <span style={{fontSize:"0.58rem",fontWeight:"bold",padding:"0.1rem 0.3rem",borderRadius:2,background:hit?"rgba(93,200,122,0.15)":"rgba(224,96,96,0.12)",color:hit?C.green:C.red}}>{hit?"HIT":"MISS"}</span>;
      }
      function GameRow({g}){
        const isSettled=g.settledAt!=null;
        return <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:4,padding:"0.75rem",marginBottom:"0.5rem"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"0.4rem"}}>
            <div>
              <div style={{fontSize:"0.8rem",fontWeight:"bold",color:C.text}}>{g.away} @ {g.home}</div>
              <div style={{fontSize:"0.6rem",color:C.dim}}>{g.date}{isSettled?` · Final: ${g.aScore}–${g.hScore}`:""}</div>
            </div>
            {isSettled&&<div style={{display:"flex",gap:"0.3rem"}}>
              <Badge hit={g.mlHit}/><Badge hit={g.rlHit}/><Badge hit={g.ouHit}/>
            </div>}
            {!isSettled&&<span style={{fontSize:"0.58rem",color:C.gold,background:"rgba(201,168,76,0.1)",border:"1px solid rgba(201,168,76,0.25)",borderRadius:3,padding:"0.1rem 0.4rem"}}>PENDING</span>}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"2rem 1fr",gap:"0.25rem 0.5rem",fontSize:"0.68rem"}}>
            <span style={{color:"#60a8e0",fontWeight:"bold",fontSize:"0.55rem",paddingTop:"0.1rem"}}>ML</span>
            <span style={{color:isSettled?(g.mlHit?C.green:g.mlHit===false?C.red:C.muted):C.text}}>{g.mlPick||"—"}</span>
            <span style={{color:C.green,fontWeight:"bold",fontSize:"0.55rem",paddingTop:"0.1rem"}}>RL</span>
            <span style={{color:isSettled?(g.rlHit?C.green:g.rlHit===false?C.red:C.muted):C.text}}>{g.rlPick||"—"}</span>
            <span style={{color:C.gold,fontWeight:"bold",fontSize:"0.55rem",paddingTop:"0.1rem"}}>O/U</span>
            <span style={{color:isSettled?(g.ouHit?C.green:g.ouHit===false?C.red:C.muted):C.text}}>{g.ouPick||"—"}</span>
          </div>
        </div>;
      }
      return <div style={{padding:"1.5rem"}}>
        <SectionHeader>AI PICKS <LiveBadge/></SectionHeader>
        {loading?<Dots/>:<>
          <div style={{fontSize:"0.7rem",color:C.dim,marginBottom:"1rem"}}>Tracks Claude AI picks vs Vegas lines · Only games where AI TAKE was used</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"0.75rem",marginBottom:"1.25rem"}}>
            <WinCard label="ML WIN RATE" w={mlW} n={mlG.length} pct={mlPct} color={pctColor(mlPct)}/>
            <WinCard label="RL WIN RATE" w={rlW} n={rlG.length} pct={rlPct} color={pctColor(rlPct)}/>
            <WinCard label="O/U WIN RATE" w={ouW} n={ouG.length} pct={ouPct} color={pctColor(ouPct)}/>
          </div>
          {sortedPending.length>0&&<>
            <div style={{fontSize:"0.68rem",letterSpacing:"0.1em",color:C.gold,fontWeight:"bold",marginBottom:"0.5rem"}}>PENDING ({sortedPending.length})</div>
            {sortedPending.map(g=><GameRow key={g.id} g={g}/>)}
          </>}
          {sortedSettled.length>0&&<>
            <div style={{fontSize:"0.68rem",letterSpacing:"0.1em",color:C.muted,fontWeight:"bold",margin:"1rem 0 0.5rem"}}>SETTLED ({sortedSettled.length})</div>
            {sortedSettled.map(g=><GameRow key={g.id} g={g}/>)}
          </>}
          {games.length===0&&<div style={{textAlign:"center",color:C.dim,fontSize:"0.8rem",marginTop:"3rem"}}>No AI picks yet. Hit AI TAKE on any game to start tracking.</div>}
        </>}
      </div>;
    }
