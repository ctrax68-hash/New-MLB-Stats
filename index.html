                </div>
              </div>
            </>
          )}
          {settled.length>0&&(
            <>
              <SectionHeader>GAME LOG</SectionHeader>
              <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,overflow:"hidden",marginBottom:"0.5rem"}}>
                <div style={{display:"grid",gridTemplateColumns:"1.8rem 3.8rem 2rem 2.6rem 2.6rem 2.2rem 2.2rem 2.2rem 2.4rem",background:C.header,borderBottom:`1px solid ${C.border}`}}>
                  {["DATE","MATCHUP","FAV","SCORE","PROJ","ML","RL","O/U","CLV"].map(h=><div key={h} style={{padding:"0.38rem 0.15rem",fontSize:"0.55rem",letterSpacing:"0.03em",color:C.muted,fontWeight:"bold",textAlign:"center"}}>{h}</div>)}
                </div>
                {pageGames.map((g,i)=>{
                  const favIsHome = g.modelFavTeam === g.home;
                  const isLoss = g.mlHit === false;
                  const tags = g.errorTags || [];
                  const autoTags = isLoss && !tags.length ? autoDetectTags(g) : [];
                  const isTagging = tagGame === g.id;
                  return (
                  <div key={g.id} style={{borderBottom:`1px solid ${C.border}`,background:i%2===0?"transparent":"rgba(255,255,255,0.016)"}}>
                    <div style={{display:"grid",gridTemplateColumns:"1.8rem 3.8rem 2rem 2.6rem 2.6rem 2.2rem 2.2rem 2.2rem 2.4rem",alignItems:"center",minHeight:"2.6rem"}}>
                      <div style={{padding:"0.3rem 0.1rem",fontSize:"0.52rem",color:C.dim,textAlign:"center",lineHeight:1.2}}>{g.date?.slice(5)||"--"}</div>
                      <div style={{padding:"0.3rem 0.2rem",minWidth:0}}>
                        <div style={{display:"flex",alignItems:"center",gap:"0.2rem",marginBottom:"0.14rem"}}>
                          <span style={{fontSize:"0.45rem",color:C.dim,letterSpacing:"0.03em",flexShrink:0}}>AWY</span>
                          <span style={{fontSize:"0.68rem",fontWeight:"bold",color:!favIsHome?C.gold:C.muted}}>{g.away}</span>
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:"0.2rem"}}>
                          <span style={{fontSize:"0.45rem",color:C.dim,letterSpacing:"0.03em",flexShrink:0}}>HME</span>
                          <span style={{fontSize:"0.68rem",fontWeight:"bold",color:favIsHome?C.gold:C.muted}}>{g.home}</span>
                        </div>
                      </div>
                      <div style={{padding:"0.3rem 0.05rem",fontSize:"0.58rem",color:C.gold,textAlign:"center",fontWeight:"bold"}}>{g.modelFavTeam}</div>
                      <div style={{padding:"0.3rem 0.05rem",fontSize:"0.58rem",color:C.text,textAlign:"center",fontWeight:"bold"}}>{g.aScore}-{g.hScore}</div>
                      <div style={{padding:"0.3rem 0.05rem",textAlign:"center"}}>
                        {g.projAwayRuns!=null&&g.projHomeRuns!=null
                          ? <span style={{fontSize:"0.5rem",color:C.dim}}>{g.projAwayRuns}-{g.projHomeRuns}</span>
                          : <span style={{fontSize:"0.5rem",color:C.dim}}>--</span>}
                      </div>
                      <div style={{textAlign:"center",padding:"0.1rem 0"}}>
                        <span
                          onClick={()=>isLoss?setTagGame(isTagging?null:g.id):null}
                          style={{fontSize:"0.52rem",fontWeight:"bold",color:g.mlHit?C.green:C.red,cursor:isLoss?"pointer":"default",textDecoration:isLoss?"underline dotted":"none"}}
                        >{g.mlHit?"W":"L"}</span>
                      </div>
                      <div style={{textAlign:"center",padding:"0.1rem 0"}}><span style={{fontSize:"0.52rem",fontWeight:"bold",color:g.rlHit?C.green:C.red}}>{g.rlHit?"W":"L"}</span></div>
                      <div style={{textAlign:"center",padding:"0.1rem 0"}}><span style={{fontSize:"0.52rem",fontWeight:"bold",color:g.ouHit?C.green:g.ouHit===null?C.dim:C.red}}>{g.ouHit?"W":g.ouHit===null?"P":"L"}</span></div>
                      <div style={{textAlign:"center",padding:"0.1rem 0"}}>
                        {g.clvVsClose!=null
                          ? <span style={{fontSize:"0.58rem",fontWeight:"bold",color:g.clvVsClose>2?C.green:g.clvVsClose>0?C.gold:C.red}}>{g.clvVsClose>0?"+":""}{g.clvVsClose}pp</span>
                          : <span style={{fontSize:"0.52rem",color:C.dim}}>--</span>}
                      </div>
                    </div>
                    {/* Existing tags row */}
                    {(tags.length>0||autoTags.length>0)&&!isTagging&&(
                      <div style={{padding:"0.2rem 0.5rem 0.4rem",display:"flex",flexWrap:"wrap",gap:"0.3rem",alignItems:"center"}}>
                        {tags.filter(t=>t!=="_auto").map(tid=>{const t=ERROR_TAGS.find(e=>e.id===tid); return t?<span key={tid} style={{fontSize:"0.55rem",padding:"0.1rem 0.45rem",borderRadius:10,background:`${t.color}22`,color:t.color,border:`1px solid ${t.color}44`}}>{t.icon} {t.label}{tags.includes("_auto")&&<span style={{fontSize:"0.42rem",opacity:0.6,marginLeft:"0.2rem"}}>AI</span>}</span>:null;})}
                        {!tags.length&&autoTags.map(tid=>{const t=ERROR_TAGS.find(e=>e.id===tid); return t?<span key={tid} style={{fontSize:"0.55rem",padding:"0.1rem 0.45rem",borderRadius:10,background:"rgba(255,255,255,0.04)",color:C.dim,border:`1px solid ${C.border}`}}>~ {t.icon} {t.label}</span>:null;})}
                        {isLoss&&<span onClick={()=>setTagGame(g.id)} style={{fontSize:"0.5rem",color:C.dim,cursor:"pointer",marginLeft:"0.2rem"}}>{tags.includes("_auto")?"✏️ edit":"+ tag"}</span>}
                      </div>
                    )}
                    {/* Tag picker */}
                    {isTagging&&(
                      <div style={{padding:"0.5rem 0.6rem",background:"rgba(201,168,76,0.05)",borderTop:`1px solid ${C.border}`}}>
                        <div style={{fontSize:"0.55rem",color:C.gold,marginBottom:"0.4rem",letterSpacing:"0.08em"}}>TAG LOSS REASON (tap to toggle)</div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:"0.4rem",marginBottom:"0.5rem"}}>
                          {ERROR_TAGS.map(t=>{
                            const active = tags.includes(t.id);
                            return (
                              <button key={t.id}
                                onClick={()=>handleTag(g.id, t.id)}
                                style={{fontSize:"0.6rem",padding:"0.25rem 0.6rem",borderRadius:12,cursor:"pointer",fontFamily:"inherit",
                                  background:active?`${t.color}28`:"rgba(255,255,255,0.04)",
                                  border:`1px solid ${active?t.color:C.border}`,
                                  color:active?t.color:C.muted,fontWeight:active?"bold":"normal"}}
                              >{t.icon} {t.label}</button>
                            );
                          })}
                        </div>
                        <button onClick={()=>setTagGame(null)} style={{fontSize:"0.58rem",color:C.dim,background:"none",border:`1px solid ${C.border}`,borderRadius:4,padding:"0.2rem 0.7rem",cursor:"pointer",fontFamily:"inherit"}}>Done</button>
                      </div>
                    )}
                    {/* Prompt to tag untagged losses */}
                    {isLoss&&!tags.length&&!autoTags.length&&!isTagging&&(
                      <div style={{padding:"0.15rem 0.5rem 0.3rem"}}>
                        <span onClick={()=>setTagGame(g.id)} style={{fontSize:"0.5rem",color:C.dim,cursor:"pointer",opacity:0.6}}>+ tag loss reason</span>
                      </div>
                    )}
                  </div>
                  );
                })}
              </div>
              {totalPages>1&&(
                <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:"0.5rem",marginBottom:"1rem"}}>
                  <button onClick={()=>setLogPage(p=>Math.max(0,p-1))} disabled={logPage===0} style={{background:"none",border:`1px solid ${C.border}`,color:C.muted,padding:"0.2rem 0.6rem",borderRadius:3,cursor:"pointer",fontFamily:"inherit",fontSize:"0.75rem",opacity:logPage===0?0.3:1}}>←</button>
                  <span style={{fontSize:"0.72rem",color:C.dim}}>{logPage+1}/{totalPages}</span>
                  <button onClick={()=>setLogPage(p=>Math.min(totalPages-1,p+1))} disabled={logPage===totalPages-1} style={{background:"none",border:`1px solid ${C.border}`,color:C.muted,padding:"0.2rem 0.6rem",borderRadius:3,cursor:"pointer",fontFamily:"inherit",fontSize:"0.75rem",opacity:logPage===totalPages-1?0.3:1}}>→</button>
                </div>
              )}
            </>
          )}
          {settled.length===0&&(
            <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:"3rem 2rem",textAlign:"center"}}>
              <div style={{fontSize:"2rem",marginBottom:"0.75rem"}}>📊</div>
              <div style={{fontSize:"0.9rem",color:C.muted,marginBottom:"0.5rem"}}>No settled games yet this season</div>
              <div style={{fontSize:"0.75rem",color:C.dim}}>Results record automatically when games finalize on the Daily Betting Lines tab.</div>
            </div>
          )}
        </div>
      );
    }

    // ── Page: Adaptive Model ──────────────────────────────────────
    function AdaptiveModelPage() {
      const [params, setParams] = React.useState(loadAdaptiveParams);
      const [log, setLog] = React.useState((loadAdaptiveParams().log)||[]);
      const [running, setRunning] = React.useState(false);
      const [msg, setMsg] = React.useState("");

      function reload() {
        const p = loadAdaptiveParams();
        setParams(p);
        setLog(p.log||[]);
      }

      async function handleRunNow() {
        setRunning(true); setMsg("Running feedback cycle...");
        try {
          const vv = await loadVsVegas();
          const games = vv.games || [];
          const settled = games.filter(g=>g.mlHit!=null);
          const mlGames = settled.filter(g=>g.mlHit!=null);
          const ouGames = settled.filter(g=>g.ouHit!=null);
          const ouBiasVal = ouGames.filter(g=>g.projTotal&&g.total!=null).length
            ? ouGames.filter(g=>g.projTotal&&g.total!=null).reduce((s,g)=>s+(g.total-g.projTotal),0)/ouGames.filter(g=>g.projTotal&&g.total!=null).length
            : null;
          const brierVal = mlGames.filter(g=>g.modelFavPct!=null).length
            ? mlGames.filter(g=>g.modelFavPct!=null).reduce((s,g)=>s+Math.pow(g.modelFavPct/100-(g.mlHit?1:0),2),0)/mlGames.filter(g=>g.modelFavPct!=null).length
            : null;
          const taggedLosses = mlGames.filter(g=>!g.mlHit&&g.errorTags?.length);
          const tagFreq = {};
          taggedLosses.forEach(g=>g.errorTags.filter(t=>t!=="_auto").forEach(t=>{tagFreq[t]=(tagFreq[t]||0)+1;}));
          const tagN = taggedLosses.length;
          const dominantTag = tagN>=15?Object.entries(tagFreq).sort((a,b)=>b[1]-a[1])[0]:null;
          const clvGames = mlGames.filter(g=>g.clvVsClose!=null);
          const avgCLV = clvGames.length?clvGames.reduce((s,g)=>s+g.clvVsClose,0)/clvGames.length:null;

          // Force run regardless of throttle
          const existing = loadAdaptiveParams();
          existing.lastRun = 0; // reset throttle
          saveAdaptiveParams(existing);

          const result = await applyAdaptiveFeedback({
            ouBias: ouBiasVal!=null?+ouBiasVal.toFixed(2):null,
            brierRecent: brierVal?+brierVal.toFixed(3):null,
            brierSeason: brierVal?+brierVal.toFixed(3):null,
            w14: {avgCLV}, wAll:{avgCLV, clvN:clvGames.length},
            clvBuckets:[], segmentData:[],
            totalSettled: settled.length, tagFreq, tagN, dominantTag,
          });
          setMsg(result.changes.length>0
            ? `✅ ${result.changes.length} adjustment(s) applied`
            : "✅ No changes needed — model is stable");
          reload();
        } catch(e) { setMsg("❌ Error: "+e.message); }
        setRunning(false);
      }

      function handleReset() {
        if (!window.confirm("Reset all adaptive parameters to defaults?")) return;
        saveAdaptiveParams({});
        reload();
        setMsg("✅ Reset to defaults");
      }

      function handleNudge(key, delta) {
        const p = loadAdaptiveParams();
        p[key] = +Math.max(-0.04, Math.min(0.04, ((p[key]??0)+delta))).toFixed(4);
        saveAdaptiveParams(p);
        reload();
      }

      const nudges = params.parkDispNudges || {};

      return (
        <div style={{padding:"1.5rem"}}>
          <SectionHeader>⚙️ ADAPTIVE MODEL CONTROL</SectionHeader>
          <div style={{fontSize:"0.62rem",color:C.dim,marginBottom:"1.25rem",lineHeight:1.6}}>
            Parameters auto-adjust based on model performance analytics. Manual overrides available below.
            Changes apply to your device only — other users are unaffected.
          </div>

          {/* Status bar */}
          <div style={{background:"rgba(93,200,122,0.06)",border:"1px solid rgba(93,200,122,0.2)",borderRadius:6,padding:"0.85rem 1rem",marginBottom:"1.25rem"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.6rem"}}>
              <span style={{fontSize:"0.65rem",fontWeight:"bold",color:C.green}}>🤖 ADAPTIVE MODEL ACTIVE</span>
              <div style={{display:"flex",gap:"0.5rem"}}>
                <button onClick={handleRunNow} disabled={running} style={{fontSize:"0.6rem",color:C.gold,background:"none",border:"1px solid rgba(201,168,76,0.3)",borderRadius:3,padding:"0.2rem 0.6rem",cursor:"pointer",fontFamily:"inherit",opacity:running?0.5:1}}>
                  {running?"Running...":"↻ Run Feedback Now"}
                </button>
                <button onClick={async()=>{
                  setRunning(true); setMsg("Tagging untagged losses...");
                  const vv = await loadVsVegas();
                  const losses = (vv.games||[]).filter(g=>g.mlHit===false);
                  const n = await batchTagLosses(losses, 20);
                  setMsg(n>0?`✅ Tagged ${n} losses`:"✅ All losses already tagged");
                  setRunning(false);
                }} disabled={running} style={{fontSize:"0.6rem",color:"#60a8e0",background:"none",border:"1px solid rgba(96,168,224,0.3)",borderRadius:3,padding:"0.2rem 0.6rem",cursor:"pointer",fontFamily:"inherit",opacity:running?0.5:1}}>
                  🏷️ Tag All Losses
                </button>
                <button onClick={async()=>{
                  if (!window.confirm("Swap RL and O/U results on all games? Only use if records are exact inverses.")) return;
                  setRunning(true); setMsg("Fixing RL/OU swap...");
                  const vv = await loadVsVegas();
                  let count = 0;
                  for (const g of vv.games) {
                    if (g.rlHit != null || g.ouHit != null) {
                      const tmp = g.rlHit; g.rlHit = g.ouHit; g.ouHit = tmp; count++;
                    }
                  }
                  await saveVsVegas(vv);
                  setMsg(`✅ Swapped RL/OU on ${count} games — reload Model Performance`);
                  setRunning(false);
                }} disabled={running} style={{fontSize:"0.6rem",color:C.gold,background:"none",border:"1px solid rgba(201,168,76,0.3)",borderRadius:3,padding:"0.2rem 0.6rem",cursor:"pointer",fontFamily:"inherit",opacity:running?0.5:1}}>
                  🔄 Fix RL/OU Swap
                </button>
                <button onClick={handleReset} style={{fontSize:"0.6rem",color:C.red,background:"none",border:"1px solid rgba(224,96,96,0.3)",borderRadius:3,padding:"0.2rem 0.6rem",cursor:"pointer",fontFamily:"inherit"}}>
                  Reset All
                </button>
              </div>
            </div>
            {msg&&<div style={{fontSize:"0.62rem",color:C.green,marginBottom:"0.5rem"}}>{msg}</div>}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.5rem"}}>
              {[
                {label:"Lambda Offset", val:params.globalLambdaOffset!=null?(+((params.globalLambdaOffset||0)*9).toFixed(3))+" runs/g":"0 runs/g", key:"globalLambdaOffset", scale:9},
                {label:"Calib Tightening", val:params.calibTightening!=null?"×"+(params.calibTightening).toFixed(3):"×1.000"},
                {label:"Learn Rate", val:params.learnRateMultiplier!=null?"×"+(params.learnRateMultiplier).toFixed(3):"×1.000"},
                {label:"Last Run", val:params.lastRun?new Date(params.lastRun).toLocaleString():"Never"},
                {label:"Bias Cooldown", val:params.lastBiasRun?`${Math.max(0,14-Math.round((Date.now()-params.lastBiasRun)/86400000))}d remaining`:"Ready"},
              ].map(({label,val})=>(
                <div key={label} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:4,padding:"0.6rem 0.75rem"}}>
                  <div style={{fontSize:"0.52rem",color:C.dim,marginBottom:"0.15rem",letterSpacing:"0.08em"}}>{label}</div>
                  <div style={{fontSize:"0.82rem",fontWeight:"bold",color:C.gold}}>{val}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Manual lambda offset control */}
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:"0.85rem 1rem",marginBottom:"1rem"}}>
            <div style={{fontSize:"0.6rem",letterSpacing:"0.1em",color:C.dim,marginBottom:"0.6rem"}}>MANUAL LAMBDA OFFSET (runs/inning)</div>
            <div style={{display:"flex",alignItems:"center",gap:"0.75rem"}}>
              <button onClick={()=>handleNudge("globalLambdaOffset",-1/9/10)} style={{fontSize:"0.8rem",width:"2rem",height:"2rem",borderRadius:4,background:C.bg,border:`1px solid ${C.border}`,color:C.text,cursor:"pointer",fontFamily:"inherit"}}>−</button>
              <div style={{flex:1,textAlign:"center"}}>
                <div style={{fontSize:"1.1rem",fontWeight:"bold",color:C.gold}}>{(+(params.globalLambdaOffset||0)*9).toFixed(3)} runs/g</div>
                <div style={{fontSize:"0.52rem",color:C.dim}}>= {(params.globalLambdaOffset||0).toFixed(5)}/inn</div>
              </div>
              <button onClick={()=>handleNudge("globalLambdaOffset",1/9/10)} style={{fontSize:"0.8rem",width:"2rem",height:"2rem",borderRadius:4,background:C.bg,border:`1px solid ${C.border}`,color:C.text,cursor:"pointer",fontFamily:"inherit"}}>+</button>
            </div>
            <div style={{fontSize:"0.52rem",color:C.dim,marginTop:"0.4rem",textAlign:"center"}}>Each step = ±0.011 runs/game · Current O/U bias drives auto-correction</div>
          </div>

          {/* Park disp nudges */}
          {Object.keys(nudges).length>0&&(
            <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:"0.85rem 1rem",marginBottom:"1rem"}}>
              <div style={{fontSize:"0.6rem",letterSpacing:"0.1em",color:C.dim,marginBottom:"0.6rem"}}>PARK DISPERSION NUDGES</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:"0.4rem"}}>
                {Object.entries(nudges).map(([pk,v])=>(
                  <div key={pk} style={{padding:"0.3rem 0.6rem",background:C.bg,border:`1px solid ${C.border}`,borderRadius:4,display:"flex",gap:"0.4rem",alignItems:"center"}}>
                    <span style={{fontSize:"0.65rem",fontWeight:"bold",color:C.muted}}>{pk}</span>
                    <span style={{fontSize:"0.65rem",color:v>0?C.green:C.red}}>{v>0?"+":""}{v.toFixed(3)}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Change log */}
          {log.length>0&&(
            <>
              <SectionHeader>CHANGE LOG</SectionHeader>
              <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,overflow:"hidden"}}>
                {[...log].reverse().slice(0,20).map((entry,i)=>(
                  <div key={i} style={{padding:"0.55rem 0.85rem",borderBottom:`1px solid ${C.border}`,background:i%2===0?"transparent":"rgba(255,255,255,0.016)"}}>
                    <div style={{fontSize:"0.58rem",color:C.gold,marginBottom:"0.2rem"}}>{new Date(entry.at).toLocaleString()}</div>
                    {entry.changes.map((c,j)=>(
                      <div key={j} style={{fontSize:"0.62rem",color:C.muted,lineHeight:1.5}}>→ {c}</div>
                    ))}
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      );
    }

    // ── Page: Methodology ─────────────────────────────────────────
    // ── Page: Predictions vs Actuals ─────────────────────────────
    function PredictionsPage() {
      const [vvData, setVvData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [filter, setFilter] = useState("all"); // all | ml-hit | ml-miss | ou-over | ou-under
      const [sortBy, setSortBy] = useState("date");
      const [page, setPage] = useState(0);
      const PER_PAGE = 20;

      useEffect(()=>{
        async function load() {
          setLoading(true);
          const vv = await loadVsVegas();
          setVvData(vv);
          setLoading(false);
          setAdaptiveParams(loadAdaptiveParams());
          // Batch tag any untagged losses in background
          const losses = (vv.games||[]).filter(g=>g.mlHit===false);
          if (losses.length > 0) {
            batchTagLosses(losses, 5).then(n => {
              if (n > 0) loadVsVegas().then(fresh => setVvData(fresh));
            });
          }
        }
        async function handleTag(gameId, tagId) {
          const data = await loadVsVegas();
          const g = data.games.find(g => g.id === gameId);
          if (!g) return;
          const existing = g.errorTags || [];
          g.errorTags = existing.includes(tagId)
            ? existing.filter(t => t !== tagId)
            : [...existing, tagId];
          await saveVsVegas(data);
          const fresh = await loadVsVegas();
          setVvData(fresh);
        }
        load();
        const id = setInterval(load, 60000);
        return () => clearInterval(id);
      },[]);

      const games = (vvData?.games || []).filter(g => g.mlHit != null);

      const filtered = games.filter(g => {
        if (filter === "ml-hit")   return g.mlHit === true;
        if (filter === "ml-miss")  return g.mlHit === false;
        if (filter === "ou-over")  return g.modelOUPick === "OVER";
        if (filter === "ou-under") return g.modelOUPick === "UNDER";
        if (filter === "rl-hit")   return g.rlHit === true;
        if (filter === "rl-miss")  return g.rlHit === false;
        return true;
      }).sort((a,b) => sortBy === "date" ? b.settledAt - a.settledAt : 0);

      const totalPages = Math.ceil(filtered.length / PER_PAGE);
      const pageGames  = filtered.slice(page * PER_PAGE, (page+1) * PER_PAGE);

      // Summary stats
      const mlW = games.filter(g=>g.mlHit).length;
      const rlW = games.filter(g=>g.rlHit).length;
      const ouW = games.filter(g=>g.ouHit).length;
      const n   = games.length;

      // Score accuracy — MAE on projected vs actual runs
      const scoredGames = games.filter(g => g.projHomeRuns != null && g.projAwayRuns != null);
      const homeMAE = scoredGames.length
        ? (scoredGames.reduce((s,g) => s + Math.abs(g.projHomeRuns - g.hScore), 0) / scoredGames.length).toFixed(2)
        : null;
      const awayMAE = scoredGames.length
        ? (scoredGames.reduce((s,g) => s + Math.abs(g.projAwayRuns - g.aScore), 0) / scoredGames.length).toFixed(2)
        : null;
      const totalMAE = scoredGames.length
        ? (scoredGames.reduce((s,g) => s + Math.abs((g.projHomeRuns+g.projAwayRuns) - g.total), 0) / scoredGames.length).toFixed(2)
        : null;

      const Pill = ({label, val, color}) => (
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:"0.6rem 0.8rem",textAlign:"center",flex:1}}>
          <div style={{fontSize:"0.52rem",letterSpacing:"0.1em",color:C.dim,marginBottom:"0.25rem"}}>{label}</div>
          <div style={{fontSize:"1.1rem",fontWeight:"bold",color:color||C.gold}}>{val}</div>
        </div>
      );

      if (loading) return <div style={{padding:"3rem",textAlign:"center",color:C.muted}}>Loading…</div>;

      return (
        <div style={{padding:"1.5rem"}}>
          <SectionHeader>PREDICTIONS VS ACTUALS <LiveBadge/></SectionHeader>

          {/* Summary row */}
          {n > 0 && (
            <div style={{display:"flex",gap:"0.5rem",marginBottom:"1rem",flexWrap:"wrap"}}>
              <Pill label="ML" val={`${mlW}-${n-mlW}`} color={mlW/n>=0.524?C.green:C.red}/>
              <Pill label="RL" val={`${rlW}-${n-rlW}`} color={rlW/n>=0.524?C.green:C.red}/>
              <Pill label="O/U" val={`${ouW}-${n-ouW}`} color={ouW/n>=0.524?C.green:C.red}/>
              {homeMAE && <Pill label="SCORE MAE" val={`±${totalMAE}R`} color={C.muted}/>}
            </div>
          )}

          {/* Score accuracy detail */}
          {scoredGames.length > 0 && (
            <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:"0.7rem 1rem",marginBottom:"1rem",display:"flex",gap:"1.5rem",flexWrap:"wrap"}}>
              <div style={{fontSize:"0.62rem",color:C.dim,letterSpacing:"0.08em",alignSelf:"center"}}>PROJ SCORE MAE</div>
              <div style={{textAlign:"center"}}><div style={{fontSize:"0.55rem",color:C.dim}}>HOME</div><div style={{fontSize:"0.85rem",fontWeight:"bold",color:C.muted}}>±{homeMAE}R</div></div>
              <div style={{textAlign:"center"}}><div style={{fontSize:"0.55rem",color:C.dim}}>AWAY</div><div style={{fontSize:"0.85rem",fontWeight:"bold",color:C.muted}}>±{awayMAE}R</div></div>
              <div style={{textAlign:"center"}}><div style={{fontSize:"0.55rem",color:C.dim}}>TOTAL</div><div style={{fontSize:"0.85rem",fontWeight:"bold",color:parseFloat(totalMAE)<2?C.green:parseFloat(totalMAE)<3?C.gold:C.red}}>±{totalMAE}R</div></div>
              <div style={{fontSize:"0.58rem",color:C.dim,alignSelf:"center",marginLeft:"auto"}}>{scoredGames.length} games w/ proj</div>
            </div>
          )}

          {/* Filter tabs */}
          <div style={{display:"flex",gap:"0.3rem",marginBottom:"1rem",flexWrap:"wrap"}}>
            {[
              {id:"all",    label:"All"},
              {id:"ml-hit", label:"ML ✓"},
              {id:"ml-miss",label:"ML ✗"},
              {id:"rl-hit", label:"RL ✓"},
              {id:"rl-miss",label:"RL ✗"},
              {id:"ou-over",label:"OVER"},
              {id:"ou-under",label:"UNDER"},
            ].map(f=>(
              <button key={f.id} onClick={()=>{setFilter(f.id);setPage(0);}} style={{
                padding:"0.3rem 0.65rem",borderRadius:4,cursor:"pointer",fontFamily:"inherit",
                fontSize:"0.68rem",fontWeight:"bold",
                background:filter===f.id?"rgba(201,168,76,0.15)":C.surface,
                border:`1px solid ${filter===f.id?C.gold:C.border}`,
                color:filter===f.id?C.gold:C.muted,
              }}>{f.label}</button>
            ))}
            <div style={{marginLeft:"auto",fontSize:"0.65rem",color:C.dim,alignSelf:"center"}}>{filtered.length} games</div>
          </div>

          {n === 0 ? (
            <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:"3rem 2rem",textAlign:"center"}}>
              <div style={{fontSize:"2rem",marginBottom:"0.75rem"}}>🎯</div>
              <div style={{fontSize:"0.9rem",color:C.muted,marginBottom:"0.5rem"}}>No settled games yet</div>
              <div style={{fontSize:"0.75rem",color:C.dim}}>Predictions record automatically when games finalize on the Daily Betting Lines tab.</div>
            </div>
          ) : (
            <>
              {/* Table */}
              <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,overflow:"hidden",marginBottom:"0.5rem"}}>
                {/* Header */}
                <div style={{display:"grid",gridTemplateColumns:"2.4rem 3.8rem 4rem 4rem 2.8rem 2.6rem 2.6rem",background:C.header,borderBottom:`1px solid ${C.border}`}}>
                  {["DATE","MATCHUP","PROJ","ACTUAL","ML","RL","O/U"].map(h=>(
                    <div key={h} style={{padding:"0.35rem 0.1rem",fontSize:"0.5rem",letterSpacing:"0.03em",color:C.muted,fontWeight:"bold",textAlign:"center"}}>{h}</div>
                  ))}
                </div>
                {pageGames.map((g, i) => {
                  const favIsHome = g.modelFavTeam === g.home;
                  const homeWon = g.hScore > g.aScore;
                  const hasProj = g.projAwayRuns != null && g.projHomeRuns != null;
                  const totErr  = hasProj ? ((g.projHomeRuns+g.projAwayRuns) - g.total).toFixed(1) : null;
                  const errColor = e => Math.abs(parseFloat(e)) <= 1 ? C.green : Math.abs(parseFloat(e)) <= 2.5 ? C.gold : C.red;
                  return (
                    <div key={g.id} style={{display:"grid",gridTemplateColumns:"2.4rem 3.8rem 4rem 4rem 2.8rem 2.6rem 2.6rem",alignItems:"center",borderBottom:`1px solid ${C.border}`,background:i%2===0?"transparent":"rgba(255,255,255,0.016)"}}>
                      {/* Date */}
                      <div style={{padding:"0.35rem 0.05rem",fontSize:"0.55rem",color:C.dim,textAlign:"center",lineHeight:1.2}}>{g.date?.slice(5)||"--"}</div>
                      {/* Matchup stacked */}
                      <div style={{padding:"0.28rem 0.1rem"}}>
                        <div style={{display:"flex",alignItems:"center",gap:"0.12rem",marginBottom:"0.1rem"}}>
                          <span style={{fontSize:"0.38rem",color:C.dim,flexShrink:0}}>AWY</span>
                          <span style={{fontSize:"0.64rem",fontWeight:"bold",color:!favIsHome?C.gold:C.muted}}>{g.away}</span>
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:"0.12rem"}}>
                          <span style={{fontSize:"0.38rem",color:C.dim,flexShrink:0}}>HME</span>
                          <span style={{fontSize:"0.64rem",fontWeight:"bold",color:favIsHome?C.gold:C.muted}}>{g.home}</span>
                        </div>
                      </div>
                      {/* Projected score */}
                      <div style={{padding:"0.28rem 0.08rem",textAlign:"center"}}>
                        {hasProj ? (
                          <>
                            <div style={{fontSize:"0.64rem",fontWeight:"bold",color:C.gold,whiteSpace:"nowrap"}}>{g.projAwayRuns}-{g.projHomeRuns}</div>
                            <div style={{fontSize:"0.42rem",color:C.dim,letterSpacing:"0.02em"}}>awy-hme</div>
                            <div style={{fontSize:"0.42rem",color:C.dim}}>OU {g.projTotal}</div>
                          </>
                        ) : (
                          <div style={{fontSize:"0.6rem",color:C.dim}}>--</div>
                        )}
                      </div>
                      {/* Actual score + error */}
                      <div style={{padding:"0.28rem 0.08rem",textAlign:"center"}}>
                        <div style={{fontSize:"0.64rem",fontWeight:"bold",color:homeWon?C.green:C.text,whiteSpace:"nowrap"}}>{g.aScore}-{g.hScore}</div>
                        <div style={{fontSize:"0.42rem",color:C.dim,letterSpacing:"0.02em"}}>awy-hme</div>
                        {hasProj && (
                          <div style={{fontSize:"0.46rem",color:errColor(totErr)}}>Δ{parseFloat(totErr)>0?"+":""}{totErr}R</div>
                        )}
                      </div>
                      {/* ML */}
                      <div style={{textAlign:"center",padding:"0.1rem 0"}}>
                        <span style={{fontSize:"0.56rem",fontWeight:"bold",color:g.mlHit?C.green:C.red}}>{g.mlHit?"WIN":"LOS"}</span>
                        <div style={{fontSize:"0.44rem",color:C.dim}}>{g.modelFavTeam}</div>
                      </div>
                      {/* RL */}
                      <div style={{textAlign:"center",padding:"0.1rem 0"}}>
                        <span style={{fontSize:"0.56rem",fontWeight:"bold",color:g.rlHit?C.green:C.red}}>{g.rlHit?"WIN":"LOS"}</span>
                        <div style={{fontSize:"0.44rem",color:"transparent"}}>–</div>
                      </div>
                      {/* O/U */}
                      <div style={{textAlign:"center",padding:"0.1rem 0"}}>
                        <span style={{fontSize:"0.56rem",fontWeight:"bold",color:g.ouHit?C.green:C.red}}>{g.ouHit?"WIN":"LOS"}</span>
                        <div style={{fontSize:"0.44rem",color:C.dim}}>{g.modelOUPick==="OVER"?"OVR":"UND"}</div>
                      </div>
                    </div>
                  );
                })}
              </div>

              {/* Pagination */}
              {totalPages > 1 && (
                <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:"0.5rem",marginBottom:"1rem"}}>
                  <button onClick={()=>setPage(p=>Math.max(0,p-1))} disabled={page===0} style={{background:"none",border:`1px solid ${C.border}`,color:C.muted,padding:"0.2rem 0.6rem",borderRadius:3,cursor:"pointer",fontFamily:"inherit",fontSize:"0.75rem",opacity:page===0?0.3:1}}>←</button>
                  <span style={{fontSize:"0.72rem",color:C.dim}}>{page+1}/{totalPages}</span>
                  <button onClick={()=>setPage(p=>Math.min(totalPages-1,p+1))} disabled={page===totalPages-1} style={{background:"none",border:`1px solid ${C.border}`,color:C.muted,padding:"0.2rem 0.6rem",borderRadius:3,cursor:"pointer",fontFamily:"inherit",fontSize:"0.75rem",opacity:page===totalPages-1?0.3:1}}>→</button>
                </div>
              )}

              <div style={{fontSize:"0.62rem",color:C.dim,marginTop:"0.25rem",lineHeight:1.6}}>
                PROJ = model's projected score · Δ = actual minus projected total · color: green ≤1R, gold ≤2.5R, red &gt;2.5R off
              </div>
            </>
          )}
        </div>
      );
    }

    function MethodologyPage() {
      const items=[
        {t:"Data Source",b:"Live game data, team hitting stats (OPS/OBP/SLG), and team pitching stats (ERA/WHIP/K9/BB9) all fetched from MLB Stats API (statsapi.mlb.com). Pre-season projections blend with live stats using a liveWeight formula — at 9 games played the model is ~92% preseason, reaching 40% live at 43+ games."},
        {t:"Model Overview",b:"Three rating pillars: Offensive (40%), Defensive/Pitching (40%), Starting Pitcher (regime-based 10–35%). SP weight is nonlinear: ace-tier starters (ERA < 3.0) receive 35% weight with strong mean suppression and variance reduction; average starters ~20%; back-end/rookie starters 10–15% as bullpen increasingly dominates. Live stats blend with preseason projections via a smooth ramp. Six variance-proxy signals and Elo volatility feed independently into both lambda dispersion and NB distribution routing."},
        {t:"Reading the Daily Betting Lines",b:"Each game card shows three layers of analysis. The Edge Score (1–10) measures overall model confidence — scores of 5+ indicate meaningful divergence from Vegas. The win probability bar and percentage show the model's raw simulation output before calibration. The value badge (e.g. ▲ CHC +118 +8pp value) identifies the specific bet with the largest positive expected value: the team shown is the model's pick at that Vegas price, and the pp value is how many percentage points the model's win probability exceeds Vegas's implied probability.\n\nThe odds table breaks down all three markets. ML (moneyline): model odds vs Vegas — bet when model probability exceeds Vegas implied by 5pp+. RL (run line): model projects -1.5 cover probability — shown as a price. If the model projects 65%+ cover, the favorite RL is the sharper bet than the ML. O/U (over/under): the model projects a total and computes the percentage probability of going over or under the Vegas line specifically. The value buttons below highlight the best-priced side at FD/DK with reasoning.\n\nContext bar signals: weather showing high variance (⚡) or wind out means widen your O/U range. Red bullpen ERA (🔴 5.5+) means lean over and favor the offense. 🏥 IL notes mean adjust for missing lineup production. AI Take provides a sharp-money-style rationale using only the Vegas lines — treat it as a second opinion on your read, not a directive."},
        {t:"Live Blending (Dual System)",b:"Two independent blend systems run in parallel. Mean blending: liveWeight = min(40%, gamesPlayed / 162 × 1.5) shifts team offensive/defensive ratings toward live data as sample builds. Dispersion blending: a separate dispersionWeight decays from 1.0 (opening day) to 0.55 (late season), keeping run distributions wider in games 0–40 to reflect genuine small-sample uncertainty. These are intentionally decoupled — mean can converge while dispersion stays appropriately elevated."},
        {t:"Elo System (MoV-Aware)",b:"Margin-of-victory Elo updates after each completed game. K-factor scales with run margin (capped at 5 runs). ΔElo over the last 10 games is tracked per team. Single-game blowout spikes are winsorized at 2σ before computing volatility, preventing one outlier from over-inflating the dispersion signal. Teams with genuinely large Elo swings (volatile, streaky) increase both the NB blend weight and lambda variance multiplier — an edge Vegas implicitly prices but rarely explicitly models."},
        {t:"Poisson / NB Simulation",b:"10,000 Monte Carlo iterations per game using a blended distribution: P_final = w·NB(μ,k) + (1−w)·Poisson(μ). Blend weight w is computed from 7 additive signals: weak bullpen ERA (+0.15), wind ≥10mph (+0.10), low-command starter (+0.10), large Elo volatility (+0.10), early-season dispersion (+0.10), high park dispersion (+0.08–0.15), and bullpen leverage stress (+0.05–0.10). w=0 → pure Poisson; w up to 0.65 → Negative Binomial with r=4–10. NB fixes Poisson's systematic under-bias on high totals (9.5+), blowouts, and large ML dogs."},
        {t:"Bullpen Leverage & Stress",b:"Bullpen quality is assessed via two independent signals. ERA signal: IP-weighted relief ERA from the roster database vs league average (4.30), applied as a lambda variance multiplier. Stress signal: pitcher ERA log timestamps detect how many relievers threw in the last 24 hours. 3 relievers recently used: +3% variance. 5+ used: +8%. Closer used: +4% extra. High-leverage fire-drill appearances (< 0.7 IP): +3%. A rested bad bullpen differs materially from an exhausted bad bullpen — the stress signal captures this without any additional API calls."},
        {t:"Calibration (Dual Curves)",b:"Separate calibration curves for Poisson-routed (low-variance) and NB-routed (high-variance) games. Poisson priors: 12,150 games (2021–2025). NB priors: 2,280 high-variance games with compressed win rates — 70%+ favorites win 66.8% in NB games vs 69.4% normally, reflecting more frequent upsets in chaotic matchups. Every prediction is tagged nbRouted and blends into its respective Bayesian curve. Poisson underdispersion previously made calibration appear correct while tail probabilities were systematically wrong."},
        {t:"Park Factors (Mean + Dispersion)",b:"Each park has two independent multipliers. pf (mean): scales expected run totals. disp (dispersion): independently scales distribution width. Coors Field pf=1.38, disp=1.35 — thin air raises both mean and variance. Oracle Park pf=0.92, disp=0.90 — marine layer suppresses both tightly. Wrigley pf=1.05, disp=1.10 — wind effect inflates dispersion beyond its modest mean. Low-disp domes (Trop 0.93, loanDepot 0.91) produce the tightest distributions in baseball. Park disp feeds NB blend weight and lambda variance directly."},
        {t:"Injury Detection",b:"Daily IL transaction feed monitors placements and activations. Full roster value database covers 750+ active players with live 2026 OPS and ERA, blended with preseason projections by sample size. SP on IL advances the rotation slot proportional to ERA delta vs replacement (5.20). Position player on IL applies offensive lambda penalty scaled by OPS above replacement level. Bullpen IL tracked separately. Injury adjustments degrade gracefully — if roster data is unavailable the model falls back to thin-lineup heuristics."},
        {t:"Variance Proxy Metrics (6 Signals)",b:"Six independent metrics feed into lambda dispersion and NB routing: (1) BB/9 + HR/FB — base-loading and power events inflate per-inning variance; (2) Bullpen ERA — poor relief corps widens late-inning uncertainty; (3) Bullpen stress — recent usage timestamps detect tired pens; (4) Pitch count expectation — short-leash starters (< 4.5 IP/start) expose more bullpen; (5) Weather volatility — wind speed × temperature extremes; (6) Elo volatility — winsorized std dev of last 10 Elo deltas flags genuinely inconsistent teams. All six are applied with correct directional logic: away team's signals affect home scoring lambda and vice versa."},
      ];
      return (
        <div style={{padding:"1.5rem",maxWidth:740}}>
          <SectionHeader>METHODOLOGY</SectionHeader>
          {items.map(s=><div key={s.t} style={{marginBottom:"1.4rem",paddingBottom:"1.4rem",borderBottom:`1px solid ${C.border}`}}><div style={{fontWeight:"bold",color:C.goldLight,marginBottom:"0.35rem",fontSize:"0.92rem"}}>{s.t}</div><p style={{margin:0,lineHeight:1.8,fontSize:"0.84rem",color:C.muted}}>{s.b}</p></div>)}
        </div>
      );
    }

    // ── Main App ──────────────────────────────────────────────────
    function AIPicksPage() {
      const [data,setData]=useState({games:[]});
      const [loading,setLoading]=useState(true);
      useEffect(()=>{
        async function load(){setLoading(true);const d=await loadAIPicks();setData(d);setLoading(false);}
        load();
        const id=setInterval(load,30000);
        return ()=>clearInterval(id);
      },[]);
      const games=data.games||[];
      const settled=games.filter(g=>g.mlHit!=null||g.rlHit!=null||g.ouHit!=null);
      const pending=games.filter(g=>g.mlHit==null&&g.rlHit==null&&g.ouHit==null);
      const mlG=settled.filter(g=>g.mlHit!=null), mlW=mlG.filter(g=>g.mlHit).length;
      const rlG=settled.filter(g=>g.rlHit!=null), rlW=rlG.filter(g=>g.rlHit).length;
      const ouG=settled.filter(g=>g.ouHit!=null), ouW=ouG.filter(g=>g.ouHit).length;
      const mlPct=mlG.length?mlW/mlG.length*100:null;
      const rlPct=rlG.length?rlW/rlG.length*100:null;
      const ouPct=ouG.length?ouW/ouG.length*100:null;
      const pctColor=p=>p==null?C.muted:p>=60?C.green:p>=52?C.gold:C.red;
      function WinCard({label,w,n,pct,color}){
        return <div style={{background:C.surface,border:`1px solid ${C.border}`,borderTop:`2px solid ${color||C.border}`,borderRadius:4,padding:"0.75rem"}}>

          <div style={{fontSize:"0.62rem",color:C.dim}}>{n?`${w}-${n-w}`:"No picks yet"}</div>
        </div>;
      }
      const sortedSettled=[...settled].sort((a,b)=>b.settledAt-a.settledAt);
      const sortedPending=[...pending].sort((a,b)=>b.recordedAt-a.recordedAt);
      function Badge({hit}){
        if(hit==null)return <span style={{fontSize:"0.55rem",color:C.dim}}>—</span>;
        return <span style={{fontSize:"0.58rem",fontWeight:"bold",padding:"0.1rem 0.3rem",borderRadius:2,background:hit?"rgba(93,200,122,0.15)":"rgba(224,96,96,0.12)",color:hit?C.green:C.red}}>{hit?"HIT":"MISS"}</span>;

              <Badge hit={g.mlHit}/><Badge hit={g.rlHit}/><Badge hit={g.ouHit}/>

            <span style={{color:isSettled?(g.mlHit?C.green:g.mlHit===false?C.red:C.muted):C.text}}>{g.mlPick||"—"}</span>
            <span style={{color:C.green,fontWeight:"bold",fontSize:"0.55rem",paddingTop:"0.1rem"}}>RL</span>
            <span style={{color:isSettled?(g.rlHit?C.green:g.rlHit===false?C.red:C.muted):C.text}}>{g.rlPick||"—"}</span>
            <span style={{color:C.gold,fontWeight:"bold",fontSize:"0.55rem",paddingTop:"0.1rem"}}>O/U</span>

      return <div style={{padding:"1.5rem"}}>
        <SectionHeader>AI PICKS <LiveBadge/></SectionHeader>

          <div style={{fontSize:"0.7rem",color:C.dim,marginBottom:"1rem"}}>Tracks Claude AI picks vs Vegas lines · Only games where AI TAKE was used</div>

            <WinCard label="RL WIN RATE" w={rlW} n={rlG.length} pct={rlPct} color={pctColor(rlPct)}/>

            <div style={{fontSize:"0.68rem",letterSpacing:"0.1em",color:C.gold,fontWeight:"bold",marginBottom:"0.5rem"}}>PENDING ({sortedPending.length})</div>

    function App() {
      const [navOpen,setNavOpen]=useState(false), [page,setPage]=useState("gambling");
      const [teams,setTeams]=useState(BASELINE.map(t=>({...t,wins:0,losses:0,liveGames:0})));
      const [allGames,setAllGames]=useState([]), [loading,setLoading]=useState(false);
      const [lastRefresh,setLastRefresh]=useState(null), [refreshError,setRefreshError]=useState(null);
      const [pullY,setPullY]=useState(0), [pulling,setPulling]=useState(false), [pullRefreshing,setPullRefreshing]=useState(false);
      const pullStartY = React.useRef(0);
      const scrollRef = React.useRef(null);
      const PULL_THRESHOLD = 65;

      function onTouchStart(e) {
        if (scrollRef.current && scrollRef.current.scrollTop === 0) {
          pullStartY.current = e.touches[0].clientY;
          setPulling(true);
        }
      }
      function onTouchMove(e) {
        if (!pulling) return;
        const dy = e.touches[0].clientY - pullStartY.current;
        if (dy > 0 && scrollRef.current && scrollRef.current.scrollTop === 0) {
          setPullY(Math.min(dy * 0.5, PULL_THRESHOLD + 20));
        }
      }
      async function onTouchEnd() {
        if (!pulling) return;
        if (pullY >= PULL_THRESHOLD && !pullRefreshing) {
          setPullRefreshing(true);
          setPullY(40);
          await refresh();
          setPullRefreshing(false);
        }
        setPullY(0);
        setPulling(false);
      }
      const [dataStatus,setDataStatus]=useState({standings:false,stats:false,schedule:false,roster:false,il:false});
      const [rosterStatus,setRosterStatus]=useState('idle'); // idle | loading | ready | error
      const SEASON=new Date().getFullYear().toString();
      const refresh=useCallback(async()=>{
        await refreshLambdaAdj();
        _gameContext = {}; // clear context cache so weather re-fetches
        setLoading(true); setRefreshError(null);
        try {
          const raw=await fetchAllMLBData(SEASON);
          const {games,standings,teamStats}=parseMLBData(raw);
          setDataStatus(prev=>({...prev,schedule:raw.gamesOk??games.length>0,standings:raw.standingsOk??Object.keys(standings).length>0,stats:raw.statsOk??false}));
          setAllGames(games); setTeams(buildLiveTeams(standings,teamStats,games)); setLastRefresh(new Date());
          if(!games.length&&!Object.keys(standings).length) setRefreshError("No data returned.");
        } catch(e) { setRefreshError(e.message||"Unknown error"); }
        setLoading(false);
      },[SEASON]);
      useEffect(()=>{refresh();const id=setInterval(refresh,5*60*1000);return()=>clearInterval(id);},[refresh]);
;

      // Background roster + IL fetch — runs independently, doesn't block main refresh
      useEffect(()=>{
        async function loadRoster() {
          setRosterStatus('loading');
          try {
            // Quick test: can we reach statsapi.mlb.com at all?
            const testRes = await fetchWithTimeout('https://statsapi.mlb.com/api/v1/sports', 8000);
            console.log('[Roster] Direct MLB API test:', testRes?.ok ? 'OK' : 'FAILED');
            if (!testRes?.ok) {
              // Try proxy
              const testProxy = await fetchWithTimeout('https://api.allorigins.win/get?url=' + encodeURIComponent('https://statsapi.mlb.com/api/v1/sports'), 8000);
              console.log('[Roster] Proxy test:', testProxy?.ok ? 'OK' : 'FAILED');
            }
            // Step 1: IL transactions (fast ~1s)
            console.log('[Roster] Fetching IL transactions...');
            _ilLog = await fetchILTransactions(SEASON);
            console.log('[Roster] IL transactions:', Object.keys(_ilLog).length, 'entries');
            if (Object.keys(_ilLog).length > 0) {
              setDataStatus(prev=>({...prev, il:true}));
              setRosterStatus('il-ready');
            }
            // Step 2: Full roster DB
            console.log('[Roster] Starting roster DB fetch, age:', getRosterAge()/1000, 's');
            if (getRosterAge() > 6*60*60*1000) {
              // Poll every 5s to update UI with partial data as batches complete
              const pollInterval = setInterval(()=>{
                const partial = loadRosterDB();
                if (Object.keys(partial).length > 0) {
                  _rosterDB = partial;
                  setDataStatus(prev=>({...prev, roster:true}));
                }
              }, 5000);
              try {
                await Promise.race([
                  fetchRosterDatabase(SEASON).then(db=>{ _rosterDB=db; }),
                  new Promise(resolve=>setTimeout(resolve, 60000))
                ]);
              } finally {
                clearInterval(pollInterval);
              }
            } else {
              _rosterDB = loadRosterDB();
            }
            setRosterStatus('ready');
            setDataStatus(prev=>({...prev,
              roster:Object.keys(_rosterDB).length>0,
              il:Object.keys(_ilLog).length>0
            }));
          } catch(e) {
            setRosterStatus('error');
            // Still mark IL as loaded if we got that far
            setDataStatus(prev=>({...prev, il:Object.keys(_ilLog).length>0}));
          }
        }
        loadRoster();
        // Refresh IL every 30 min, full roster every 6h (handled inside refreshRosterData)
        const id = setInterval(()=>{
          fetchILTransactions(SEASON).then(log=>{
            _ilLog = log;
            setDataStatus(prev=>({...prev, il:Object.keys(log).length>0}));
          }).catch(()=>{});
        }, 30*60*1000);
        return ()=>clearInterval(id);
      },[]);
      function navigate(p){setPage(p);setNavOpen(false);}
      const liveGames=useMemo(()=>allGames.filter(g=>g.status==="live"||g.status==="inprogress"),[allGames]);
      const totalGames=useMemo(()=>allGames.filter(g=>g._source==="live").length,[allGames]);
      return (
        <LiveContext.Provider value={{teams,allGames,liveGames,loading,lastRefresh,refresh,refreshError,dataStatus,totalGames,SEASON}}>
          <div style={{display:"flex",height:"100vh",background:C.bg,fontFamily:"'Helvetica Neue',Arial,sans-serif",color:C.text,overflow:"hidden"}}>
            {navOpen&&<div onClick={()=>setNavOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:40}}/>}
            <aside style={{position:"fixed",top:0,left:0,bottom:0,width:252,background:C.header,borderRight:`1px solid ${C.border}`,zIndex:50,transform:navOpen?"translateX(0)":"translateX(-100%)",transition:"transform 0.22s ease",display:"flex",flexDirection:"column"}}>
              <div style={{padding:"1.25rem 1.25rem 0.5rem",borderBottom:`1px solid ${C.border}`,flex:1,overflow:"auto"}}>
                <div style={{fontSize:"0.62rem",letterSpacing:"0.18em",color:C.dim,marginBottom:"0.6rem"}}>MLB STATS MODEL 2026</div>
                {NAV_ITEMS.map(n=><button key={n.id} onClick={()=>navigate(n.id)} style={{display:"flex",alignItems:"center",width:"100%",padding:"0.5rem 0.75rem",borderRadius:3,background:page===n.id?"rgba(201,168,76,0.12)":"transparent",border:"none",borderLeft:page===n.id?`2px solid ${C.gold}`:"2px solid transparent",color:page===n.id?C.goldLight:C.muted,fontSize:"0.84rem",cursor:"pointer",textAlign:"left",fontFamily:"inherit",marginBottom:2}}>{n.label}</button>)}
              </div>
              <div style={{padding:"1rem 1.25rem",borderTop:`1px solid ${C.border}`}}>
                <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:3,padding:"0.6rem 0.75rem",marginBottom:"0.75rem"}}>
                  <div style={{fontSize:"0.68rem",color:C.gold,fontWeight:"bold",marginBottom:"0.3rem"}}>MLB Stats API (statsapi.mlb.com)</div>
                  <div style={{fontSize:"0.62rem",color:C.dim,marginBottom:"0.4rem"}}>Free · no key · direct browser fetch</div>
                  {[{label:"Scores/Schedule",ok:dataStatus.schedule},{label:"W-L Standings",ok:dataStatus.standings},{label:"ERA/OPS/WHIP",ok:dataStatus.stats,note:dataStatus.stats?"live":"preseason proj."},{label:"Roster/IL",ok:dataStatus.roster,note:rosterStatus==="ready"?"full roster + IL":(rosterStatus==="il-ready"||dataStatus.il)?"IL active, roster loading...":rosterStatus==="error"?"check console":rosterStatus==="loading"?"loading...":"not loaded"}].map(s=><div key={s.label} style={{display:"flex",justifyContent:"space-between",fontSize:"0.62rem",color:C.dim,marginBottom:2}}><span>{s.label}{s.note?` (${s.note})`:""}</span><span style={{color:s.ok?C.green:loading?C.gold:C.red}}>{loading?"…":s.ok?"✓":"✗"}</span></div>)}
                </div>
                <button onClick={refresh} disabled={loading} style={{width:"100%",padding:"0.45rem 0.75rem",background:"transparent",border:`1px solid ${refreshError?C.red:C.border}`,borderRadius:3,color:loading?C.dim:refreshError?C.red:C.muted,fontSize:"0.78rem",cursor:"pointer",fontFamily:"inherit",opacity:loading?0.6:1}}>{loading?"Refreshing…":refreshError?"Retry":"↻ Refresh Now"}</button>
                {lastRefresh&&<div style={{fontSize:"0.6rem",color:C.dim,marginTop:"0.35rem"}}>Updated {lastRefresh.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</div>}
                <SidebarAIKey/>
              </div>
            </aside>
            <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
              <header style={{background:C.header,borderBottom:`1px solid ${C.border}`,padding:"0 0.75rem",height:46,display:"flex",alignItems:"center",gap:"0.6rem",flexShrink:0,overflow:"hidden"}}>
                <button onClick={()=>setNavOpen(!navOpen)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:"1.1rem",padding:"0.2rem 0.35rem",lineHeight:1,flexShrink:0}}>☰</button>
                <div style={{width:1,height:22,background:C.border,flexShrink:0}}/>
                <div style={{flexShrink:0}}>
                  <div style={{fontSize:"0.85rem",fontWeight:"bold",letterSpacing:"0.08em",color:C.text,whiteSpace:"nowrap"}}>MLB STATS MODEL</div>
                  <div style={{fontSize:"0.52rem",color:C.gold,letterSpacing:"0.04em",whiteSpace:"nowrap",opacity:0.8}}>R.I.P. BerryHorse 🐐</div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:"0.3rem",padding:"0.15rem 0.45rem",borderRadius:10,flexShrink:0,background:loading?"rgba(201,168,76,0.1)":liveGames.length>0?"rgba(93,200,122,0.1)":"rgba(255,255,255,0.04)",border:`1px solid ${loading?"rgba(201,168,76,0.3)":liveGames.length>0?"rgba(93,200,122,0.3)":C.border}`}}>
                  <div style={{width:5,height:5,borderRadius:"50%",flexShrink:0,background:loading?C.gold:liveGames.length>0?C.green:C.dim,animation:(loading||liveGames.length>0)?"pulse 1.4s infinite":"none"}}/>
                  <span style={{fontSize:"0.6rem",color:loading?C.gold:liveGames.length>0?C.green:C.dim,letterSpacing:"0.05em",whiteSpace:"nowrap"}}>{loading?"SYNC":liveGames.length>0?`${liveGames.length} LIVE`:lastRefresh?"LIVE":"--"}</span>
                </div>
                <div style={{marginLeft:"auto",fontSize:"0.65rem",color:C.dim,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",minWidth:0}}>{totalGames>0?`${totalGames} games · `:""}{new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div>
              </header>
              {refreshError&&<div style={{padding:"0.6rem 1.5rem",background:"rgba(224,96,96,0.08)",borderBottom:`1px solid rgba(224,96,96,0.2)`,fontSize:"0.8rem",color:C.red}}>⚠ {refreshError}</div>}
              {loading&&teams.every(t=>t.liveGames===0)&&!refreshError&&<div style={{padding:"0.6rem 1.5rem",background:"rgba(201,168,76,0.06)",borderBottom:`1px solid rgba(201,168,76,0.15)`,display:"flex",alignItems:"center",gap:"0.75rem"}}><Dots/><span style={{fontSize:"0.78rem",color:C.gold}}>Fetching live data…</span></div>}
              <div ref={scrollRef} onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd} style={{flex:1,overflow:"auto",position:"relative"}}>
                {/* Pull-to-refresh indicator */}
                <div style={{
                  position:"sticky",top:0,zIndex:10,
                  height: pullY > 0 || pullRefreshing ? `${pullRefreshing?40:pullY}px` : 0,
                  overflow:"hidden",
                  display:"flex",alignItems:"center",justifyContent:"center",
                  transition: pulling ? "none" : "height 0.25s ease",
                  background: C.bg,
                }}>
                  {(pullY >= PULL_THRESHOLD || pullRefreshing) && (
                    <div style={{display:"flex",alignItems:"center",gap:"0.5rem",fontSize:"0.65rem",color:C.gold}}>
                      {pullRefreshing ? <Dots/> : <span style={{fontSize:"1rem"}}>↓</span>}
                      <span>{pullRefreshing ? "Refreshing…" : "Release to refresh"}</span>
                    </div>
                  )}
                  {pullY > 0 && pullY < PULL_THRESHOLD && (
                    <div style={{fontSize:"0.65rem",color:C.dim}}>Pull to refresh</div>
                  )}
                </div>
                {page==="aipicks"    && <AIPicksPage/>}
                {page==="stats"      && <TeamStatsPage/>}
                {page==="power"      && <PowerRankingsPage/>}
                {page==="xy"         && <XYExplorerPage/>}
                {page==="matchup"    && <MatchupSimPage/>}
                {page==="scoreboard" && <ScoreboardPage/>}
                {page==="standings"  && <StandingsPage/>}
                {page==="rosters"    && <RostersPage/>}
                {page==="odds"       && <OddsPage/>}
                {page==="gambling"   && <GamblingPage/>}
                {page==="perf"       && <ModelPerfPage/>}
                {page==="adaptive"   && <AdaptiveModelPage/>}

                {page==="method"     && <MethodologyPage/>}
                {page==="debug"      && <DebugPage/>}
              </div>
            </div>
          </div>
        </LiveContext.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>

</body>
</html>
