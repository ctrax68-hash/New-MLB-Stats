    // ── AI fetch helper ───────────────────────────────────────────
    // Tries Claude API with stored key. Falls back to a no-key prompt if missing.
    async function callAI(prompt, maxTokens=300) {
      const key = localStorage.getItem("mlb_ai_key") || "";
      const headers = {"Content-Type":"application/json"};
      if (key) {
        headers["x-api-key"] = key;
        headers["anthropic-version"] = "2023-06-01";
        headers["anthropic-dangerous-direct-browser-access"] = "true";
      }
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers,
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: maxTokens,
          messages: [{role:"user", content: prompt}]
        })
      });
      if (!res.ok) {
        const err = await res.text().catch(()=>"");
        throw new Error(res.status === 401 ? "Invalid API key" : res.status === 403 ? "API key missing or unauthorized" : `API error ${res.status}`);
      }
      const d = await res.json();
      return d.content?.map(b=>b.text||"").join("")||"";
    }

    // ── API Key setup banner ──────────────────────────────────────
    function AIKeyBanner() {
      const [key, setKey] = React.useState(localStorage.getItem("mlb_ai_key")||"");
      const [saved, setSaved] = React.useState(!!localStorage.getItem("mlb_ai_key"));
      const [show, setShow] = React.useState(false);
      function save() {
        localStorage.setItem("mlb_ai_key", key.trim());
        setSaved(true); setShow(false);
      }
      if (saved && !show) return (
        <div style={{fontSize:"0.6rem",color:C.dim,padding:"0.2rem 0",display:"flex",alignItems:"center",gap:"0.4rem"}}>
          <span style={{color:C.green}}>✓ AI key set</span>
          <button onClick={()=>{setShow(true);setSaved(false);}} style={{background:"none",border:"none",color:C.dim,cursor:"pointer",fontSize:"0.6rem",fontFamily:"inherit",textDecoration:"underline"}}>change</button>
        </div>
      );
      return (
        <div style={{background:"rgba(201,168,76,0.07)",border:`1px solid rgba(201,168,76,0.25)`,borderRadius:5,padding:"0.7rem 0.9rem",marginBottom:"1rem"}}>
          <div style={{fontSize:"0.72rem",color:C.gold,fontWeight:"bold",marginBottom:"0.35rem"}}>⚡ Anthropic API Key required for AI picks</div>
          <div style={{fontSize:"0.6rem",color:C.dim,marginBottom:"0.5rem"}}>Get a free key at <span style={{color:C.gold}}>console.anthropic.com</span> → API Keys. Stored locally only.</div>
          <div style={{display:"flex",gap:"0.5rem"}}>
            <input value={key} onChange={e=>setKey(e.target.value)} placeholder="sk-ant-..." style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:3,padding:"0.3rem 0.5rem",color:C.text,fontSize:"0.72rem",fontFamily:"inherit",outline:"none"}}/>
            <button onClick={save} style={{background:C.gold,border:"none",borderRadius:3,color:"#111",padding:"0.3rem 0.8rem",cursor:"pointer",fontFamily:"inherit",fontSize:"0.72rem",fontWeight:"bold"}}>Save</button>
          </div>
        </div>
      );
    }

    // ── Storage shim (localStorage fallback since window.storage is Claude-only) ──
    window.storage = window.storage || {
      get: async (key) => {
        try { const v = localStorage.getItem(key); return v ? { key, value: v } : null; } catch { return null; }
      },
      set: async (key, value) => {
        try { localStorage.setItem(key, value); return { key, value }; } catch { return null; }
      },
      delete: async (key) => {
        try { localStorage.removeItem(key); return { key, deleted: true }; } catch { return null; }
      },
      list: async (prefix) => {
        try {
          const keys = Object.keys(localStorage).filter(k => !prefix || k.startsWith(prefix));
          return { keys };
        } catch { return { keys: [] }; }
      }
    };

    // ── Seed Games ────────────────────────────────────────────────
    function buildSeedGames() {
      const MATCHUPS = [
        ["NYY","BOS"], ["LAD","SFG"], ["CHC","STL"], ["ATL","PHI"],
        ["HOU","TEX"], ["NYM","MIA"], ["MIL","CIN"], ["SEA","OAK"],
        ["BAL","TOR"], ["CLE","DET"], ["MIN","KCR"], ["SDP","COL"],
        ["WSN","PIT"], ["TBR","LAA"], ["ARI","LAD"], ["NYY","TOR"],
        ["BOS","BAL"], ["ATL","NYM"], ["CHC","MIL"], ["HOU","LAA"],
        ["SEA","TEX"], ["SFG","SDP"], ["CLE","CWS"], ["STL","CIN"],
        ["MIN","DET"], ["KCR","OAK"], ["PHI","WSN"], ["PIT","MIA"],
        ["TBR","TOR"], ["COL","ARI"],
      ];
      const TIMES = ["17:05","17:10","17:35","18:05","18:10","19:05","19:05","19:10","19:10","20:05","20:10","20:10","20:15","20:15","21:40"];
      const games = [];
      const now = new Date();

      for (let daysAhead = 0; daysAhead <= 4; daysAhead++) {
        const d = new Date(now); d.setDate(d.getDate() + daysAhead);
        const dateStr = d.toISOString().slice(0, 10);
        const offset = (daysAhead * 7) % MATCHUPS.length;
        const slice = [...MATCHUPS.slice(offset), ...MATCHUPS.slice(0, offset)].slice(0, 15);
        slice.forEach(([home, away], i) => {
          games.push({ id:`seed_f${daysAhead}_${i}`, status:"scheduled", home, away,
            hScore:null, aScore:null,
            start_time:`${dateStr}T${TIMES[i % TIMES.length]}:00Z` });
        });
      }
      return games;
    }
    const SEED_GAMES = buildSeedGames();
    function localDateKey(isoStr) {
      const d = new Date(isoStr);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function todayLocalKey()    { return localDateKey(new Date().toISOString()); }
    function tomorrowLocalKey() { const d=new Date(); d.setDate(d.getDate()+1); return localDateKey(d.toISOString()); }
    function fixAbbr(a) {
      if (!a) return null;
      const fixed = ABBR_FIX[a] || a;
      const VALID = new Set(["LAD","ATL","NYY","HOU","BAL","PHI","MIL","TOR","SDP","TEX","SEA","STL","CHC","MIN","CLE","NYM","ARI","SFG","TBR","BOS","DET","KCR","WSN","MIA","LAA","PIT","CIN","COL","CWS","OAK"]);
      return VALID.has(fixed) ? fixed : null;
    }

    function countsForStandings(g) {
      if (g._source === "seed") return false;
      const gt = g.gameType || "R";
      return gt === "R" || gt === "P";
    }

    function buildStandingsFromGames(games) {
      const rec = {};
      for (const g of games) {
        if (!countsForStandings(g)) continue;
        if (g.status !== "closed" && g.status !== "final") continue;
        if (g.hScore == null || g.aScore == null) continue;
        const h = g.home, a = g.away;
        if (!h || !a) continue;
        if (!rec[h]) rec[h] = {w:0,l:0,rf:0,ra:0};
        if (!rec[a]) rec[a] = {w:0,l:0,rf:0,ra:0};
        rec[h].rf += g.hScore; rec[h].ra += g.aScore;
        rec[a].rf += g.aScore; rec[a].ra += g.hScore;
        if (g.hScore > g.aScore) { rec[h].w++; rec[a].l++; }
        else if (g.aScore > g.hScore) { rec[a].w++; rec[h].l++; }
      }
      const standings = {};
      for (const [abbr, r] of Object.entries(rec)) {
        const {w, l} = r;
        standings[abbr] = { wins:w, losses:l, gamesPlayed:w+l, winPct: w+l>0 ? +(w/(w+l)).toFixed(3) : 0, streak:null, last10:null, gb:null };
      }
      return standings;
    }

    const MLB_ABBR_FIX = {

    function resolveTeamAbbr(teamObj) {
      if (!teamObj) return null;
      const raw = (teamObj.team?.abbreviation || teamObj.abbreviation || "").trim();
      if (raw) {
        const up = raw.toUpperCase();
        const fixed = MLB_ABBR_FIX[up] || up;
        if (VALID_ABBRS.has(fixed)) return fixed;
      }
      const id = teamObj.team?.id;
      if (id && MLB_ID_TO_ABBR[id]) return MLB_ID_TO_ABBR[id];
      const name = (teamObj.team?.name || "").toLowerCase().trim();
      if (name && TEAM_NAME_TO_ABBR[name]) return TEAM_NAME_TO_ABBR[name];
      return null;
    }

    function parseMlbGame(g) {
      const home = resolveTeamAbbr(g.teams?.home);
      const away = resolveTeamAbbr(g.teams?.away);
      if (!home || !away) return null;
      const abs = (g.status?.abstractGameState||"").toLowerCase();
      const det = (g.status?.detailedState||"").toLowerCase();
      let status = "scheduled";
      if (abs==="final"||det==="final") status="closed";
      else if (abs==="live"||det==="in progress") status="inprogress";
      const hasScore = status==="closed"||status==="inprogress";
      const gameType = g.gameType || "R";
      return {
        id: String(g.gamePk), status, home, away,
        hScore: hasScore ? (g.teams?.home?.score??null) : null,
        aScore: hasScore ? (g.teams?.away?.score??null) : null,
        start_time: g.gameDate||new Date().toISOString(),
        inning: g.linescore?.currentInning??null,
        inningHalf: g.linescore?.inningHalf??null,
        gameType,
        _source: "live",
      };
    }

    async function fetchMlbDate(dateStr) {
      const mlbUrl = `https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${dateStr}&hydrate=linescore,team(league,division)`;
      let data;
      try {
        const res = await fetch(mlbUrl);
        if (!res.ok) throw new Error(`${res.status}`);
        data = await res.json();
      } catch(e) {
        const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(mlbUrl)}`;
        const res2 = await fetch(proxy);
        if (!res2.ok) throw new Error(`proxy ${res2.status}`);
        const wrapper = await res2.json();
        data = JSON.parse(wrapper.contents);
      }
      const games = [];
      for (const day of (data.dates||[])) {
        for (const g of (day.games||[])) {
          const gt = g.gameType || "R";
          if (gt === "A") continue;
          const p = parseMlbGame(g);
          if (p) games.push(p);
        }
      }
      return games;
    }

    async function fetchLiveGames() {
      const dates = [];
      for (let i=-3; i<=3; i++) {
        const d=new Date(); d.setUTCDate(d.getUTCDate()+i);
        dates.push(d.toISOString().slice(0,10));
      }
      const results = await Promise.all(dates.map(fetchMlbDate));
      return results.flat();
    }
    async function fetchAllMLBData(season) {
      let games = [];
      let usedLive = false;
      try {
        const raw = await fetchLiveGames();
        games = raw.filter(g => g && g.home && g.away);
        usedLive = games.length > 0;
      } catch (e) { console.warn("Live fetch failed:", e.message); }

      if (games.length === 0) {
        games = SEED_GAMES.map(g => ({...g, _source:"seed"}));
      } else {
        const liveDates = new Set(games.map(g => localDateKey(g.start_time)));
        const seedExtras = SEED_GAMES
          .filter(g => !liveDates.has(localDateKey(g.start_time)))
          .map(g => ({...g, _source:"seed"}));
        games = [...games, ...seedExtras];
      }

      const standings = buildStandingsFromGames(games);
      return { games, standings, teamStats:{}, gamesOk: games.length > 0, standingsOk: Object.keys(standings).length > 0, usedLive, warnings: [] };
    }

    function parseMLBData(raw) {
      return { games: raw.games||[], standings: raw.standings||{}, teamStats: raw.teamStats||{} };
    }

    // ── Elo + live blend ─────────────────────────────────────────
    function buildLiveTeams(standings, teamStats, games) {
      const VALID = new Set(["LAD","ATL","NYY","HOU","BAL","PHI","MIL","TOR","SDP","TEX","SEA","STL","CHC","MIN","CLE","NYM","ARI","SFG","TBR","BOS","DET","KCR","WSN","MIA","LAA","PIT","CIN","COL","CWS","OAK"]);
      const completed = games.filter(g => countsForStandings(g) && (g.status==="final"||g.status==="closed") && g.hScore!=null && g.aScore!=null).sort((a,b) => new Date(a.start_time)-new Date(b.start_time));
      const eloRatings = {};
      for (const base of BASELINE) eloRatings[base.id] = base.powRating * 100;
      const K_BASE = 20, MOV_CAP = 5;
      for (const g of completed) {
        const h = g.home, a = g.away;
        if (!VALID.has(h)||!VALID.has(a)) continue;
        if (!eloRatings[h]) eloRatings[h] = 700;
        if (!eloRatings[a]) eloRatings[a] = 700;
        const rH = eloRatings[h], rA = eloRatings[a];
        const expH = 1/(1+Math.pow(10,(rA-rH)/400));
        const margin = Math.abs(g.hScore-g.aScore);
        const cappedMargin = Math.min(margin, MOV_CAP);
        const movMult = cappedMargin>0 ? Math.log(cappedMargin+1)/Math.log(MOV_CAP+1) : 0.15;
        const K = K_BASE * movMult;
        const hWon = g.hScore > g.aScore;
        eloRatings[h] = rH + K*((hWon?1:0) - expH);
        eloRatings[a] = rA + K*((hWon?0:1) - (1-expH));
      }
      const teamGames = {};
      for (const g of completed) {
        const h = g.home, a = g.away;
        if (!VALID.has(h)||!VALID.has(a)) continue;
        if (!teamGames[h]) teamGames[h] = [];
        if (!teamGames[a]) teamGames[a] = [];
        teamGames[h].push({ rf:g.hScore, ra:g.aScore, won:g.hScore>g.aScore });
        teamGames[a].push({ rf:g.aScore, ra:g.hScore, won:g.aScore>g.hScore });
      }
      const gameRecords = {};
      for (const [id, tgames] of Object.entries(teamGames)) {
        const rev = [...tgames].reverse();
        let wW=0,wL=0,wRF=0,wRA=0,totalWt=0;
        rev.forEach((g,idx) => {
          const wt = idx<10?3:idx<20?2:1;
          totalWt+=wt;
          if(g.won) wW+=wt; else wL+=wt;
          wRF+=g.rf*wt; wRA+=g.ra*wt;
        });
        gameRecords[id] = { g:tgames.length, w:rev.filter(g=>g.won).length, l:rev.filter(g=>!g.won).length, wWin:wW/totalWt, wRF:wRF/totalWt, wRA:wRA/totalWt, rf:tgames.reduce((s,g)=>s+g.rf,0), ra:tgames.reduce((s,g)=>s+g.ra,0) };
      }
      return BASELINE.map(base => {
        const st = standings[base.id], ts = teamStats[base.id], gr = gameRecords[base.id];
        const gamesPlayed = st?.gamesPlayed ?? gr?.g ?? 0;
        if (gamesPlayed === 0) return { ...base, wins:0, losses:0, liveGames:0, dataSource:"baseline", pythagWinPct:base.winPct, recencyWinPct:base.winPct, pythagDiff:0, eloRating:base.powRating*100 };
        const wins = st?.wins ?? gr?.w ?? 0, losses = st?.losses ?? gr?.l ?? 0;
        const actualWinPct = st ? st.winPct : (wins/(wins+losses)||0);
        const recencyWinPct = gr ? gr.wWin : actualWinPct;
        const liveRF = gr ? gr.wRF : (ts?.runsFor ?? base.runsFor);
        const liveRA = gr ? gr.wRA : (ts?.runsAgainst ?? base.runsAgainst);
        const totalRF = gr ? gr.rf : liveRF*gamesPlayed, totalRA = gr ? gr.ra : liveRA*gamesPlayed;
        const rfExp = Math.pow(totalRF,1.83), raExp = Math.pow(totalRA,1.83);
        const pythagWinPct = rfExp/(rfExp+raExp)||actualWinPct;
        const pythagDiff = +(actualWinPct-pythagWinPct).toFixed(3);
        const liveElo = eloRatings[base.id] ?? base.powRating*100;
        const eloContrib = (liveElo-base.powRating*100)/100;
        const liveWeight = Math.min(0.40, gamesPlayed/162*1.5);
        const bw = 1-liveWeight;
        const blendedWinPct_live = actualWinPct*0.35+recencyWinPct*0.35+pythagWinPct*0.20+Math.min(0.60,Math.max(0.40,actualWinPct+eloContrib*0.02))*0.10;
        const blendedWinPct = bw*base.winPct+liveWeight*blendedWinPct_live;
        const blendedRF = bw*base.runsFor+liveWeight*liveRF;
        const blendedRA = bw*base.runsAgainst+liveWeight*liveRA;
        const liveERA=ts?.era??base.era, liveWHIP=ts?.whip??base.whip, liveOPS=ts?.ops??base.ops;
        const liveOBP=ts?.obp??base.obp, liveSLG=ts?.slg??base.slg, liveK9=ts?.kPer9??base.kPer9;
        const liveBB9=ts?.bbPer9??base.bbPer9, liveHR9=ts?.hrAllowed??base.hrAllowed;
        const offDelta=(blendedWinPct_live-base.winPct)*3, defDelta=-(liveRA-base.runsAgainst)*0.2;
        const newOff=Math.max(1,Math.min(10,base.offRating+offDelta*liveWeight*2));
        const newDef=Math.max(1,Math.min(10,base.defRating+defDelta*liveWeight*2));
        const newSP=Math.max(1,Math.min(10,base.spRating+(base.era-liveERA)*0.15*liveWeight*2));
        const newPow=Math.max(1,Math.min(10,newOff*0.38+newDef*0.38+newSP*0.19+Math.max(-1,Math.min(1,eloContrib))*0.05));
        return { ...base, winPct:blendedWinPct, runsFor:blendedRF, runsAgainst:blendedRA, margin:blendedRF-blendedRA,
          ops:bw*base.ops+liveWeight*liveOPS, obp:bw*base.obp+liveWeight*liveOBP, slg:bw*base.slg+liveWeight*liveSLG,
          era:bw*base.era+liveWeight*liveERA, whip:bw*base.whip+liveWeight*liveWHIP,
          kPer9:bw*base.kPer9+liveWeight*liveK9, bbPer9:bw*base.bbPer9+liveWeight*liveBB9, hrAllowed:bw*base.hrAllowed+liveWeight*liveHR9,
          offRating:newOff, defRating:newDef, spRating:newSP, powRating:newPow, wins, losses,
          liveGames:gamesPlayed, liveWeight:Math.round(liveWeight*100),
          pythagWinPct:+pythagWinPct.toFixed(3), recencyWinPct:+recencyWinPct.toFixed(3), pythagDiff,
          eloRating:Math.round(liveElo), eloContrib:+eloContrib.toFixed(2),
          streak:st?.streak, last10:st?.last10, gb:st?.gb,
          dataSource: ts?"mlb-api":gr?"game-agg+elo":"baseline"
        };
      });
    }

    function getPark(id) { return PARK_FACTORS[id] || {park:"Neutral",pf:1.0,hfa:0.22,ou:1.0}; }
    function eloWinProb(rA, rB) { return 1/(1+Math.pow(10,(rB-rA)/3)); }
    function pythagFlag(team) {

    // ── Poisson simulation ────────────────────────────────────────
    const POISSON_N = 10000, LG_AVG_R9 = 4.55;
    function poissonDraw(lambda) {
      if (lambda <= 0) return 0;
      if (lambda > 30) return Math.max(0, Math.round(lambda + Math.sqrt(lambda)*(Math.random()*2-1)*1.73));
      const L = Math.exp(-lambda); let k = 0, p = 1;
      do { k++; p *= Math.random(); } while (p > L);
      return k - 1;
    }
    function simulateGame(hLambda, aLambda) {
      let h = 0, a = 0;
      for (let inn = 0; inn < 9; inn++) { h += poissonDraw(hLambda); a += poissonDraw(aLambda); }
      let extra = 0;
      while (h === a && extra < 6) { h += poissonDraw(hLambda*0.85); a += poissonDraw(aLambda*0.85); extra++; }
      if (h === a) { if (Math.random() > 0.5) h++; else a++; }
      return { h, a };
    }
    function runSimulation(home, away, hfa=true, homeSpSlot=2, awaySpSlot=2) {
      const park = getPark(home.id);
      const hSpAdj = getSpAdj(home.id, homeSpSlot), aSpAdj = getSpAdj(away.id, awaySpSlot);
      const parkHfa = hfa ? park.hfa : 0;
      const hOff = home.runsFor||LG_AVG_R9, aDef = away.runsAgainst||LG_AVG_R9;
      const aOff = away.runsFor||LG_AVG_R9, hDef = home.runsAgainst||LG_AVG_R9;
      const hSpMult = 1+hSpAdj*-0.04, aSpMult = 1+aSpAdj*-0.04;
      const hExpR9 = Math.sqrt(hOff*aDef)*park.pf*aSpMult;
      const aExpR9 = Math.sqrt(aOff*hDef)*park.pf*hSpMult;
      const hfaRunBoost = parkHfa*0.5;
      const hLambda = Math.max(0.2,(hExpR9+hfaRunBoost)/9);
      const aLambda = Math.max(0.2,aExpR9/9);
      let hWins=0,rlCovers=0,totalRuns=0;
      const totals = new Array(30).fill(0);
      let hRunSum=0,aRunSum=0;
      for (let i=0;i<POISSON_N;i++) {
        const {h,a} = simulateGame(hLambda,aLambda);
        if (h>a) { hWins++; if(h-a>=2) rlCovers++; }
        const tot=h+a; totalRuns+=tot;
        if(tot<30) totals[tot]++;
        hRunSum+=h; aRunSum+=a;
      }
      const hWinProb=hWins/POISSON_N, rlCoverPct=rlCovers/POISSON_N;
      const avgTotal=totalRuns/POISSON_N;
      const hPythFlag=pythagFlag(home), aPythFlag=pythagFlag(away);
      let pythagAdj=0;
      if(hPythFlag==="LUCKY") pythagAdj-=0.02; if(hPythFlag==="UNLUCKY") pythagAdj+=0.02;
      if(aPythFlag==="LUCKY") pythagAdj+=0.02; if(aPythFlag==="UNLUCKY") pythagAdj-=0.02;
      const hWinCalib = applyCalibration(Math.max(0.05,Math.min(0.95,hWinProb+pythagAdj)),null);
      return {
        hWinProb:hWinCalib, aWinProb:1-hWinCalib,
        hWinPct:(hWinCalib*100).toFixed(1), aWinPct:((1-hWinCalib)*100).toFixed(1),
        rlCoverPct:+(rlCoverPct*100).toFixed(1), aRLCoverPct:+((1-rlCoverPct)*100).toFixed(1),
        avgTotal:+avgTotal.toFixed(1), hAvgRuns:+(hRunSum/POISSON_N).toFixed(1), aAvgRuns:+(aRunSum/POISSON_N).toFixed(1),
        totalDist:totals, hLambda:+hLambda.toFixed(3), aLambda:+aLambda.toFixed(3),
        hPythFlag,aPythFlag, park:park.park,parkFactor:park.pf,parkHfa, hSpAdj,aSpAdj, simN:POISSON_N,

    }
    function predictMatchup(home, away, hfa=true, homeSpSlot=2, awaySpSlot=2) {
      const sim = runSimulation(home, away, hfa, homeSpSlot, awaySpSlot);
      return { hWinPct:sim.hWinPct, aWinPct:sim.aWinPct, hRuns:sim.hAvgRuns, aRuns:sim.aAvgRuns, total:sim.avgTotal,
        rlCoverPct:sim.rlCoverPct, aRLCoverPct:sim.aRLCoverPct, edge:(sim.hLambda-sim.aLambda).toFixed(3),
        hSpAdj:sim.hSpAdj, aSpAdj:sim.aSpAdj, hPythFlag:sim.hPythFlag, aPythFlag:sim.aPythFlag,
        pythagAdj:"0.0", park:sim.park,parkFactor:sim.parkFactor,parkHfa:sim.parkHfa, sim };

    function simOverProb(totalDist, ouLine) {
      const n = totalDist.reduce((s,v)=>s+v,0); if(n===0) return 0.5;

    // ── H2H storage ───────────────────────────────────────────────
    const H2H_KEY = "mlb_h2h";
    function h2hKey(t1,t2) { return [t1,t2].sort().join("|"); }
    async function loadH2H() { try { const s=await window.storage.get(H2H_KEY); if(s&&s.value) return JSON.parse(s.value); } catch{} return {}; }
    async function saveH2H(data) { try { await window.storage.set(H2H_KEY,JSON.stringify(data)); } catch{} }
    async function recordH2H(home,away,homeWon) {
      const data=await loadH2H(), key=h2hKey(home,away), first=key.split("|")[0];
      if(!data[key]) data[key]={t1:first,t2:key.split("|")[1],t1W:0,t2W:0,games:[]};
      const rec=data[key];
      if(first===home) { if(homeWon) rec.t1W++; else rec.t2W++; } else { if(homeWon) rec.t2W++; else rec.t1W++; }
      rec.games.push({home,away,homeWon,ts:Date.now()});
      if(rec.games.length>20) rec.games=rec.games.slice(-20);
      data[key]=rec; await saveH2H(data);
    }
    function getH2HRecord(homeTeamId,awayTeamId,h2hData,minGames=4) {
      const key=h2hKey(homeTeamId,awayTeamId), rec=h2hData[key]; if(!rec) return null;
      const total=rec.t1W+rec.t2W; if(total<minGames) return null;
      const first=key.split("|")[0], teamW=first===homeTeamId?rec.t1W:rec.t2W;
      return {teamWins:teamW,oppWins:total-teamW,total,teamWinRate:teamW/total};
    }
    function applyH2HAdj(rawProb,homeId,awayId,h2hData) {
      const H2H_WEIGHT=0.12, MIN_H2H_GAMES=4;

      const blended=rawProb*(1-H2H_WEIGHT)+rec.teamWinRate*H2H_WEIGHT;

    // ── Calibration ───────────────────────────────────────────────
    const PRED_KEY="mlb_predictions", MAX_PREDS=500;
    const HISTORICAL_CALIB_PRIORS = [
      {label:"50-55%",min:0.50,max:0.55,midpoint:0.525,actualRate:0.528,n:4200},
      {label:"55-60%",min:0.55,max:0.60,midpoint:0.575,actualRate:0.569,n:3800},

    ];
    async function loadPredictions() { try { const s=await window.storage.get(PRED_KEY); if(s&&s.value) return JSON.parse(s.value); } catch{} return {predictions:[]}; }
    async function savePredictions(data) { try { if(data.predictions.length>MAX_PREDS) data.predictions=data.predictions.slice(-MAX_PREDS); await window.storage.set(PRED_KEY,JSON.stringify(data)); } catch{} }
    async function recordPrediction(gameId,home,away,hWinPct,modelOU) {

      await savePredictions(data);
    }
    async function settlePrediction(gameId,homeWon,actualTotal) {
      const data=await loadPredictions(), pred=data.predictions.find(p=>p.id===gameId);
      if(!pred||pred.outcome) return;
      pred.outcome={homeWon,actualTotal,settledAt:Date.now()};

    function computeCalibration(predictions) {
      const settled=predictions.filter(p=>p.outcome!=null);
      const liveBuckets={}; let correct=0,brierSum=0,ouCorrect=0,ouTotal=0,maeSum=0;
      for (const p of settled) {
        const favHome=p.hWinPct>=0.5, favWon=favHome?p.outcome.homeWon:!p.outcome.homeWon, favProb=favHome?p.hWinPct:1-p.hWinPct;
        if(favWon) correct++;
        brierSum+=Math.pow(p.hWinPct-(p.outcome.homeWon?1:0),2);
        if(p.modelOU&&p.outcome.actualTotal!=null) {
          ouTotal++;
          if((p.modelOU>9.0&&p.outcome.actualTotal>p.modelOU)||(p.modelOU<=9.0&&p.outcome.actualTotal<=p.modelOU)) ouCorrect++;
          maeSum+=Math.abs(p.outcome.actualTotal-p.modelOU);
        }
        for (const prior of HISTORICAL_CALIB_PRIORS) {
          if(favProb>=prior.min&&favProb<prior.max) {
            if(!liveBuckets[prior.label]) liveBuckets[prior.label]={wins:0,n:0};
            liveBuckets[prior.label].n++; if(favWon) liveBuckets[prior.label].wins++; break;
          }
        }
      }
      const calibration=HISTORICAL_CALIB_PRIORS.map(prior => {
        const live=liveBuckets[prior.label]||{wins:0,n:0};
        const totalN=prior.n+live.n;
        const blendedRate=(prior.n*prior.actualRate+live.n*(live.n>0?live.wins/live.n:prior.actualRate))/totalN;
        const correction=Math.max(0.5,Math.min(2.0,blendedRate/prior.midpoint));
        return {label:prior.label,min:prior.min,max:prior.max,midpoint:prior.midpoint,n:live.n,priorN:prior.n,actualRate:blendedRate,liveRate:live.n>0?live.wins/live.n:null,priorRate:prior.actualRate,correction};
      });
      return {total:settled.length,accuracy:settled.length>0?correct/settled.length:null,brierScore:settled.length>0?brierSum/settled.length:null,ouAccuracy:ouTotal>0?ouCorrect/ouTotal:null,ouMAE:ouTotal>0?maeSum/ouTotal:null,calibration,settled,hasHistoricalPrior:true};
    }
    function applyCalibration(rawProb, calibrationBuckets) {

      const favProb=rawProb>=0.5?rawProb:1-rawProb;

    }

                      const allV=teams.map(r=>r[c.key]).filter(x=>typeof x==="number");

                      const good=lowBetter?1-pct:pct, col=good>0.72?C.green:good<0.28?C.red:C.text;
                      return <td key={c.key} style={{padding:"0.65rem 0.8rem",textAlign:"center",color:isRating?(v>=9?C.gold:v>=8?"#a0d080":C.text):col,fontWeight:isRating?"bold":"normal"}}>{c.fmt(v)}</td>;
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{fontSize:"0.72rem",color:C.dim,marginTop:"0.4rem"}}>{rows.length} of 30 teams · Live stats blend with pre-season projections</div>
        </div>
      );
    }

    // ── Page: XY Explorer ─────────────────────────────────────────
    function XYExplorerPage() {
      const {teams}=useLive();
      const [xKey,setXKey]=useState("era"), [yKey,setYKey]=useState("winPct");
      const numCols=ALL_COLUMNS.filter(c=>!["streak","last10"].includes(c.key));
      const xs=teams.map(t=>t[xKey]).filter(v=>typeof v==="number");
      const ys=teams.map(t=>t[yKey]).filter(v=>typeof v==="number");
      const xMin=Math.min(...xs),xMax=Math.max(...xs),yMin=Math.min(...ys),yMax=Math.max(...ys);
      const W=570,H=370,pad=0.06;
      const toX=v=>30+(pad+(v-xMin)/(xMax-xMin||1)*(1-2*pad))*(W-40);
      const toY=v=>10+(pad+(1-(v-yMin)/(yMax-yMin||1))*(1-2*pad))*(H-40);
      return (
        <div style={{padding:"1.5rem"}}>
          <SectionHeader>XY EXPLORER <LiveBadge/></SectionHeader>
          <div style={{display:"flex",gap:"1rem",marginBottom:"1rem"}}>
            <Ctrl label="X Axis"><select value={xKey} onChange={e=>setXKey(e.target.value)} style={ss}>{numCols.map(c=><option key={c.key} value={c.key}>{c.label}</option>)}</select></Ctrl>
            <Ctrl label="Y Axis"><select value={yKey} onChange={e=>setYKey(e.target.value)} style={ss}>{numCols.map(c=><option key={c.key} value={c.key}>{c.label}</option>)}</select></Ctrl>
          </div>
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:4,padding:"1rem",overflowX:"auto"}}>

              <line x1={30} y1={H-30} x2={W-10} y2={H-30} stroke={C.border} strokeWidth={1}/>
              <line x1={30} y1={10} x2={30} y2={H-30} stroke={C.border} strokeWidth={1}/>
              <text x={W/2} y={H-4} textAnchor="middle" fontSize={10} fill={C.muted}>{ALL_COLUMNS.find(c=>c.key===xKey)?.label}</text>
              <text x={10} y={H/2} textAnchor="middle" fontSize={10} fill={C.muted} transform={`rotate(-90,10,${H/2})`}>{ALL_COLUMNS.find(c=>c.key===yKey)?.label}</text>
              {[0.25,0.5,0.75].map(p=><g key={p}><line x1={30+p*(W-40)} y1={10} x2={30+p*(W-40)} y2={H-30} stroke={C.border} strokeWidth={0.5} strokeDasharray="3,4"/><line x1={30} y1={10+p*(H-40)} x2={W-10} y2={10+p*(H-40)} stroke={C.border} strokeWidth={0.5} strokeDasharray="3,4"/></g>)}
              {teams.map(t=>{const xv=t[xKey],yv=t[yKey];if(typeof xv!=="number"||typeof yv!=="number")return null;return<g key={t.id}><circle cx={toX(xv)} cy={toY(yv)} r={9} fill={t.color} opacity={0.88} stroke="#fff" strokeWidth={0.5}/><text x={toX(xv)} y={toY(yv)+4} textAnchor="middle" fontSize={6.5} fill="#fff" fontWeight="bold">{t.id}</text></g>;})}
            </svg>
          </div>
        </div>
      );
    }

            <div><div style={{fontSize:"0.6rem",letterSpacing:"0.1em",color:C.gold,marginBottom:"0.3rem"}}>HOME STARTER</div><select value={homeSpSlot} onChange={e=>setHomeSpSlot(+e.target.value)} style={ss}>{SP_LABELS.map((l,i)=><option key={i} value={i}>{l}</option>)}</select><div style={{fontSize:"0.6rem",color:C.dim,marginTop:"0.2rem"}}>Adj: <span style={{color:getSpAdj(home?.id||"LAD",homeSpSlot)>=0?C.green:C.red}}>{(getSpAdj(home?.id||"LAD",homeSpSlot)>=0?"+":"")+getSpAdj(home?.id||"LAD",homeSpSlot).toFixed(2)}</span></div></div>

    // ── Page: Scoreboard ──────────────────────────────────────────
    function ScoreboardPage() {
      const {allGames,loading,refresh,dataStatus}=useLive();
      const [view, setView] = useState("results");

      function gameState(g) {
        const s = (g.status||"").toLowerCase();
        if (s==="final"||s==="closed") return "final";
        if (s==="inprogress"||s==="live") return "live";
        return "scheduled";
      }

      function hasRealScore(g) {
        const state = gameState(g);
        return (state==="final"||state==="live") && g.hScore!=null && g.aScore!=null;
      }

      const enriched = useMemo(()=>{
        const liveDates = new Set(
          allGames.filter(g=>g._source==="live").map(g=>localDateKey(g.start_time))
        );
        const hasAnyLive = liveDates.size > 0;
        return allGames
          .filter(g=>{
            if(hasAnyLive && g._source==="seed" && liveDates.has(g.start_time.slice(0,10))) return false;
            return true;
          })
          .map(g=>{
            const ht=BASELINE.find(t=>t.id===g.home), at=BASELINE.find(t=>t.id===g.away);
            if(!ht||!at) return null;
            return {...g, homeTeam:ht, awayTeam:at, _state:gameState(g), _hasScore:hasRealScore(g)};
          })
          .filter(Boolean);
      },[allGames]);

      const resultGames = useMemo(()=>{
        const finals = enriched
          .filter(g => g._state==="final" || g._state==="live")
          .sort((a,b)=>new Date(b.start_time)-new Date(a.start_time));
        const out={};
        finals.forEach(g=>{
          const day=fmtDate(g.start_time);
          if(!out[day]) out[day]=[];
          out[day].push(g);
        });
        return out;
      },[enriched]);

      const upcomingGames = useMemo(()=>{
        const upcoming = enriched
          .filter(g => g._state==="scheduled" && localDateKey(g.start_time) >= todayLocalKey())
          .sort((a,b)=>new Date(a.start_time)-new Date(b.start_time));
        const out={};
        upcoming.forEach(g=>{
          const day=fmtDate(g.start_time);
          if(!out[day]) out[day]=[];
          out[day].push(g);
        });
        return out;
      },[enriched]);

      const resultDays   = Object.keys(resultGames).slice(0,5);
      const upcomingDays = Object.keys(upcomingGames).slice(0,5);
      const activeGroups = view==="results" ? resultGames   : upcomingGames;
      const activeDays   = view==="results" ? resultDays    : upcomingDays;

      if(loading&&enriched.length===0) return <div style={{padding:"3rem",textAlign:"center",color:C.muted}}>Loading…</div>;

      return (
        <div style={{padding:"1.5rem"}}>
          <SectionHeader>SCOREBOARD <LiveBadge/> {dataStatus.schedule&&<APIBadge label="MLB API"/>}</SectionHeader>
          <div style={{display:"flex",gap:"0.5rem",marginBottom:"1.25rem"}}>
            {[
              {id:"results",  label:"Results",  count:Object.values(resultGames).flat().length},
              {id:"upcoming", label:"Upcoming", count:Object.values(upcomingGames).flat().length},
            ].map(tab=>(
              <button key={tab.id} onClick={()=>setView(tab.id)} style={{
                flex:1, padding:"0.55rem 1rem", borderRadius:5, cursor:"pointer", fontFamily:"inherit",
                background:view===tab.id?"rgba(201,168,76,0.12)":C.surface,
                border:`2px solid ${view===tab.id?C.gold:C.border}`,
                color:view===tab.id?C.goldLight:C.muted, fontSize:"0.85rem", fontWeight:"bold",
              }}>
                {tab.label}
                <span style={{marginLeft:"0.5rem",fontSize:"0.7rem",opacity:0.7}}>({tab.count})</span>
              </button>
            ))}
          </div>
          {activeDays.length===0 ? (
            <div style={{padding:"2rem",textAlign:"center",color:C.muted,background:C.surface,border:`1px solid ${C.border}`,borderRadius:6}}>
              {view==="results" ? "No completed games found." : "No upcoming games found."}
              <button onClick={refresh} style={{display:"block",margin:"0.75rem auto 0",background:"none",border:`1px solid ${C.border}`,color:C.gold,padding:"0.35rem 1rem",borderRadius:3,cursor:"pointer",fontFamily:"inherit"}}>Refresh →</button>
            </div>
          ) : activeDays.map(day=>(
            <div key={day} style={{marginBottom:"1.5rem"}}>
              <div style={{fontSize:"0.68rem",letterSpacing:"0.14em",color:C.gold,marginBottom:"0.45rem",paddingBottom:"0.3rem",borderBottom:`1px solid ${C.border}`}}>{day.toUpperCase()}</div>
              <div style={{display:"grid",gap:"0.35rem"}}>
                {activeGroups[day].map((g,i)=>{
                  const isFinal = g._state==="final";

              const bestValueSide = hValueEdge != null && aValueEdge != null
                ? (hValueEdge >= aValueEdge ? "home" : "away") : null;

              // Edge score: based on value vs Vegas when available, else model confidence
              const edgeScore = bestValueEdge != null

    // ── VS VEGAS TRACKING ─────────────────────────────────────────
    const VS_VEGAS_KEY = "mlb_vs_vegas";
    const CURRENT_SEASON = new Date().getFullYear().toString();
    const REGULAR_SEASON_START = "2026-03-25";

    async function loadVsVegas() {
      try {
        const s = await window.storage.get(VS_VEGAS_KEY);
        if (s && s.value) {
          const d = JSON.parse(s.value);
          if (d.season !== CURRENT_SEASON) return { season: CURRENT_SEASON, games: [] };
          d.games = (d.games || []).filter(g =>
            (g.date || "") >= REGULAR_SEASON_START &&
            g.home && g.home.length >= 2 &&
            g.away && g.away.length >= 2
          );
          // Backfill projected scores for games stored before this field existed
          let needsSave = false;
          for (const g of d.games) {
            if (g.projHomeRuns == null || g.projAwayRuns == null) {
              const h = BASELINE.find(t=>t.id===g.home);
              const a = BASELINE.find(t=>t.id===g.away);
              if (h && a) {
                try {
                  const sim = runSimulation(h, a, true);
                  g.projHomeRuns = +sim.hAvgRuns;
                  g.projAwayRuns = +sim.aAvgRuns;
                  g.projTotal    = +sim.avgTotal.toFixed(1);
                  needsSave = true;
                } catch {}
              }
            }
          }
          if (needsSave) {
            try { await window.storage.set(VS_VEGAS_KEY, JSON.stringify(d)); } catch {}
          }
          return d;
        }
      } catch {}
      return { season: CURRENT_SEASON, games: [] };
    }

    async function saveVsVegas(data) {
      try {
        if (data.games.length > 1000) data.games = data.games.slice(-1000);
        await window.storage.set(VS_VEGAS_KEY, JSON.stringify(data));
      } catch {}
    }

    async function recordVsVegas(game, odds) {
      const gameDate = localDateKey(game.start_time);
      if (gameDate < REGULAR_SEASON_START) return;
      if (game.gameType && game.gameType !== "R" && game.gameType !== "P") return;
      const s = (game.status||"").toLowerCase();
      if (s !== "final" && s !== "closed") return;
      if (game.hScore == null || game.aScore == null) return;

      const data = await loadVsVegas();
      if (data.games.find(g => g.id === game.id)) return;

      const total = game.hScore + game.aScore;
      const homeWon = game.hScore > game.aScore;
      const mHWin = parseFloat(odds.hWinPct || 50);
      const mAWin = parseFloat(odds.aWinPct || 50);
      const modelFavHome = mHWin >= mAWin;
      const modelFavTeam = modelFavHome ? game.home : game.away;
      const modelFavPct  = modelFavHome ? mHWin : mAWin;
      const modelFavWon  = modelFavHome ? homeWon : !homeWon;
      const mlHit = modelFavWon;
      const margin = game.hScore - game.aScore;
      const rlHit = modelFavHome ? margin >= 2 : margin <= -2;
      const ouLine = parseFloat(odds.ou) || null;
      const modelOUPick = parseFloat(odds.overPct) >= 50 ? "OVER" : "UNDER";
      const ouHit = ouLine != null
        ? (modelOUPick === "OVER" ? total > ouLine : total < ouLine)
        : null;
      const vegasML = modelFavHome ? (odds.hML || null) : (odds.aML || null);
      const modelRLLine = modelFavHome ? (odds.hRL || null) : (odds.aRL || null);

      // Pull projected runs — prefer direct property, fall back to sim
      const projHomeRuns = odds.hRuns != null ? +odds.hRuns : (odds.sim ? +odds.sim.hAvgRuns : null);
      const projAwayRuns = odds.aRuns != null ? +odds.aRuns : (odds.sim ? +odds.sim.aAvgRuns : null);

      data.games.push({
        id: game.id,
        date: localDateKey(game.start_time),
        home: game.home, away: game.away,
        modelFavTeam, modelFavPct,
        vegasML, mlHit,
        modelRLTeam: modelFavTeam, modelRLLine, rlHit,
        modelOUPick, ouLine, ouHit,
        hScore: game.hScore, aScore: game.aScore, total,
        projHomeRuns, projAwayRuns,
        projTotal: ouLine,
        settledAt: Date.now(),
      });

      await saveVsVegas(data);
    }

    function mlToProb(mlStr) {
      if (!mlStr) return null;
      const n = parseFloat(mlStr.replace(/[^0-9\-+]/g,''));
      if (isNaN(n)) return null;
      return n < 0 ? Math.abs(n)/(Math.abs(n)+100) : 100/(n+100);
    }

    function computeROI(games, pickField, hitField, mlField) {
      let spent = 0, returned = 0, wins = 0, losses = 0, pushes = 0;
      for (const g of games) {
        if (g[hitField] == null) continue;
        const ml = mlField ? g[mlField] : null;
        spent += 100;
        if (g[hitField] === true) {
          wins++;
          if (ml) {
            const n = parseFloat((ml||"").replace(/[^0-9\-+]/g,''));
            returned += 100 + (n < 0 ? 100/Math.abs(n)*100 : n);
          } else {
            returned += 190;
          }
        } else {
          losses++;
        }
      }
      const net = returned - spent;
      const roi = spent > 0 ? (net/spent*100) : 0;
      return { spent, returned, net, roi, wins, losses, pushes, total: wins+losses+pushes };
    }

      useEffect(()=>{
        async function load() {
          setLoading(true);

          setLoading(false);

        load();
        const id = setInterval(load, 60000);
        return () => clearInterval(id);
      },[]);

      const games = (vvData?.games || []).filter(g => g.mlHit != null);

      const filtered = games.filter(g => {
        if (filter === "ml-hit")   return g.mlHit === true;
        if (filter === "ml-miss")  return g.mlHit === false;
        if (filter === "ou-over")  return g.modelOUPick === "OVER";
        if (filter === "ou-under") return g.modelOUPick === "UNDER";
        if (filter === "rl-hit")   return g.rlHit === true;
        if (filter === "rl-miss")  return g.rlHit === false;
        return true;
      }).sort((a,b) => sortBy === "date" ? b.settledAt - a.settledAt : 0);

      const totalPages = Math.ceil(filtered.length / PER_PAGE);
      const pageGames  = filtered.slice(page * PER_PAGE, (page+1) * PER_PAGE);

      // Summary stats
      const mlW = games.filter(g=>g.mlHit).length;
      const rlW = games.filter(g=>g.rlHit).length;
      const ouW = games.filter(g=>g.ouHit).length;
      const n   = games.length;

      // Score accuracy — MAE on projected vs actual runs
      const scoredGames = games.filter(g => g.projHomeRuns != null && g.projAwayRuns != null);
      const homeMAE = scoredGames.length
        ? (scoredGames.reduce((s,g) => s + Math.abs(g.projHomeRuns - g.hScore), 0) / scoredGames.length).toFixed(2)
        : null;
      const awayMAE = scoredGames.length
        ? (scoredGames.reduce((s,g) => s + Math.abs(g.projAwayRuns - g.aScore), 0) / scoredGames.length).toFixed(2)
        : null;
      const totalMAE = scoredGames.length
        ? (scoredGames.reduce((s,g) => s + Math.abs((g.projHomeRuns+g.projAwayRuns) - g.total), 0) / scoredGames.length).toFixed(2)
        : null;

      const Pill = ({label, val, color}) => (
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:"0.6rem 0.8rem",textAlign:"center",flex:1}}>
          <div style={{fontSize:"0.52rem",letterSpacing:"0.1em",color:C.dim,marginBottom:"0.25rem"}}>{label}</div>
          <div style={{fontSize:"1.1rem",fontWeight:"bold",color:color||C.gold}}>{val}</div>
        </div>
      );

      if (loading) return <div style={{padding:"3rem",textAlign:"center",color:C.muted}}>Loading…</div>;

      return (
        <div style={{padding:"1.5rem"}}>
          <SectionHeader>PREDICTIONS VS ACTUALS <LiveBadge/></SectionHeader>

          {/* Summary row */}
          {n > 0 && (
            <div style={{display:"flex",gap:"0.5rem",marginBottom:"1rem",flexWrap:"wrap"}}>
              <Pill label="ML" val={`${mlW}-${n-mlW}`} color={mlW/n>=0.524?C.green:C.red}/>
              <Pill label="RL" val={`${rlW}-${n-rlW}`} color={rlW/n>=0.524?C.green:C.red}/>
              <Pill label="O/U" val={`${ouW}-${n-ouW}`} color={ouW/n>=0.524?C.green:C.red}/>
              {homeMAE && <Pill label="SCORE MAE" val={`±${totalMAE}R`} color={C.muted}/>}
            </div>
          )}

          {/* Score accuracy detail */}
          {scoredGames.length > 0 && (
            <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:"0.7rem 1rem",marginBottom:"1rem",display:"flex",gap:"1.5rem",flexWrap:"wrap"}}>
              <div style={{fontSize:"0.62rem",color:C.dim,letterSpacing:"0.08em",alignSelf:"center"}}>PROJ SCORE MAE</div>
              <div style={{textAlign:"center"}}><div style={{fontSize:"0.55rem",color:C.dim}}>HOME</div><div style={{fontSize:"0.85rem",fontWeight:"bold",color:C.muted}}>±{homeMAE}R</div></div>
              <div style={{textAlign:"center"}}><div style={{fontSize:"0.55rem",color:C.dim}}>AWAY</div><div style={{fontSize:"0.85rem",fontWeight:"bold",color:C.muted}}>±{awayMAE}R</div></div>
              <div style={{textAlign:"center"}}><div style={{fontSize:"0.55rem",color:C.dim}}>TOTAL</div><div style={{fontSize:"0.85rem",fontWeight:"bold",color:parseFloat(totalMAE)<2?C.green:parseFloat(totalMAE)<3?C.gold:C.red}}>±{totalMAE}R</div></div>
              <div style={{fontSize:"0.58rem",color:C.dim,alignSelf:"center",marginLeft:"auto"}}>{scoredGames.length} games w/ proj</div>
            </div>
          )}

          {/* Filter tabs */}
          <div style={{display:"flex",gap:"0.3rem",marginBottom:"1rem",flexWrap:"wrap"}}>
            {[
              {id:"all",    label:"All"},
              {id:"ml-hit", label:"ML ✓"},
              {id:"ml-miss",label:"ML ✗"},
              {id:"rl-hit", label:"RL ✓"},
              {id:"rl-miss",label:"RL ✗"},
              {id:"ou-over",label:"OVER"},
              {id:"ou-under",label:"UNDER"},
            ].map(f=>(
              <button key={f.id} onClick={()=>{setFilter(f.id);setPage(0);}} style={{
                padding:"0.3rem 0.65rem",borderRadius:4,cursor:"pointer",fontFamily:"inherit",
                fontSize:"0.68rem",fontWeight:"bold",
                background:filter===f.id?"rgba(201,168,76,0.15)":C.surface,
                border:`1px solid ${filter===f.id?C.gold:C.border}`,
                color:filter===f.id?C.gold:C.muted,
              }}>{f.label}</button>
            ))}
            <div style={{marginLeft:"auto",fontSize:"0.65rem",color:C.dim,alignSelf:"center"}}>{filtered.length} games</div>
          </div>

          {n === 0 ? (
            <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:"3rem 2rem",textAlign:"center"}}>
              <div style={{fontSize:"2rem",marginBottom:"0.75rem"}}>🎯</div>
              <div style={{fontSize:"0.9rem",color:C.muted,marginBottom:"0.5rem"}}>No settled games yet</div>
              <div style={{fontSize:"0.75rem",color:C.dim}}>Predictions record automatically when games finalize on the Daily Betting Lines tab.</div>
            </div>
          ) : (
            <>
              {/* Table */}
              <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,overflow:"hidden",marginBottom:"0.5rem"}}>
                {/* Header */}
                <div style={{display:"grid",gridTemplateColumns:"2.4rem 3.8rem 4rem 4rem 2.8rem 2.6rem 2.6rem",background:C.header,borderBottom:`1px solid ${C.border}`}}>
                  {["DATE","MATCHUP","PROJ","ACTUAL","ML","RL","O/U"].map(h=>(
                    <div key={h} style={{padding:"0.35rem 0.1rem",fontSize:"0.5rem",letterSpacing:"0.03em",color:C.muted,fontWeight:"bold",textAlign:"center"}}>{h}</div>
                  ))}
                </div>
                {pageGames.map((g, i) => {
                  const favIsHome = g.modelFavTeam === g.home;
                  const homeWon = g.hScore > g.aScore;
                  const hasProj = g.projAwayRuns != null && g.projHomeRuns != null;
                  const totErr  = hasProj ? ((g.projHomeRuns+g.projAwayRuns) - g.total).toFixed(1) : null;
                  const errColor = e => Math.abs(parseFloat(e)) <= 1 ? C.green : Math.abs(parseFloat(e)) <= 2.5 ? C.gold : C.red;
                  return (
                    <div key={g.id} style={{display:"grid",gridTemplateColumns:"2.4rem 3.8rem 4rem 4rem 2.8rem 2.6rem 2.6rem",alignItems:"center",borderBottom:`1px solid ${C.border}`,background:i%2===0?"transparent":"rgba(255,255,255,0.016)"}}>
                      {/* Date */}
                      <div style={{padding:"0.35rem 0.05rem",fontSize:"0.55rem",color:C.dim,textAlign:"center",lineHeight:1.2}}>{g.date?.slice(5)||"--"}</div>
                      {/* Matchup stacked */}
                      <div style={{padding:"0.28rem 0.1rem"}}>
                        <div style={{display:"flex",alignItems:"center",gap:"0.12rem",marginBottom:"0.1rem"}}>
                          <span style={{fontSize:"0.38rem",color:C.dim,flexShrink:0}}>AWY</span>
                          <span style={{fontSize:"0.64rem",fontWeight:"bold",color:!favIsHome?C.gold:C.muted}}>{g.away}</span>
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:"0.12rem"}}>
                          <span style={{fontSize:"0.38rem",color:C.dim,flexShrink:0}}>HME</span>
                          <span style={{fontSize:"0.64rem",fontWeight:"bold",color:favIsHome?C.gold:C.muted}}>{g.home}</span>
                        </div>
                      </div>
                      {/* Projected score */}
                      <div style={{padding:"0.28rem 0.08rem",textAlign:"center"}}>
                        {hasProj ? (
                          <>
                            <div style={{fontSize:"0.64rem",fontWeight:"bold",color:C.gold,whiteSpace:"nowrap"}}>{g.projAwayRuns}-{g.projHomeRuns}</div>
                            <div style={{fontSize:"0.42rem",color:C.dim,letterSpacing:"0.02em"}}>awy-hme</div>
                            <div style={{fontSize:"0.42rem",color:C.dim}}>OU {g.projTotal}</div>
                          </>
                        ) : (
                          <div style={{fontSize:"0.6rem",color:C.dim}}>--</div>
                        )}
                      </div>
                      {/* Actual score + error */}
                      <div style={{padding:"0.28rem 0.08rem",textAlign:"center"}}>
                        <div style={{fontSize:"0.64rem",fontWeight:"bold",color:homeWon?C.green:C.text,whiteSpace:"nowrap"}}>{g.aScore}-{g.hScore}</div>
                        <div style={{fontSize:"0.42rem",color:C.dim,letterSpacing:"0.02em"}}>awy-hme</div>
                        {hasProj && (
                          <div style={{fontSize:"0.46rem",color:errColor(totErr)}}>Δ{parseFloat(totErr)>0?"+":""}{totErr}R</div>
                        )}
                      </div>
                      {/* ML */}
                      <div style={{textAlign:"center",padding:"0.1rem 0"}}>
                        <span style={{fontSize:"0.56rem",fontWeight:"bold",color:g.mlHit?C.green:C.red}}>{g.mlHit?"WIN":"LOS"}</span>
                        <div style={{fontSize:"0.44rem",color:C.dim}}>{g.modelFavTeam}</div>
                      </div>
                      {/* RL */}
                      <div style={{textAlign:"center",padding:"0.1rem 0"}}>
                        <span style={{fontSize:"0.56rem",fontWeight:"bold",color:g.rlHit?C.green:C.red}}>{g.rlHit?"WIN":"LOS"}</span>
                        <div style={{fontSize:"0.44rem",color:"transparent"}}>–</div>
                      </div>
                      {/* O/U */}
                      <div style={{textAlign:"center",padding:"0.1rem 0"}}>
                        <span style={{fontSize:"0.56rem",fontWeight:"bold",color:g.ouHit?C.green:C.red}}>{g.ouHit?"WIN":"LOS"}</span>
                        <div style={{fontSize:"0.44rem",color:C.dim}}>{g.modelOUPick==="OVER"?"OVR":"UND"}</div>
                      </div>
                    </div>
                  );
                })}
              </div>

              {/* Pagination */}
              {totalPages > 1 && (
                <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:"0.5rem",marginBottom:"1rem"}}>
                  <button onClick={()=>setPage(p=>Math.max(0,p-1))} disabled={page===0} style={{background:"none",border:`1px solid ${C.border}`,color:C.muted,padding:"0.2rem 0.6rem",borderRadius:3,cursor:"pointer",fontFamily:"inherit",fontSize:"0.75rem",opacity:page===0?0.3:1}}>←</button>
                  <span style={{fontSize:"0.72rem",color:C.dim}}>{page+1}/{totalPages}</span>
                  <button onClick={()=>setPage(p=>Math.min(totalPages-1,p+1))} disabled={page===totalPages-1} style={{background:"none",border:`1px solid ${C.border}`,color:C.muted,padding:"0.2rem 0.6rem",borderRadius:3,cursor:"pointer",fontFamily:"inherit",fontSize:"0.75rem",opacity:page===totalPages-1?0.3:1}}>→</button>
                </div>
              )}

              <div style={{fontSize:"0.62rem",color:C.dim,marginTop:"0.25rem",lineHeight:1.6}}>
                PROJ = model's projected score · Δ = actual minus projected total · color: green ≤1R, gold ≤2.5R, red &gt;2.5R off
              </div>
            </>
          )}
        </div>
      );
    }

    function MethodologyPage() {
      const items=[
        {t:"Data Source",b:"Live game data fetched via MLB Stats API (statsapi.mlb.com). Falls back to seed data if the API call fails. All ERA/OPS/WHIP ratings are pre-season projections blended with live W-L data."},
        {t:"Model Overview",b:"Three rating pillars: Offensive Rating (40%), Defensive/Pitching Rating (40%), Starting Pitcher Rating (20%). Each starts from pre-season projections and blends with live data as games accumulate."},
        {t:"Live Blending",b:"liveWeight = min(40%, gamesPlayed / 162 × 1.5). At 0 games the model is 100% baseline. At 43+ games it reaches the 40% live cap. Prevents overreaction to early-season variance."},
        {t:"Elo System",b:"Margin-of-victory Elo updates after each completed game. K-factor scales with run margin (capped at 5 runs). A 5-run blowout updates ratings ~2.3× more than a 1-run win."},
        {t:"Poisson Simulation",b:"Each game is simulated 10,000 times using Poisson-distributed run scoring per inning. Produces win probability, run line cover %, and over/under probability from the actual run distribution."},
        {t:"Calibration",b:"Historical priors from 12,150 MLB games (2021-2025) seed the calibration system. Live predictions blend in via Bayesian updating. Correction factors applied per confidence bucket (50-55%, 55-60%, etc.)."},
        {t:"Park Factors",b:"Per-park run multipliers and home field advantage values derived from 5-year averages. Coors Field (1.38) boosts run totals significantly; Petco Park (0.91) suppresses them."},
      ];
      return (
        <div style={{padding:"1.5rem",maxWidth:740}}>
          <SectionHeader>METHODOLOGY</SectionHeader>
          {items.map(s=><div key={s.t} style={{marginBottom:"1.4rem",paddingBottom:"1.4rem",borderBottom:`1px solid ${C.border}`}}><div style={{fontWeight:"bold",color:C.goldLight,marginBottom:"0.35rem",fontSize:"0.92rem"}}>{s.t}</div><p style={{margin:0,lineHeight:1.8,fontSize:"0.84rem",color:C.muted}}>{s.b}</p></div>)}
        </div>
      );
    }

    // ── Main App ──────────────────────────────────────────────────
    function SidebarAIKey() {
      const [key, setKey] = React.useState(localStorage.getItem("mlb_ai_key")||"");
      const [editing, setEditing] = React.useState(!localStorage.getItem("mlb_ai_key"));
      const [saved, setSaved] = React.useState(!!localStorage.getItem("mlb_ai_key"));
      function save() {
        if (!key.trim()) return;
        localStorage.setItem("mlb_ai_key", key.trim());
        setSaved(true); setEditing(false);
      }
      return (
        <div style={{marginTop:"0.75rem",paddingTop:"0.75rem",borderTop:`1px solid ${C.border}`}}>
          <div style={{fontSize:"0.62rem",color:C.gold,fontWeight:"bold",marginBottom:"0.35rem",letterSpacing:"0.06em"}}>⚡ AI KEY</div>
          {!editing ? (
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:"0.6rem",color:C.green}}>✓ Key saved</span>
              <button onClick={()=>setEditing(true)} style={{fontSize:"0.6rem",color:C.dim,background:"none",border:`1px solid ${C.border}`,borderRadius:2,padding:"0.15rem 0.4rem",cursor:"pointer",fontFamily:"inherit"}}>Change</button>
            </div>
          ) : (
            <div>
              <div style={{fontSize:"0.58rem",color:C.dim,marginBottom:"0.3rem"}}>Paste your Anthropic key (console.anthropic.com)</div>
              <input
                value={key}
                onChange={e=>setKey(e.target.value)}
                placeholder="sk-ant-..."
                style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:3,padding:"0.3rem 0.45rem",color:C.text,fontSize:"0.68rem",fontFamily:"inherit",outline:"none",marginBottom:"0.3rem"}}
              />
              <button onClick={save} style={{width:"100%",background:C.gold,border:"none",borderRadius:3,color:"#111",padding:"0.35rem",cursor:"pointer",fontFamily:"inherit",fontSize:"0.72rem",fontWeight:"bold"}}>Save Key</button>
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [navOpen,setNavOpen]=useState(false), [page,setPage]=useState("gambling");
      const [teams,setTeams]=useState(BASELINE.map(t=>({...t,wins:0,losses:0,liveGames:0})));
      const [allGames,setAllGames]=useState([]), [loading,setLoading]=useState(false);
      const [lastRefresh,setLastRefresh]=useState(null), [refreshError,setRefreshError]=useState(null);
      const [dataStatus,setDataStatus]=useState({standings:false,stats:false,schedule:false});
      const SEASON=new Date().getFullYear().toString();
      const refresh=useCallback(async()=>{
        setLoading(true); setRefreshError(null);
        try {
          const raw=await fetchAllMLBData(SEASON);
          const {games,standings,teamStats}=parseMLBData(raw);
          setDataStatus({schedule:raw.gamesOk??games.length>0,standings:raw.standingsOk??Object.keys(standings).length>0,stats:true});
          setAllGames(games); setTeams(buildLiveTeams(standings,teamStats,games)); setLastRefresh(new Date());
          if(!games.length&&!Object.keys(standings).length) setRefreshError("No data returned.");
        } catch(e) { setRefreshError(e.message||"Unknown error"); }
        setLoading(false);
      },[SEASON]);
      useEffect(()=>{refresh();const id=setInterval(refresh,5*60*1000);return()=>clearInterval(id);},[refresh]);
      function navigate(p){setPage(p);setNavOpen(false);}
      const liveGames=useMemo(()=>allGames.filter(g=>g.status==="live"||g.status==="inprogress"),[allGames]);
      const totalGames=useMemo(()=>Math.round(teams.reduce((s,t)=>s+(t.liveGames||0),0)/2),[teams]);
      return (
        <LiveContext.Provider value={{teams,allGames,liveGames,loading,lastRefresh,refresh,refreshError,dataStatus,totalGames,SEASON}}>
          <div style={{display:"flex",height:"100vh",background:C.bg,fontFamily:"'Helvetica Neue',Arial,sans-serif",color:C.text,overflow:"hidden"}}>
            {navOpen&&<div onClick={()=>setNavOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:40}}/>}
            <aside style={{position:"fixed",top:0,left:0,bottom:0,width:252,background:C.header,borderRight:`1px solid ${C.border}`,zIndex:50,transform:navOpen?"translateX(0)":"translateX(-100%)",transition:"transform 0.22s ease",display:"flex",flexDirection:"column"}}>
              <div style={{padding:"1.25rem 1.25rem 0.5rem",borderBottom:`1px solid ${C.border}`,flex:1,overflow:"auto"}}>
                <div style={{fontSize:"0.62rem",letterSpacing:"0.18em",color:C.dim,marginBottom:"0.6rem"}}>MLB STATS MODEL 2026</div>
                {NAV_ITEMS.map(n=><button key={n.id} onClick={()=>navigate(n.id)} style={{display:"flex",alignItems:"center",width:"100%",padding:"0.5rem 0.75rem",borderRadius:3,background:page===n.id?"rgba(201,168,76,0.12)":"transparent",border:"none",borderLeft:page===n.id?`2px solid ${C.gold}`:"2px solid transparent",color:page===n.id?C.goldLight:C.muted,fontSize:"0.84rem",cursor:"pointer",textAlign:"left",fontFamily:"inherit",marginBottom:2}}>{n.label}</button>)}
              </div>
              <div style={{padding:"1rem 1.25rem",borderTop:`1px solid ${C.border}`}}>
                <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:3,padding:"0.6rem 0.75rem",marginBottom:"0.75rem"}}>
                  <div style={{fontSize:"0.68rem",color:C.gold,fontWeight:"bold",marginBottom:"0.3rem"}}>MLB Stats API (statsapi.mlb.com)</div>
                  <div style={{fontSize:"0.62rem",color:C.dim,marginBottom:"0.4rem"}}>Free · no key · direct browser fetch</div>
                  {[{label:"Scores/Schedule",ok:dataStatus.schedule},{label:"W-L Standings",ok:dataStatus.standings},{label:"ERA/OPS",ok:true,note:"preseason proj."}].map(s=><div key={s.label} style={{display:"flex",justifyContent:"space-between",fontSize:"0.62rem",color:C.dim,marginBottom:2}}><span>{s.label}{s.note?` (${s.note})`:""}</span><span style={{color:s.ok?C.green:loading?C.gold:C.red}}>{loading?"…":s.ok?"✓":"✗"}</span></div>)}
                </div>
                <button onClick={refresh} disabled={loading} style={{width:"100%",padding:"0.45rem 0.75rem",background:"transparent",border:`1px solid ${refreshError?C.red:C.border}`,borderRadius:3,color:loading?C.dim:refreshError?C.red:C.muted,fontSize:"0.78rem",cursor:"pointer",fontFamily:"inherit",opacity:loading?0.6:1}}>{loading?"Refreshing…":refreshError?"Retry":"↻ Refresh Now"}</button>
                {lastRefresh&&<div style={{fontSize:"0.6rem",color:C.dim,marginTop:"0.35rem"}}>Updated {lastRefresh.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</div>}
                <SidebarAIKey/>
              </div>
            </aside>
            <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
              <header style={{background:C.header,borderBottom:`1px solid ${C.border}`,padding:"0 0.75rem",height:46,display:"flex",alignItems:"center",gap:"0.6rem",flexShrink:0,overflow:"hidden"}}>
                <button onClick={()=>setNavOpen(!navOpen)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:"1.1rem",padding:"0.2rem 0.35rem",lineHeight:1,flexShrink:0}}>☰</button>
                <div style={{width:1,height:22,background:C.border,flexShrink:0}}/>
                <div style={{flexShrink:0}}>
                  <div style={{fontSize:"0.85rem",fontWeight:"bold",letterSpacing:"0.08em",color:C.text,whiteSpace:"nowrap"}}>MLB STATS MODEL</div>
                  <div style={{fontSize:"0.52rem",color:C.gold,letterSpacing:"0.04em",whiteSpace:"nowrap",opacity:0.8}}>R.I.P. BerryHorse 🐐</div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:"0.3rem",padding:"0.15rem 0.45rem",borderRadius:10,flexShrink:0,background:loading?"rgba(201,168,76,0.1)":liveGames.length>0?"rgba(93,200,122,0.1)":"rgba(255,255,255,0.04)",border:`1px solid ${loading?"rgba(201,168,76,0.3)":liveGames.length>0?"rgba(93,200,122,0.3)":C.border}`}}>
                  <div style={{width:5,height:5,borderRadius:"50%",flexShrink:0,background:loading?C.gold:liveGames.length>0?C.green:C.dim,animation:(loading||liveGames.length>0)?"pulse 1.4s infinite":"none"}}/>
                  <span style={{fontSize:"0.6rem",color:loading?C.gold:liveGames.length>0?C.green:C.dim,letterSpacing:"0.05em",whiteSpace:"nowrap"}}>{loading?"SYNC":liveGames.length>0?`${liveGames.length} LIVE`:lastRefresh?"LIVE":"--"}</span>
                </div>
                <div style={{marginLeft:"auto",fontSize:"0.65rem",color:C.dim,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",minWidth:0}}>{totalGames>0?`${totalGames} games · `:""}{new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div>
              </header>
              {refreshError&&<div style={{padding:"0.6rem 1.5rem",background:"rgba(224,96,96,0.08)",borderBottom:`1px solid rgba(224,96,96,0.2)`,fontSize:"0.8rem",color:C.red}}>⚠ {refreshError}</div>}
              {loading&&teams.every(t=>t.liveGames===0)&&!refreshError&&<div style={{padding:"0.6rem 1.5rem",background:"rgba(201,168,76,0.06)",borderBottom:`1px solid rgba(201,168,76,0.15)`,display:"flex",alignItems:"center",gap:"0.75rem"}}><Dots/><span style={{fontSize:"0.78rem",color:C.gold}}>Fetching live data…</span></div>}
              <div style={{flex:1,overflow:"auto"}}>
                {page==="stats"      && <TeamStatsPage/>}
                {page==="power"      && <PowerRankingsPage/>}
                {page==="xy"         && <XYExplorerPage/>}
                {page==="matchup"    && <MatchupSimPage/>}
                {page==="scoreboard" && <ScoreboardPage/>}
                {page==="odds"       && <OddsPage/>}
                {page==="gambling"   && <GamblingPage/>}
                {page==="perf"       && <ModelPerfPage/>}
                {page==="predictions"&& <PredictionsPage/>}
                {page==="method"     && <MethodologyPage/>}
              </div>
            </div>
          </div>
        </LiveContext.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>

</body>
